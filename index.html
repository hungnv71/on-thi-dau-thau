<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi Đấu Thầu - 390 Câu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; margin: 0; padding: 0; }
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); color: #333; min-height: 100vh; padding: 20px 10px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
        
        /* Header */
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2); text-align: center; color: white; position: relative; overflow: hidden;}
        .header::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); transform: rotate(30deg); pointer-events: none;}
        .header h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);}
        .header p { font-size: 15px; opacity: 0.9; font-weight: 600;}
        
        /* Main Quiz Card */
        .main-card { background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: all 0.3s ease; position: relative;}
        .q-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 20px;}
        .q-number { font-size: 18px; font-weight: 800; color: #764ba2; background: #f3e8ff; padding: 6px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .q-progress { font-size: 15px; font-weight: 700; color: #888; }
        
        .question-text { font-size: 18px; line-height: 1.6; font-weight: 700; color: #2d3748; margin-bottom: 25px; }
        
        /* Options */
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { display: flex; align-items: center; padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; background: #fff; position: relative; overflow: hidden;}
        .option:hover:not(.disabled) { border-color: #667eea; background: #f8faff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1); }
        .option-letter { display: flex; justify-content: center; align-items: center; width: 32px; height: 32px; background: #edf2f7; color: #4a5568; font-weight: 800; border-radius: 50%; margin-right: 15px; flex-shrink: 0; transition: all 0.2s;}
        .option-text { font-size: 16px; font-weight: 600; line-height: 1.5; color: #4a5568; }
        
        /* States */
        .option.disabled { cursor: not-allowed; opacity: 0.8;}
        
        .option.correct { border-color: #48bb78; background: #f0fff4; animation: pop 0.3s ease;}
        .option.correct .option-letter { background: #48bb78; color: white; }
        .option.correct::after { content: '✓'; position: absolute; right: 20px; font-size: 24px; color: #48bb78; font-weight: 900;}
        
        .option.wrong { border-color: #f56565; background: #fff5f5; animation: shake 0.4s ease;}
        .option.wrong .option-letter { background: #f56565; color: white; }
        .option.wrong::after { content: '✗'; position: absolute; right: 20px; font-size: 24px; color: #f56565; font-weight: 900;}
        
        /* Animations */
        @keyframes pop { 0% { transform: scale(0.98); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        /* Feedback */
        .feedback-banner { margin-top: 20px; padding: 15px 20px; border-radius: 12px; font-weight: 800; font-size: 16px; text-align: center; display: none; animation: slideDown 0.3s ease; }
        .feedback-banner.correct { display: block; background: #c6f6d5; color: #22543d; border-left: 5px solid #48bb78;}
        .feedback-banner.wrong { display: block; background: #fed7d7; color: #742a2a; border-left: 5px solid #f56565;}
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Controls */
        .controls { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px;}
        .btn { flex: 1; padding: 14px 20px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.2s; color: white; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        .btn:active { transform: translateY(2px); box-shadow: none;}
        .btn-prev { background: linear-gradient(135deg, #a0aec0 0%, #718096 100%); }
        .btn-prev:hover { background: linear-gradient(135deg, #718096 0%, #4a5568 100%); }
        .btn-next { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-next:hover { background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%); }
        
        /* Grid */
        .grid-card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .grid-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding-bottom: 10px; border-bottom: 2px dashed #eee;}
        .grid-header h3 { font-size: 18px; font-weight: 800; color: #2d3748; display: flex; align-items: center; gap: 8px;}
        .grid-toggle-icon { font-size: 20px; font-weight: bold; color: #667eea; transition: 0.3s; }
        .grid-toggle-icon.open { transform: rotate(180deg); }
        
        .grid-content { display: none; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 5px;}
        .grid::-webkit-scrollbar { width: 6px; }
        .grid::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }
        
        .q-btn { padding: 10px 0; border: 2px solid #edf2f7; background: #f7fafc; border-radius: 8px; cursor: pointer; text-align: center; font-size: 13px; font-weight: 700; color: #4a5568; transition: all 0.2s; }
        .q-btn:hover { background: #e2e8f0; }
        .q-btn.active { border-color: #667eea; background: #ebf4ff; color: #5a67d8; box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);}
        .q-btn.done-correct { background: #48bb78; color: white; border-color: #38a169; }
        .q-btn.done-wrong { background: #f56565; color: white; border-color: #e53e3e; }
        
        /* Mode Card */
        .mode-card { background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .mode-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .mode-btn { flex: 1; min-width: 150px; padding: 12px 16px; border: 2px solid #e2e8f0; background: #f7fafc; border-radius: 12px; font-size: 14px; font-weight: 800; color: #4a5568; cursor: pointer; transition: all 0.2s; }
        .mode-btn:hover { border-color: #667eea; }
        .mode-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-color: transparent; box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3); }
        .exam-options { display: none; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 2px dashed #eee; }
        .exam-options.open { display: flex; }
        .exam-label { font-size: 14px; font-weight: 700; color: #718096; }
        .count-btn { padding: 10px 18px; border: 2px solid #667eea; background: #fff; color: #667eea; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
        .count-btn:hover { background: #667eea; color: #fff; }
        .exam-badge { margin-top: 12px; padding: 10px 16px; background: #fffaf0; border-left: 5px solid #ed8936; border-radius: 8px; font-size: 14px; font-weight: 700; color: #7b341e; display: none; }
        .exam-badge.show { display: block; }

        /* Stats bar */
        .stats-bar { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 18px; font-size: 14px; font-weight: 800; }
        .stats-bar span { padding: 6px 14px; border-radius: 20px; background: #f7fafc; }
        .stat-correct { color: #22543d; background: #c6f6d5 !important; }
        .stat-wrong { color: #742a2a; background: #fed7d7 !important; }
        .stat-remain { color: #2c5282; background: #bee3f8 !important; }

        /* Explanation box */
        .explanation-box { margin-top: 14px; padding: 14px 18px; border-radius: 12px; background: #f0f4ff; border-left: 5px solid #667eea; font-size: 14px; line-height: 1.6; color: #3c4a6b; }
        .explanation-box b { color: #4c51bf; }

        /* Auto-next */
        .auto-next-hint { margin-top: 12px; font-size: 13px; font-weight: 800; color: #764ba2; text-align: center; animation: slideDown 0.3s ease; }
        .auto-next-row { margin-top: 16px; display: flex; justify-content: center; }
        .auto-next-label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #718096; cursor: pointer; }
        .auto-next-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: #667eea; cursor: pointer; }

        @media (max-width: 600px) {
            .header { padding: 20px 15px; }
            .header h1 { font-size: 22px; }
            .main-card { padding: 20px 15px; }
            .option { padding: 12px 15px; }
            .option-text { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌟 Ôn Thi Đấu Thầu</h1>
        <p>Bộ Đề Trắc Nghiệm 390 Câu - Chạm để xem đáp án</p>
    </div>

    <div class="mode-card">
        <div class="mode-row">
            <button class="mode-btn active" id="modeFullBtn" onclick="setModeFull()">📖 Toàn bộ 390 câu</button>
            <button class="mode-btn" id="modeExamBtn" onclick="toggleExamOptions()">🎯 Thi thử ngẫu nhiên</button>
        </div>
        <div class="exam-options" id="examOptions">
            <span class="exam-label">Chọn số câu (rải đều theo từng dải 50 câu):</span>
            <button class="count-btn" onclick="startExam(20)">20 câu</button>
            <button class="count-btn" onclick="startExam(50)">50 câu</button>
            <button class="count-btn" onclick="startExam(70)">70 câu</button>
        </div>
        <div class="exam-badge" id="examBadge"></div>
    </div>

    <div class="main-card">
        <div class="q-header">
            <div class="q-number" id="qNumberBadge">Câu 1</div>
            <div class="q-progress" id="qProgress">1 / 390</div>
        </div>

        <div class="stats-bar" id="statsBar">
            <span class="stat-correct">✅ Đúng: <b id="statCorrect">0</b></span>
            <span class="stat-wrong">❌ Sai: <b id="statWrong">0</b></span>
            <span class="stat-remain">⏳ Còn lại: <b id="statRemain">390</b></span>
        </div>
        
        <div class="question-text" id="questionText">Đang tải câu hỏi...</div>
        
        <div class="options" id="optionsContainer">
            <!-- Options rendered via JS -->
        </div>
        
        <div id="feedbackBanner" class="feedback-banner"></div>
        <div id="explanationBox" class="explanation-box" style="display:none;"></div>
        <div id="autoNextHint" class="auto-next-hint" style="display:none;">⏩ Tự động chuyển câu sau 1 giây...</div>

        <div class="auto-next-row">
            <label class="auto-next-label">
                <input type="checkbox" id="autoNextToggle" checked onchange="toggleAutoNext()">
                Tự động chuyển câu tiếp theo sau 1 giây khi chọn đáp án
            </label>
        </div>
        
        <div class="controls">
            <button class="btn btn-prev" onclick="prevQuestion()">
                <span>&larr;</span> Câu trước
            </button>
            <button class="btn btn-next" onclick="nextQuestion()">
                Câu tiếp <span>&rarr;</span>
            </button>
        </div>
    </div>
    
    <div class="grid-card">
        <div class="grid-header" onclick="toggleGrid()">
            <h3>📚 Danh Sách <span id="gridCountLabel">390</span> Câu Hỏi</h3>
            <span class="grid-toggle-icon" id="gridToggleIcon">&#9660;</span>
        </div>
        <div class="grid-content" id="gridContent">
            <div class="grid" id="questionGrid"></div>
        </div>
    </div>
</div>

<script>

    const questions = [{"stt": "1","question": "Trường hợp nào sau đây bắt buộc phải lựa chọn nhà thầu theo quy định tại Luật Đấu thầu?","options": ["Gói thầu thuộc dự án sử dụng vốn ngân sách nhà nước của cơ quan nhà nước","Lựa chọn nhà thầu của doanh nghiệp nhà nước không sử dụng vốn ngân sách nhà nước","Lựa chọn nhà thầu của đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên không sử dụng ngân sách nhà nước","Việc thuê, mua, thuê mua nhà, trụ sở, tài sản gắn liền với đất"],"answer": "A","explanation": "Theo khoản 1 Điều 2 Luật Đấu thầu 2023, gói thầu thuộc dự án sử dụng vốn NSNN của cơ quan nhà nước bắt buộc phải lựa chọn nhà thầu theo Luật; các trường hợp B, C (DNNN/đơn vị sự nghiệp tự chủ không dùng NSNN) được tự quyết định, D không thuộc phạm vi điều chỉnh."},{"stt": "2","question": "Chọn phương án đúng về phạm vi điều chỉnh của Luật Đấu thầu?","options": ["Quy định về quản lý nhà nước đối với hoạt động đấu thầu","Quy định về thẩm quyền và trách nhiệm của các cơ quan, tổ chức, cá nhân trong hoạt động đấu thầu","Quy định về hoạt động lựa chọn nhà thầu thực hiện gói thầu, hoạt động lựa chọn nhà đầu tư thực hiện dự án đầu tư kinh doanh","Tất cả phương án trên đều đúng"],"answer": "D","explanation": "Theo Điều 1 Luật Đấu thầu 2023, phạm vi điều chỉnh bao gồm cả quản lý nhà nước, thẩm quyền trách nhiệm các chủ thể và hoạt động lựa chọn nhà thầu/nhà đầu tư nên cả A, B, C đều đúng."},{"stt": "3","question": "Trường hợp nào sau đây không thuộc đối tượng áp dụng của Luật Đấu thầu?","options": ["Gói thầu mua thuốc, hoá chất, vật tư xét nghiệm sử dụng nguồn ngân sách nhà nước của bệnh viện công lập A","Gói thầu xây dựng đường giao thông sử dụng vốn đầu tư công do Ban Quản lý dự án đầu tư xây dựng công trình tỉnh A làm chủ đầu tư","Gói thầu mua sắm trang thiết bị làm việc sử dụng vốn nhà nước của Văn phòng UBND tỉnh A","Hoạt động mua phần mềm kế toán của hộ kinh doanh cá thể"],"answer": "D","explanation": "Hoạt động mua phần mềm kế toán của hộ kinh doanh cá thể không sử dụng vốn NSNN và không thuộc các nhóm chủ thể quy định tại Điều 2 Luật Đấu thầu 2023 nên không thuộc đối tượng áp dụng."},{"stt": "4","question": "Theo quy định pháp luật về đấu thầu, gói thầu nào là gói thầu cung cấp dịch vụ tư vấn?","options": ["Thiết kế và cung cấp hệ thống xử lý nước thải","Gói thầu lập nhiệm vụ quy hoạch vùng","Gói thầu quảng cáo trên nền tảng xã hội và phát sóng trên VTV","Gói thầu mua phần mềm kế toán MISA"],"answer": "B","explanation": "Theo khoản 45 Điều 4 Luật Đấu thầu 2023, dịch vụ tư vấn bao gồm lập báo cáo quy hoạch; do đó lập nhiệm vụ quy hoạch vùng là dịch vụ tư vấn, khác với gói hỗn hợp thiết kế-cung cấp (A), phi tư vấn (C) hay hàng hóa (D)."},{"stt": "5","question": "Theo quy định pháp luật về đấu thầu, gói thầu nào là gói thầu cung cấp dịch vụ phi tư vấn?","options": ["Gói thầu in sổ công tác của tỉnh A","Gói thầu thuê kiểm toán dự án","Gói thầu mua phần mềm kế toán hỗ trợ doanh nghiệp khởi nghiệp sáng tạo, doanh nghiệp nhỏ do phụ nữ làm chủ","Gói thầu xây dựng trụ sở làm việc của tỉnh A."],"answer": "A","explanation": "Theo Điều 4 Luật Đấu thầu 2023, dịch vụ phi tư vấn gồm các dịch vụ như in ấn, logistics...; in sổ công tác thuộc dịch vụ phi tư vấn, khác với dịch vụ tư vấn (kiểm toán - B), hàng hóa (phần mềm - C) hay xây lắp (D)."},{"stt": "6","question": "Theo quy định pháp luật về đấu thầu, đấu thầu là gì?","options": ["Là quá trình lựa chọn nhà thầu để ký kết, thực hiện hợp đồng cung cấp dịch vụ tư vấn, dịch vụ phi tư vấn, mua sắm hàng hóa, xây lắp trên cơ sở bảo đảm cạnh tranh, công bằng, minh bạch, hiệu quả kinh tế và trách nhiệm giải trình","Là quá trình lựa chọn nhà đầu tư để ký kết, thực hiện hợp đồng dự án đầu tư kinh doanh trên cơ sở bảo đảm cạnh tranh, công bằng, minh bạch, hiệu quả kinh tế và trách nhiệm giải trình","Là quá trình lựa chọn đơn vị để thực hiện hợp đồng thông qua các quy trình, thủ tục do pháp luật đấu thầu quy định.","Phương án A và B đều đúng"],"answer": "D","explanation": "Theo khoản 1, 2 Điều 4 Luật Đấu thầu 2023, đấu thầu bao gồm cả hoạt động lựa chọn nhà thầu (A) và lựa chọn nhà đầu tư (B), nên phương án tổng hợp D là đáp án đúng."},{"stt": "7","question": "Đấu thầu quốc tế là gì?","options": ["Là hoạt động đấu thầu mà nhà thầu trong nước, nhà thầu nước ngoài được tham dự thầu","Là hoạt động đấu thầu mà nhà thầu trong nước, nhà thầu nước ngoài được tham dự thầu, trong đó nhà thầu trong nước bắt buộc phải liên danh với nhà thầu nước ngoài","Là hoạt động đấu thầu chỉ nhà thầu quốc tế được phép tham dự thầu","Là hoạt động đấu thầu chỉ nhà thầu trong nước được phép tham dự thầu"],"answer": "A","explanation": "Theo Điều 4 Luật Đấu thầu 2023, đấu thầu quốc tế là hoạt động đấu thầu mà nhà thầu trong nước và nước ngoài đều được tham dự thầu, không bắt buộc phải liên danh với nhau."},{"stt": "8","question": "Giá đề nghị trúng thầu là gì?","options": ["Là giá dự thầu của nhà thầu ghi trong quyết định phê duyệt kết quả lựa chọn nhà thầu.","Là giá dự thầu của nhà thầu được đề nghị trúng thầu sau khi đã được sửa lỗi, hiệu chỉnh sai lệch theo yêu cầu của hồ sơ mời thầu, hồ sơ yêu cầu, trừ đi giá trị giảm giá (nếu có)","Là giá dự thầu của nhà thầu chưa tính sửa lỗi, hiệu chỉnh sai lệch và giá trị giảm giá (nếu có)","Là giá trị ghi trong hợp đồng giữa chủ đầu tư và nhà thầu"],"answer": "B","explanation": "Theo Điều 4 Luật Đấu thầu 2023, giá đề nghị trúng thầu là giá dự thầu đã được sửa lỗi, hiệu chỉnh sai lệch theo yêu cầu hồ sơ mời thầu/hồ sơ yêu cầu và trừ giá trị giảm giá (nếu có)."},{"stt": "9","question": "Theo quy định pháp luật về đấu thầu, hàng hóa gồm?","options": ["Máy móc, thiết bị, nguyên liệu, nhiên liệu, vật liệu, vật tư, phụ tùng; sản phẩm; phương tiện; hàng tiêu dùng, phần mềm thương mại","Thuốc, hóa chất, vật tư xét nghiệm, thiết bị y tế","Phương án A và B đều đúng","Logistics, bảo hiểm, quảng cáo, nghiệm thu chạy thử, chụp ảnh vệ tinh"],"answer": "C","explanation": "Theo Điều 4 Luật Đấu thầu 2023, hàng hóa bao gồm cả máy móc, thiết bị, vật tư... (nhóm A) và thuốc, hóa chất, vật tư xét nghiệm, thiết bị y tế (nhóm B) nên đáp án C đúng."},{"stt": "10","question": "Đối tượng nào sau đây được hưởng ưu đãi trong lựa chọn nhà thầu?","options": ["Hàng hóa có xuất xứ Việt Nam","Nhà thầu trong nước sản xuất hàng hóa có xuất xứ Việt Nam phù hợp với hồ sơ mời thầu","Sản phẩm, dịch vụ thân thiện môi trường theo quy định của pháp luật về bảo vệ môi trường","Tất cả các phương án trên đều đúng"],"answer": "D","explanation": "Theo Điều 10 Luật Đấu thầu 2023, đối tượng được hưởng ưu đãi trong lựa chọn nhà thầu bao gồm cả hàng hóa xuất xứ Việt Nam, nhà thầu trong nước sản xuất hàng hóa Việt Nam và sản phẩm/dịch vụ thân thiện môi trường."},{"stt": "11","question": "Nhà thầu trong nước nào được hưởng ưu đãi trong lựa chọn nhà thầu?","options": ["Nhà thầu trong nước sản xuất hàng hóa có xuất xứ Việt Nam phù hợp với hồ sơ mời thầu","Nhà thầu trong nước tham dự thầu với tư cách độc lập hoặc liên danh với nhà thầu trong nước khác khi tham dự đấu thầu quốc tế","Nhà thầu trong nước có sử dụng lao động nữ, thương binh, người khuyết tật hoặc người dân tộc thiểu số","Tất cả các phương án trên đều đúng"],"answer": "D","explanation": "Theo Điều 10 Luật Đấu thầu 2023, nhà thầu trong nước được hưởng ưu đãi bao gồm cả 3 nhóm nêu tại A, B, C (sản xuất hàng hóa VN, liên danh/độc lập khi đấu thầu quốc tế, sử dụng lao động yếu thế)."},{"stt": "12","question": "Trường hợp nào sau đây cơ quan, tổ chức, doanh nghiệp được tự quyết định việc lựa chọn nhà thầu trên cơ sở bảo đảm công khai, minh bạch, hiệu quả và trách nhiệm giải trình?","options": ["Thực hiện gói thầu thuộc dự án sử dụng vốn đầu tư công của cơ quan nhà nước","Thực hiện gói thầu thuộc dự án sử dụng vốn đầu tư công của đơn vị sự nghiệp công lập bảo đảm một phần chi thường xuyên","Thực hiện gói thầu thuộc dự án sử dụng vốn ngân sách nhà nước của doanh nghiệp nhà nước","Lựa chọn nhà thầu của doanh nghiệp nhà nước không sử dụng vốn ngân sách nhà nước, đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên và chi đầu tư, đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên không sử dụng ngân sách nhà nước"],"answer": "D","explanation": "Theo khoản 2 Điều 2 Luật Đấu thầu 2023, doanh nghiệp nhà nước không sử dụng vốn NSNN và đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên, chi đầu tư được tự quyết định việc lựa chọn nhà thầu trên cơ sở công khai, minh bạch, hiệu quả."},{"stt": "13","question": "Ngôn ngữ sử dụng đối với đấu thầu quốc tế là gì?","options": ["Tiếng Việt","Tiếng Đức","Tiếng Anh hoặc tiếng Việt và tiếng Anh","Tiếng Đức hoặc tiếng Anh"],"answer": "C","explanation": "Theo Điều 12 Luật Đấu thầu 2023, ngôn ngữ sử dụng trong đấu thầu quốc tế là tiếng Anh hoặc tiếng Việt và tiếng Anh."},{"stt": "14","question": "Đối với đấu thầu quốc tế, trường hợp ngôn ngữ sử dụng trong hồ sơ mời thầu là tiếng Việt và tiếng Anh thì khi tham dự thầu, nhà thầu được sử dụng ngôn ngữ gì?","options": ["Chỉ tiếng Việt","Chỉ tiếng Anh","Tiếng Việt hoặc tiếng Anh","Bắt buộc cả tiếng Việt và tiếng Anh"],"answer": "C","explanation": "Theo Điều 12 Luật Đấu thầu 2023, khi hồ sơ mời thầu quốc tế sử dụng cả tiếng Việt và tiếng Anh, nhà thầu được lựa chọn sử dụng một trong hai ngôn ngữ khi tham dự thầu."},{"stt": "15","question": "Điều kiện để tổ chức đấu thầu quốc tế lựa chọn nhà thầu thực hiện gói thầu mua sắm hàng hóa là gì?","options": ["Gói thầu mua sắm hàng hóa thông dụng, đơn giản, có sẵn trên thị trường","Gói thầu mua sắm hàng hóa mà hàng hóa đó trong nước sản xuất được và đáp ứng các yêu cầu về kỹ thuật, chất lượng, giá nhưng chủ đầu tư yêu cầu phải mua hàng hóa nhập khẩu","Gói thầu mua sắm hàng hóa mà hàng hóa đó trong nước không sản xuất được hoặc sản xuất được nhưng không đáp ứng một trong các yêu cầu về kỹ thuật, chất lượng, giá","Gói thầu mua sắm hàng hóa thông dụng đã được nhập khẩu và chào bán tại Việt Nam nhưng hàng hóa đó trong nước không sản xuất được"],"answer": "C","explanation": "Theo Điều 11 Luật Đấu thầu 2023, đấu thầu quốc tế đối với gói thầu mua sắm hàng hóa chỉ được tổ chức khi hàng hóa đó trong nước không sản xuất được hoặc sản xuất được nhưng không đáp ứng yêu cầu kỹ thuật, chất lượng hoặc giá."},{"stt": "16","question": "Trong trường hợp hủy thầu, toàn bộ hồ sơ liên quan đến quá trình lựa chọn nhà thầu của gói thầu đó có cần phải lưu trữ không?","options": ["Không cần lưu trữ, hủy hồ sơ ngay sau khi quyết định hủy thầu được ban hành nhưng phải đảm bảo thông tin không bị tiết lộ","Không cần lưu trữ, trả lại hồ sơ cho nhà thầu theo nguyên trạng ngay sau khi quyết định hủy thầu được ban hành","Có cần lưu trữ, trong thời hạn 05 năm kể từ ngày quyết định hủy thầu được ban hành","Có cần lưu trữ, trong thời hạn 03 năm kể từ ngày quyết định hủy thầu được ban hành"],"answer": "C","explanation": "Theo Điều 9 Luật Đấu thầu 2023 về xử lý, lưu trữ hồ sơ, trường hợp hủy thầu, hồ sơ liên quan phải được lưu trữ tối thiểu 05 năm kể từ ngày quyết định hủy thầu được ban hành, không được hủy bỏ hay trả lại ngay."},{"stt": "17","question": "Đối với đấu thầu rộng rãi quốc tế, trường hợp hồ sơ đề xuất về tài chính của nhà thầu không vượt qua bước đánh giá về kỹ thuật, nhà thầu từ chối nhận lại hồ sơ đề xuất của mình thì Chủ đầu tư phải xử lý như thế nào?","options": ["Chủ đầu tư xem xét, quyết định việc hủy hồ sơ nhưng phải đảm bảo thông tin không bị tiết lộ","Chủ đầu tư phải lưu trữ theo quy định của pháp luật về lưu trữ","Chủ đầu tư lưu trữ tối thiểu 05 năm","Tất cả các phương án trên đều sai"],"answer": "A","explanation": "Theo Điều 9 Luật Đấu thầu 2023, khi nhà thầu từ chối nhận lại hồ sơ đề xuất tài chính không vượt qua bước kỹ thuật, chủ đầu tư xem xét quyết định việc xử lý nhưng phải bảo đảm thông tin không bị tiết lộ."},{"stt": "18","question": "Hồ sơ hoàn công và quyết toán của gói thầu được lưu trữ theo quy định nào?","options": ["Quy định nội bộ của nhà thầu","Quy định của tư vấn giám sát","Quy định của pháp luật về lưu trữ","Tất cả phương án trên đều sai"],"answer": "C","explanation": "Hồ sơ hoàn công và quyết toán công trình được lưu trữ theo quy định của pháp luật về lưu trữ (Luật Lưu trữ), không phải theo quy định riêng của Luật Đấu thầu hay quy định nội bộ nhà thầu/tư vấn giám sát."},{"stt": "19","question": "Đối với gói thầu xây lắp đấu thầu không qua mạng, hồ sơ đề xuất tài chính của nhà thầu không vượt qua bước đánh giá về kỹ thuật sẽ được trả lại khi nào?","options": ["Khi gửi thư mời thương thảo","Khi kết thúc giai đoạn đánh giá kỹ thuật","Khi hoàn trả bảo đảm dự thầu của nhà thầu không được lựa chọn hoặc đăng tải kết quả lựa chọn nhà thầu","Khi ký hợp đồng"],"answer": "C","explanation": "Theo Nghị định 24/2024/NĐ-CP hướng dẫn Luật Đấu thầu, đối với gói thầu xây lắp đấu thầu không qua mạng, hồ sơ đề xuất tài chính không vượt qua bước kỹ thuật được trả lại khi hoàn trả bảo đảm dự thầu hoặc đăng tải kết quả lựa chọn nhà thầu."},{"stt": "20","question": "Đối với đấu thầu quốc tế, hồ sơ mời thầu được phát hành như thế nào?","options": ["Hồ sơ mời thầu được phát hành trên Hệ thống mạng đấu thầu quốc gia; Nhà thầu nộp tiền mua bản điện tử hồ sơ mời thầu khi nộp hồ sơ dự thầu","Hồ sơ mời thầu được bán vào giờ hành chính từ thứ 2 tới thứ 6 tại địa chỉ do Chủ đầu tư quy định","Phương án A và B đều đúng","Phương án A và B đều sai"],"answer": "A","explanation": "Theo Điều 8 Luật Đấu thầu 2023 và Nghị định 24/2024/NĐ-CP, đối với đấu thầu quốc tế, hồ sơ mời thầu được phát hành trên Hệ thống mạng đấu thầu quốc gia và nhà thầu nộp tiền mua bản điện tử khi nộp hồ sơ dự thầu."},{"stt": "21","question": "Đối với gói thầu sử dụng vốn ngân sách nhà nước, tiền bán bản điện tử hồ sơ mời thầu, hồ sơ yêu cầu sẽ được xử lý như thế nào?","options": ["Sử dụng theo quy chế tài chính của chủ đầu tư","Nộp vào ngân sách nhà nước theo quy định của Luật Ngân sách nhà nước","Sử dụng theo cơ chế khoán chi","Tất cả các phương án trên đều sai"],"answer": "B","explanation": "Theo quy định về quản lý chi phí đấu thầu, tiền bán hồ sơ mời thầu/hồ sơ yêu cầu đối với gói thầu sử dụng vốn NSNN phải nộp vào ngân sách nhà nước theo quy định của Luật Ngân sách nhà nước."},{"stt": "22","question": "Chi phí đăng tải quyết định phê duyệt kế hoạch lựa chọn nhà thầu và quyết định phê duyệt kết quả lựa chọn nhà thầu trên Hệ thống mạng đấu thầu quốc gia đối với gói thầu chỉ định thầu là bao nhiêu?","options": ["220. 000 đồng/1 gói thầu (đã bao gồm thuế giá trị gia tăng)","330. 000 đồng/1 gói thầu (đã bao gồm thuế giá trị gia tăng)","Miễn phí","110. 000 đồng/1 gói thầu (đã bao gồm thuế giá trị gia tăng)"],"answer": "C","explanation": "Theo Thông tư quy định về chi phí trong lựa chọn nhà thầu, việc đăng tải kế hoạch và kết quả lựa chọn nhà thầu đối với gói thầu chỉ định thầu (rút gọn) trên Hệ thống mạng đấu thầu quốc gia được miễn phí."},{"stt": "23","question": "Thành viên tổ chuyên gia thuộc tổ chức tư vấn đấu thầu cần có tối thiểu bao nhiêu năm kinh nghiệm trong lĩnh vực liên quan?","options": ["01 năm công tác thuộc một trong các lĩnh vực liên quan đến nội dung pháp lý, kỹ thuật, tài chính của gói thầu","02 năm công tác thuộc một trong các lĩnh vực liên quan đến nội dung pháp lý, kỹ thuật, tài chính của gói thầu","03 năm công tác thuộc một trong các lĩnh vực liên quan đến nội dung pháp lý, kỹ thuật, tài chính của gói thầu","Không có quy định về số năm kinh nghiệm"],"answer": "C","explanation": "Theo Điều 19 Luật Đấu thầu 2023, thành viên tổ chuyên gia của tổ chức tư vấn đấu thầu phải có tối thiểu 03 năm công tác thuộc lĩnh vực pháp lý, kỹ thuật hoặc tài chính liên quan đến gói thầu."},{"stt": "24","question": "Đơn vị sự nghiệp công lập A đã trúng thầu gói thầu tổ chức lớp đào tạo cán bộ cho UBND tỉnh X sử dụng vốn ngân sách địa phương. Đơn vị sự nghiệp công lập A có phải tổ chức lựa chọn nhà thầu theo Luật Đấu thầu để thuê dịch vụ hậu cần (như địa điểm ăn nghỉ, photo tài liệu, hội trường tổ chức) hay không?","options": ["Phải lựa chọn nhà thầu theo quy định của Luật Đấu thầu","Căn cứ vào hợp đồng quy định giữa đơn vị A và UBND tỉnh X","Đơn vị A được tự quyết định việc mua sắm trên cơ sở bảo đảm công khai, minh bạch, hiệu quả và trách nhiệm giải trình","Căn cứ theo phân cấp quyết định mua sắm của UBND tỉnh X"],"answer": "C","explanation": "Theo khoản 2 Điều 2 Luật Đấu thầu 2023, đơn vị sự nghiệp công lập khi cung cấp dịch vụ sử dụng nguồn thu hợp pháp không phải vốn NSNN trực tiếp giao (như dịch vụ hậu cần không thuộc nội dung gói thầu chính) được tự quyết định mua sắm trên cơ sở công khai, minh bạch, hiệu quả."},{"stt": "25","question": "Sở Y tế tỉnh A được doanh nghiệp trong nước tài trợ 5 tỷ đồng để mua sắm thuốc phục vụ khám chữa bệnh cho người nghèo, hỏi Sở Y tế có phải tổ chức đấu thầu thuốc theo quy định của Luật Đấu thầu không?","options": ["Sở Y tế A được tự quyết định việc mua sắm trên cơ sở bảo đảm công khai, minh bạch, hiệu quả và trách nhiệm giải trình trong trường hợp nhà tài trợ yêu cầu không lựa chọn nhà thầu theo quy định của Luật Đấu thầu","Sở Y tế A phải tổ chức lựa chọn nhà thầu theo quy định của Luật Đấu thầu","Trong mọi trường hợp Sở Y tế A không phải thực hiện theo Luật Đấu thầu do đây là nguồn doanh nghiệp trong nước tài trợ","Phải xin ý kiến của UBND tỉnh A để có cơ sở xác định có phải tổ chức lựa chọn nhà thầu theo Luật Đấu thầu hay không"],"answer": "A","explanation": "Theo Điều 2 Luật Đấu thầu 2023, trường hợp nhà tài trợ (không phải vốn NSNN) có yêu cầu không áp dụng Luật Đấu thầu thì chủ đầu tư được tự quyết định việc mua sắm trên cơ sở bảo đảm công khai, minh bạch, hiệu quả và trách nhiệm giải trình."},{"stt": "26","question": "Đối với gói thầu cung cấp dịch vụ tư vấn không qua mạng, trường hợp hồ sơ đề xuất về tài chính của nhà thầu không vượt qua bước đánh giá về kỹ thuật sẽ được xử lý như thế nào theo quy định của pháp luật về đấu thầu?","options": ["Trả lại nguyên trạng cho nhà thầu trong thời hạn 10 ngày kể từ ngày ký hợp đồng với nhà thầu được lựa chọn","Trả lại nguyên trạng cho nhà thầu trong thời hạn 05 ngày kể từ ngày ký hợp đồng với nhà thầu được lựa chọn","Trả lại nguyên trạng cho nhà thầu trong thời hạn 15 ngày kể từ ngày ký hợp đồng với nhà thầu được lựa chọn","Hồ sơ được lưu trữ theo quy định của Pháp luật về lưu trữ"],"answer": "A","explanation": "Theo Nghị định 24/2024/NĐ-CP, đối với gói thầu tư vấn đấu thầu không qua mạng, hồ sơ đề xuất tài chính không vượt qua bước kỹ thuật được trả lại nguyên trạng trong thời hạn 10 ngày kể từ ngày ký hợp đồng với nhà thầu được lựa chọn."},{"stt": "27","question": "Việc giữ lại hồ sơ tài chính của nhà thầu không đạt kỹ thuật sau thời hạn quy định sẽ…?","options": ["Là cơ sở để tiếp tục đánh giá trong trường hợp phải đánh giá lại","Bảo đảm trách nhiệm của chủ đầu tư theo quy định của pháp luật về đấu thầu","Có thể dẫn tới khiếu nại từ nhà thầu","Phương án A và B đều đúng"],"answer": "C","explanation": "Việc giữ lại hồ sơ tài chính của nhà thầu không đạt kỹ thuật quá thời hạn quy định trả lại có thể phát sinh khiếu nại từ nhà thầu do vi phạm quyền được nhận lại hồ sơ theo đúng thời hạn pháp luật quy định."},{"stt": "28","question": "Trường hợp nào sau đây Công ty B khi tham dự gói thầu xây lắp X thuộc Dự án Y được kết luận là đáp ứng về bảo đảm cạnh tranh trong đấu thầu?","options": ["Công ty B sử dụng nhà thầu phụ là công ty A, công ty A là nhà thầu tư vấn lập Chương V yêu cầu kỹ thuật cho E-HSMT của gói thầu xây lắp X","Công ty B tham dự gói thầu xây lắp X đồng thời là nhà thầu tư vấn lập Chương V yêu cầu kỹ thuật của E-HSMT của gói thầu xây lắp X.","Công ty B sử dụng nhà thầu phụ là công ty tư vấn C, công ty tư vấn C sở hữu 30% cổ phần của công ty A và công ty A là nhà thầu tư vấn thiết kế kỹ thuật cho dự án Y","Công ty A là nhà thầu tư vấn lập hồ sơ mời thầu gói thầu xây lắp X có sở hữu 30% vốn góp của Công ty B"],"answer": "C","explanation": "Theo Điều 6 Luật Đấu thầu 2023 về bảo đảm cạnh tranh trong đấu thầu, quan hệ sở hữu vốn gián tiếp qua nhà thầu phụ tư vấn (dưới mức chi phối, không trực tiếp lập E-HSMT/thiết kế cho gói thầu đang xét) không vi phạm nguyên tắc độc lập giữa các bên liên quan."},{"stt": "29","question": "Chọn phương án đúng đối với nhà thầu phụ đặc biệt?","options": ["Đối với đấu thầu trong nước, khi tham gia gói thầu của dự án thuộc lĩnh vực khoa học, công nghệ, đổi mới sáng tạo và chuyển đổi số thì nhà thầu trong nước được sử dụng nhà thầu phụ đặc biệt là nhà thầu nước ngoài đối với phần công việc đặc thù mà nhà thầu trong nước chưa thực hiện được hoặc cần chuyển giao công nghệ","Trong mọi trường hợp, đối với đấu thầu trong nước, nhà thầu không được phép sử dụng nhà thầu phụ đặc biệt là nhà thầu nước ngoài","Giá trị công việc tối đa dành cho nhà thầu phụ trong hợp đồng phải bao gồm khối lượng công việc dành cho nhà thầu phụ đặc biệt","Phương án A và C đều đúng"],"answer": "A","explanation": "Theo Điều 6 Luật Đấu thầu 2023, nhà thầu phụ đặc biệt là nhà thầu nước ngoài được sử dụng trong đấu thầu trong nước đối với gói thầu thuộc lĩnh vực khoa học, công nghệ, đổi mới sáng tạo, chuyển đổi số cho phần việc đặc thù cần chuyển giao công nghệ."},{"stt": "30","question": "Đối với đấu thầu không qua mạng, việc phê duyệt và phát hành hồ sơ mời thầu được thực hiện theo phương án nào sau đây?","options": ["Phê duyệt và phát hành hồ sơ mời thầu trên Hệ thống mạng đấu thầu quốc gia","Phê duyệt trên Hệ thống mạng đấu thầu quốc gia và phát hành hồ sơ mời thầu bản giấy","Phê duyệt và phát hành hồ sơ mời thầu bản giấy","Các phương án trên đều đúng"],"answer": "A","explanation": "Theo Điều 8 Luật Đấu thầu 2023 và Nghị định 24/2024/NĐ-CP, đối với đấu thầu không qua mạng, việc phê duyệt và phát hành hồ sơ mời thầu vẫn phải thực hiện trên Hệ thống mạng đấu thầu quốc gia để bảo đảm công khai, minh bạch."},{"stt": "31","question": "Gói thầu nào sau đây thuộc trường hợp được áp dụng chào hàng cạnh tranh?","options": ["Tất cả gói thầu mua sắm hàng hoá có giá không quá 10 tỷ đồng","Gói thầu dịch vụ phi tư vấn thông dụng, đơn giản có giá không quá 10 tỷ đồng","Gói thầu dịch vụ tư vấn thông dụng, đơn giản có giá không quá 10 tỷ đồng","Gói thầu xây lắp công trình đơn giản đã có dự toán được phê duyệt có giá không quá 15 tỷ đồng"],"answer": "B","explanation": ""},{"stt": "32","question": "Đối với gói thầu mua sắm hàng hóa thông dụng, sẵn có trên thị trường có giá gói thầu 05 tỷ đồng thì kế hoạch lựa chọn nhà thầu phê duyệt áp dụng hình thức lựa chọn nhà thầu nào sau đây?","options": ["Chỉ được áp dụng hình thức chào hàng cạnh tranh","Được áp dụng hình thức chào hàng cạnh tranh hoặc đấu thầu rộng rãi","Bắt buộc áp dụng hình thức chỉ định thầu","Được áp dụng hình thức chỉ định thầu hoặc chào hàng cạnh tranh hoặc đấu thầu rộng rãi"],"answer": "B","explanation": ""},{"stt": "33","question": "Hạn mức chỉ định thầu đối với gói thầu không hình thành dự án thuộc dự toán mua sắm thường xuyên là?","options": ["500 triệu đồng","800 triệu đồng","01 tỷ đồng","300 triệu đồng"],"answer": "A","explanation": ""},{"stt": "34","question": "Hạn mức chỉ định thầu đối với gói thầu mua sắm hàng hóa thuộc dự án đầu tư là?","options": ["800 triệu đồng","500 triệu đồng","01 tỷ đồng","02 tỷ đồng"],"answer": "D","explanation": ""},{"stt": "35","question": "Phương án nào không phải là một trong các hình thức lựa chọn nhà thầu được phê duyệt trong kế hoạch lựa chọn nhà thầu?","options": ["Đấu thầu rộng rãi","Đấu thầu hạn chế","Mua sắm trực tiếp","Đấu thầu qua mạng"],"answer": "D","explanation": ""},{"stt": "36","question": "Gói thầu lựa chọn tư vấn là tổ chức có giá gói thầu là 500 triệu đồng áp dụng hình thức lựa chọn nhà thầu nào?","options": ["Bắt buộc áp dụng hình thức chỉ định thầu","Được áp dụng hình thức chỉ định thầu hoặc đấu thầu rộng rãi","Được áp dụng hình thức chào hàng cạnh tranh hoặc đấu thầu rộng rãi","Được áp dụng hình thức chỉ định thầu hoặc đấu thầu rộng rãi hoặc chào hàng cạnh tranh"],"answer": "B","explanation": ""},{"stt": "37","question": "Chọn phương án đúng về hạn mức đối với đấu thầu rộng rãi?","options": ["Không quy định hạn mức áp dụng","Giá gói thầu trên 20 tỷ đồng","Giá gói thầu trên 10 tỷ đồng","Giá gói thầu trên 20 tỷ đồng đối với xây lắp, hàng hoá; trên 10 tỷ đồng đối với gói thầu dịch vụ tư vấn, phi tư vấn"],"answer": "A","explanation": ""},{"stt": "38","question": "Chọn phương án đúng về loại gói thầu đối với hình thức mua sắm trực tiếp?","options": ["Chỉ gói thầu mua sắm hàng hoá","Chỉ gói thầu xây lắp","Chỉ gói thầu dịch vụ phi tư vấn","Gói thầu mua sắm hàng hóa và dịch vụ phi tư vấn"],"answer": "A","explanation": ""},{"stt": "39","question": "Phương án nào không phải là điều kiện để được áp dụng hình thức mua sắm trực tiếp?","options": ["Nhà thầu đã trúng thầu thông qua đấu thầu rộng rãi, đấu thầu hạn chế và đã ký hợp đồng gói thầu thực hiện gói thầu trước đó","Thời gian từ khi ký hợp đồng gói thầu trước đến ngày phê duyệt kết quả mua sắm trực tiếp không quá 12 tháng","Đơn giá các phần việc thuộc gói thầu mua sắm trực tiếp không vượt đơn giá phần việc tương ứng của gói thầu đã ký trước đó thuộc gói thầu tương tự đã ký hợp đồng trước đó, đồng thời, phù hợp với giá thị trường tại thời điểm hoàn thiện hợp đồng","Chủ đầu tư được áp dụng mua sắm trực tiếp nhiều lần đối với các loại hàng hóa thuộc gói thầu"],"answer": "D","explanation": ""},{"stt": "40","question": "Hãy chọn phương án đúng về hình thức đặt hàng?","options": ["Là một trong các hình thức lựa chọn nhà thầu","Pháp luật quản lý ngành, lĩnh vực quy định về quy trình, thủ tục đặt hàng khác với quy trình, thủ tục của pháp luật về đấu thầu thì áp dụng quy định của pháp luật về đấu thầu.","Đặt hàng chỉ được áp dụng cho sản phẩm, dịch vụ công","Đặt hàng chỉ áp dụng đối với nguồn chi thường xuyên ngân sách nhà nước, không được áp dụng đối với nguồn vốn khác"],"answer": "A","explanation": ""},{"stt": "41","question": "Kế hoạch lựa chọn nhà thầu của dự án thuộc đối tượng áp dụng của Luật Đấu thầu bắt buộc phải đăng tải ở đâu?","options": ["Hệ thống mạng đấu thầu quốc gia","Báo Tài chính-Đầu tư","Cổng Thông tin điện tử của Bộ, ngành","Phương án A và B đều đúng"],"answer": "A","explanation": ""},{"stt": "42","question": "Chậm nhất là bao nhiêu ngày thì kế hoạch lựa chọn nhà thầu phải được đăng tải trên Hệ thống mạng đấu thầu quốc gia?","options": ["05 ngày làm việc kể từ ngày kế hoạch lựa chọn nhà thầu được ban hành","07 ngày kể từ ngày kế hoạch lựa chọn nhà thầu được ban hành","07 ngày làm việc kể từ ngày kế hoạch lựa chọn nhà thầu được ban hành","10 ngày kể từ ngày kế hoạch lựa chọn nhà thầu được ban hành"],"answer": "A","explanation": ""},{"stt": "43","question": "Kế hoạch lựa chọn nhà thầu bao gồm nội dung nào sau đây?","options": ["Giá gói thầu","Thời gian thực hiện hợp đồng","Giám sát hoạt động đấu thầu","Cả 3 phương án trên đều đúng"],"answer": "A","explanation": ""},{"stt": "44","question": "Đối với nội dung mua sắm hàng hóa có giá không quá 50 triệu đồng thì được thực hiện như thế nào?","options": ["Không phải lập kế hoạch lựa chọn nhà thầu nhưng phải thực hiện mua sắm trên cơ sở tiết kiệm, hiệu quả, bảo đảm đầy đủ hoá đơn, chứng từ","Không phải lập kế hoạch lựa chọn nhà thầu nhưng phải thực hiện mua sắm theo giá công khai, giá niêm yết và không cần hoá đơn, chứng từ","Được hình thành gói thầu để thực hiện lựa chọn nhà thầu theo một trong hình thức lựa chọn nhà thầu (đấu thầu rộng rãi, chào hàng cạnh tranh, chỉ định thầu) nhưng phải lập kế hoạch lựa chọn nhà thầu","Phương án A và C đều đúng"],"answer": "D","explanation": ""},{"stt": "45","question": "Lựa chọn phương án phù hợp nhất đối với nội dung đền bù giải phóng mặt bằng khi lập kế hoạch lựa chọn nhà thầu?","options": ["Tất cả nội dung công việc có liên quan đến giải phóng mặt bằng thuộc phần công việc không áp dụng một trong các hình thức lựa chọn nhà thầu","Đối với các công việc mà Hội đồng đền bù giải phóng mặt bằng tự làm (ví dụ: tổ chức họp với người sử dụng đất, chủ sở hữu tài sản; trình duyệt, công khai phương án bồi thường, bàn giao chi phí bồi thường. ., ) thì thuộc phần không áp dụng một trong các hình thức lựa chọn nhà thầu","Đối với phần việc phải hình thành gói thầu thuê tư vấn để thực hiện nhằm phục vụ công việc giải phóng mặt bằng thì thuộc phần công việc thuộc kế hoạch lựa chọn nhà thầu","Phương án B và C đều đúng"],"answer": "D","explanation": ""},{"stt": "46","question": "Đối với các gói thầu đã thanh lý hợp đồng, khi lập tờ trình Kế hoạch lựa chọn nhà thầu, giá trị phần công việc đã thực hiện của các gói thầu này được tính như thế nào?","options": ["Giá gói thầu","Giá trị thanh lý hợp đồng","Giá hợp đồng","Tất cả phương án đều đúng"],"answer": "B","explanation": ""},{"stt": "47","question": "Bảo đảm cạnh tranh trong đấu thầu thuộc nội dung đánh giá về?","options": ["Tư cách hợp lệ","Năng lực, kinh nghiệm","Kỹ thuật","Tài chính"],"answer": "A","explanation": ""},{"stt": "48","question": "Nhà thầu tham gia đấu thầu gói thầu hàng hóa phải độc lập với chủ thể nào sau đây?","options": ["Phải độc lập với nhà thầu tư vấn lập hồ sơ mời thầu gói thầu hàng hóa","Phải độc lập với nhà thầu khác khi tham gia đấu thầu rộng rãi","Phải độc lập với nhà thầu tư vấn lập kế hoạch tổng thể lựa chọn nhà thầu","Phải độc lập với nhà thầu tư vấn lập kế hoạch lựa chọn nhà thầu"],"answer": "A","explanation": ""},{"stt": "49","question": "Nhận định nào sau đây không phù hợp với quy định về bảo đảm cạnh tranh trong đấu thầu?","options": ["Nhà thầu tham dự thầu phải độc lập với chủ đầu tư, trừ trường hợp: nhà thầu là đơn vị sự nghiệp công lập thuộc cơ quan quản lý nhà nước có chức năng, nhiệm vụ được giao phù hợp với tính chất gói thầu của cơ quan quản lý nhà nước đó; đơn vị sự nghiệp công lập và doanh nghiệp có cùng một cơ quan trực tiếp quản lý, góp vốn; các đơn vị sự nghiệp công lập có cùng một cơ quan trực tiếp quản lý","Nhà thầu tham dự thầu phải độc lập với nhà thầu tư vấn quản lý dự án, tư vấn giám sát","Nhà thầu tham dự thầu phải độc lập với nhà thầu tư vấn lập, thẩm tra, thẩm định hồ sơ thiết kế, dự toán","Nhà thầu thực hiện hợp đồng phải độc lập với nhà thầu tư vấn lập kế hoạch lựa chọn nhà thầu."],"answer": "D","explanation": ""},{"stt": "50","question": "Nội dung nào sau đây không thuộc quy định về bảo đảm cạnh tranh trong đấu thầu khi nhà thầu tham dự thầu đấu thầu rộng rãi gói thầu EPC, EP, EC?","options": ["Nhà thầu tham dự thầu phải độc lập với nhà thầu lập, thẩm tra thiết kế FEED","Nhà thầu tham dự thầu phải độc lập với nhà thầu lập, thẩm tra báo cáo nghiên cứu khả thi trong trường hợp không lập thiết kế FEED","Nhà thầu tham dự thầu phải độc lập với nhà thầu lập, thẩm tra báo cáo kinh tế kỹ thuật trong trường hợp không lập báo cáo nghiên cứu khả thi, không lập thiết kế FEED theo quy định của pháp luật về xây dựng","Nhà thầu tham dự thầu phải độc lập với nhà thầu khác cùng tham dự đấu thầu rộng rãi"],"answer": "D","explanation": ""},{"stt": "51","question": "Nội dung nào là nội dung đánh giá tính hợp lệ của hồ sơ dự thầu?","options": ["Nhân sự chủ chốt","Hiệu lực của hồ sơ dự thầu","Năng lực tài chính","Việc thực hiện nghĩa vụ kê khai thuế, nộp thuế"],"answer": "B","explanation": ""},{"stt": "52","question": "Đối với đấu thầu không qua mạng, nội dung nào không phải là tiêu chuẩn đánh giá về tính hợp lệ của hồ sơ dự thầu gói thầu tư vấn?","options": ["Hiệu lực của hồ sơ đề xuất về kỹ thuật đáp ứng yêu cầu theo quy định trong hồ sơ mời thầu","Có bản gốc hồ sơ đề xuất về kỹ thuật","Bảo đảm dự thầu hợp lệ","Đã thực hiện nghĩa vụ kê khai thuế và nộp thuế"],"answer": "C","explanation": ""},{"stt": "53","question": "Đối với gói thầu mua sắm hàng hóa, xây lắp, phi tư vấn, phương pháp để đánh giá về năng lực và kinh nghiệm là?","options": ["Sử dụng tiêu chí đạt, không đạt","Sử dụng phương pháp chấm điểm","Kết hợp cả hai phương pháp: tiêu chí đạt, không đạt và phương pháp chấm điểm","Phương pháp dựa trên kỹ thuật"],"answer": "A","explanation": ""},{"stt": "54","question": "Tiêu chuẩn đánh giá năng lực kinh nghiệm đối với gói thầu mua sắm hàng hóa bao gồm?","options": ["Doanh thu bình quân 3 năm gần nhất","Giấy phép bán hàng của nhà sản xuất","Số năm thành lập của doanh nghiệp","Năng lực quản lý của doanh nghiệp"],"answer": "A","explanation": ""},{"stt": "55","question": "Nội dung nào là tiêu chuẩn đánh giá về năng lực và kinh nghiệm không bắt buộc đối với gói thầu mua sắm hàng hóa áp dụng đấu thầu rộng rãi?","options": ["Kinh nghiệm thực hiện hợp đồng cung cấp hàng hóa tương tự","Giá trị tài sản ròng của nhà thầu","Doanh thu của nhà thầu","Việc thực hiện nghĩa vụ kê khai thuế, nộp thuế"],"answer": "A","explanation": ""},{"stt": "56","question": "Nội dung nào là tiêu chuẩn đánh giá đánh giá về năng lực và kinh nghiệm bắt buộc đối với gói thầu xây lắp tổ chức đấu thầu rộng rãi không qua mạng?","options": ["Có bản gốc hồ sơ dự thầu","Có tên trong danh sách ngắn","Năng lực tài chính","Có bảo đảm dự thầu hợp lệ"],"answer": "C","explanation": ""},{"stt": "57","question": "Tiêu chuẩn đánh giá về kỹ thuật được yêu cầu về nhãn hiệu theo nhóm nhãn hiệu cho nguyên nhiên vật liệu, vật tư và các yếu tố đầu vào đối với trường hợp nào?","options": ["Nội dung công việc xây lắp thuộc gói thầu xây lắp, gói thầu EC","Nội dung công việc xây lắp thuộc gói thầu EPC","Nội dung công việc xây lắp thuộc gói thầu EPC và gói thầu PC","Nội dung công việc xây lắp thuộc gói thầu xây lắp và gói thầu PC"],"answer": "A","explanation": ""},{"stt": "58","question": "Nội dung nào không phải là tiêu chuẩn đánh giá về kỹ thuật của gói thầu tư vấn?","options": ["Giải pháp phương pháp luận","Uy tín của nhà thầu thông qua việc tham dự thầu, kết quả thực hiện hợp đồng của nhà thầu","Đã thực hiện nghĩa vụ kê khai thuế và nộp thuế","Kinh nghiệm và năng lực nhà thầu"],"answer": "C","explanation": ""},{"stt": "59","question": "Một trong các căn cứ lập hồ sơ mời thầu là?","options": ["Báo giá của nhà thầu","Quyết định mua sắm được phê duyệt","Kế hoạch lựa chọn nhà thầu được duyệt","Phương án B và C đều đúng"],"answer": "C","explanation": ""},{"stt": "60","question": "Đối với gói thầu cung cấp dịch vụ tư vấn, phương pháp đánh giá nào không được áp dụng?","options": ["Giá thấp nhất","Giá đánh giá","Kết hợp giữa kỹ thuật và giá","Giá cố định"],"answer": "B","explanation": ""},{"stt": "61","question": "Nội dung nào sau đây không thuộc hồ sơ mời thầu?","options": ["Chỉ dẫn nhà thầu, tùy chọn mua thêm","Bảng dữ liệu đấu thầu","Phạm vi cung cấp, yêu cầu về kỹ thuật","Biên bản hoàn thiện hợp đồng"],"answer": "D","explanation": ""},{"stt": "62","question": "Trường hợp nào hồ sơ mời thầu được đưa ra yêu cầu về giấy phép bán hàng?","options": ["Hàng hóa thông thường, có sẵn trên thị trường","Hàng hóa nhập khẩu","Hàng hóa đặc thù, phức tạp cần gắn với trách nhiệm của nhà sản xuất","Hàng hóa có giá trị lớn"],"answer": "C","explanation": ""},{"stt": "63","question": "Nội dung nào sau đây nếu đưa vào E-HSMT của gói thầu mua sắm hàng hóa áp dụng hình thức đấu thầu rộng rãi qua mạng có thể bị đánh giá là hạn chế cạnh tranh?","options": ["Yêu cầu nhà thầu cung cấp tài liệu chứng minh hợp đồng tương tự","Yêu cầu nhà thầu phải là chủ sở hữu thiết bị chào thầu","Yêu cầu nhà thầu có năng lực tài chính lành mạnh","Yêu cầu nhà thầu phải hoàn thành nghĩa vụ thuế"],"answer": "B","explanation": ""},{"stt": "64","question": "Gói thầu mua sắm máy điều hòa không khí của Sở Tài chính tỉnh X được tổ chức đấu thầu tập trung theo hình thức đấu thầu rộng rãi qua mạng thì E-HSMT có được nêu xuất xứ hàng hóa không?","options": ["Được nêu xuất xứ cụ thể của một nước bất kỳ","Được nêu xuất xứ theo nhóm nước, vùng lãnh thổ","Được nêu xuất xứ cụ thể của một nước bất kỳ nhưng phải kèm theo cụm từ \"hoặc tương đương\"","Không được nêu xuất xứ theo nhóm nước, vùng lãnh thổ"],"answer": "B","explanation": ""},{"stt": "65","question": "Khi tham dự thầu đấu thầu qua mạng, đại diện hợp pháp của nhà thầu có được ủy quyền cho Giám đốc chi nhánh để ký đơn dự thầu hay không?","options": ["Được ủy quyền nhưng phải bằng văn bản","Không được ủy quyền","Được ủy quyền nhưng phải tạo tài khoản nghiệp vụ cho Giám đốc chi nhánh khi tham dự thầu trên Hệ thống mạng đấu thầu quốc gia","Các phương án trên đều sai"],"answer": "B","explanation": ""},{"stt": "66","question": "Đối với đấu thầu rộng rãi qua mạng, trường hợp gói thầu có giá trị bảo đảm dự thầu nhỏ hơn 50 triệu đồng, thời gian có hiệu lực của thư bảo lãnh dự thầu hoặc giấy chứng nhận bảo hiểm bảo lãnh được quy định tại đâu?","options": ["Trong E-HSMT","Trong thông báo mời đối chiếu tài liệu","Trong thông báo mời thương thảo hợp đồng","Các phương án trên đều sai"],"answer": "B","explanation": ""},{"stt": "67","question": "Đối với đấu thầu rộng rãi qua mạng, trường hợp gói thầu có giá trị bảo đảm dự thầu nhỏ hơn 50 triệu đồng, nhà thầu thực hiện nộp thư bảo lãnh dự thầu hoặc giấy chứng nhận bảo hiểm bảo lãnh thì thời gian có hiệu lực của thư bảo lãnh dự thầu hoặc giấy chứng nhận bảo hiểm bảo lãnh được tính từ ngày nào?","options": ["Ngày có thời điểm đóng thầu","Ngày phê duyệt kết quả lựa chọn nhà thầu","Ngày thực hiện đối chiếu tài liệu","Các phương án trên đều sai"],"answer": "C","explanation": ""},{"stt": "68","question": "Đối với đấu thầu qua mạng, trường hợp E HSMT có yêu cầu cung cấp hàng mẫu, nhà thầu có thể nộp bổ sung hàng mẫu theo phương án nào sau đây?","options": ["Trong thời hạn 07 ngày làm việc sau thời điểm đóng thầu","Trong thời hạn 07 ngày làm việc sau thời điểm mở thầu","Trong thời hạn 05 ngày làm việc sau thời điểm đóng thầu","Không được nộp bổ sung hàng mẫu sau thời điểm đóng thầu"],"answer": "C","explanation": ""},{"stt": "69","question": "Đối với gói thầu tư vấn tổ chức đấu thầu rộng rãi qua mạng, sử dụng thang điểm 1. 000 để xây dựng tiêu chuẩn đánh giá về kỹ thuật, E-HSMT quy định số điểm đối với tiêu chí đánh giá về uy tín của nhà thầu thông qua việc tham dự thầu, kết quả thực hiện hợp đồng của nhà thầu là bao nhiêu?","options": ["150 điểm","100 điểm","50 điểm","Từ 0 đến 49 điểm"],"answer": "C","explanation": ""},{"stt": "70","question": "Đối với gói thầu thuê hệ thống máy chủ áp dụng đấu thầu rộng rãi qua mạng, thời gian thực hiện gói thầu là 5 năm (có tính chất công việc lặp lại theo chu kỳ qua các năm), giá gói thầu là 5 tỷ đồng, quy mô hợp đồng tương tự tối thiểu được quy định trong E HSMT là bao nhiêu thì phù hợp quy định?","options": ["2, 5 tỷ đồng","2 tỷ đồng","1, 5 tỷ đồng","300 triệu đồng"],"answer": "D","explanation": ""},{"stt": "71","question": "Đối với đấu thầu quốc tế, hồ sơ mời thầu phải quy định sử dụng lao động trong nước trong trường hợp nào?","options": ["Những vị trí công việc mà lao động trong nước đáp ứng được và có khả năng cung cấp","Những vị trí công việc mà lao động trong nước không đáp ứng được nhưng cần tạo điều kiện để tiếp nhận công nghệ từ nước ngoài được chuyển giao","Lao động phổ thông","Phương án A và C đều đúng"],"answer": "D","explanation": ""},{"stt": "72","question": "Trường hợp hồ sơ mời thầu có quy định về xuất xứ theo nhóm nước, vùng lãnh thổ mà không bao gồm xuất xứ Việt Nam, nhà thầu chào hàng hóa có xuất xứ Việt Nam sẽ bị đánh giá như thế nào?","options": ["Hàng hóa của nhà thầu không được xem xét, đánh giá","Hàng hóa của nhà thầu vẫn được xem xét, đánh giá","Yêu cầu nhà thầu bổ sung hàng hóa theo đúng xuất xứ thuộc nhóm nước, vùng lãnh thổ theo yêu cầu hồ sơ mời thầu nhưng phải cùng ký mã hiệu, nhãn hiệu với hàng hóa nhà thầu đã đề xuất trong hồ sơ dự thầu","Yêu cầu nhà thầu bổ sung hàng hóa theo đúng xuất xứ thuộc nhóm nước, vùng lãnh thổ theo yêu cầu hồ sơ mời thầu, không phải đáp ứng cùng ký mã hiệu, nhãn hiệu với hàng hóa nhà thầu đã đề xuất trong hồ sơ dự thầu"],"answer": "B","explanation": ""},{"stt": "73","question": "Gói thầu mua sắm 20 máy điều hòa, tổ chức đấu thầu rộng rãi qua mạng, một giai đoạn một túi hồ sơ, trường hợp E-HSMT có quy định về kinh nghiệm thực hiện hợp đồng tương tự thì tính chất tương tự được quy định như thế nào?","options": ["Quy định hàng hóa thuộc cùng lĩnh vực tổng quát với máy điều hòa (thiết bị điện. .. )","Chỉ quy định hàng hóa có cùng mã Chương, mã Nhóm (tương ứng với 4 số đầu tiên của bộ mã) trong Hệ thống mã HS với mã HS của máy điều hòa","Được quy định hàng hóa thuộc cùng chủng loại hoặc hàng hóa có cùng mã Chương, mã Nhóm (tương ứng với 4 số đầu tiên của bộ mã) trong Hệ thống mã HS với mã HS của máy điều hòa","Tất cả đáp án trên đều đúng"],"answer": "C","explanation": ""},{"stt": "74","question": "Tiêu chuẩn đánh giá về kỹ thuật gói thầu dịch vụ phi tư vấn không bao gồm nội dung nào sau đây?","options": ["Nhà thầu bị đánh giá về uy tín trong việc tham dự thầu","Bảo đảm điều kiện vệ sinh môi trường và các điều kiện khác như phòng cháy, chữa cháy, an toàn lao động.","Mức độ đáp ứng các yêu cầu về bảo hành, bảo trì (nếu có);","Tất cả đáp án trên đều sai"],"answer": "A","explanation": ""},{"stt": "75","question": "Nhận định nào sau đây là đúng về tiêu chuẩn đánh giá E-HSDT gói thầu dịch vụ tư vấn tổ chức đấu thầu rộng rãi qua mạng?","options": ["Có thể không quy định về tiêu chuẩn kinh nghiệm và năng lực trong tiêu chuẩn đánh giá về kỹ thuật","Không được quy định mức điểm tối thiểu về kinh nghiệm và năng lực trong tiêu chuẩn đánh giá về kỹ thuật","Không được quy định uy tín của nhà thầu thông qua việc tham dự thầu trong tiêu chuẩn đánh giá về kỹ thuật","Hợp đồng tương tự được xác định trên cơ sở tương tự cả về tính chất và quy mô (giá trị hợp đồng)"],"answer": "A","explanation": ""},{"stt": "76","question": "Đối với gói thầu xây dựng “Trường trung học phổ thông A”, bao gồm tổ hợp các công trình: \n+ Nhà A1 (Nhà học): Cao 10 tầng, tổng diện tích sàn 8. 000 m2, có giá trị theo dự toán được duyệt là (2X) VND. Nhà A1 là công trình kết cấu dạng nhà cấp II theo quy định của Thông tư số 06/2021/TT-BXD. \n+ Nhà A2 (Nhà học): Cao 6 tầng, tổng diện tích sàn 1. 000 m2, có giá trị theo dự toán được duyệt là (Y) VND. Nhà A2 là công trình kết cấu dạng nhà cấp III theo quy định của Thông tư số 06/2021/TT-BXD. \n+ Hàng rào bảo vệ: Cao 3m \n+ Nhà bảo vệ: Cao 1 tầng, diện tích sàn 12 m2. \nKinh nghiệm thi công công trình tương tự được quy định trong hồ sơ mời thầu như thế nào là phù hợp?","options": ["Nhà thầu đã hoàn thành công trình xây dựng nhà, kết cấu dạng nhà cấp II, có giá trị tối thiểu là 50% x (2X) VND","Nhà thầu đã hoàn thành công trình xây dựng nhà, kết cấu dạng nhà cấp II, có giá trị tối thiểu là 50% x (2X) VND, trong đó phải bao gồm hạng mục hàng rào bảo vệ, nhà bảo vệ","Nhà thầu đã hoàn thành công trình xây dựng nhà, kết cấu dạng nhà cấp III, có giá trị tối thiểu là 50% x (2X) VND","Nhà thầu đã hoàn thành công trình xây dựng nhà, kết cấu dạng nhà cấp III, có giá trị tối thiểu là 50% x (2X) VND, trong đó phải bao gồm hạng mục hàng rào bảo vệ, nhà bảo vệ"],"answer": "A","explanation": ""},{"stt": "77","question": "Đối với gói thầu áp dụng chào hàng cạnh tranh, việc đánh giá về kỹ thuật thực hiện theo phương án nào sau đây?","options": ["Phải sử dụng phương pháp đánh giá “đạt”, “không đạt”","Phải sử dụng phương pháp chấm điểm","Được sử dụng một trong hai phương pháp “đạt”, “không đạt” hoặc chấm điểm","Chỉ cần yêu cầu nhà thầu cam kết đáp ứng yêu cầu về kỹ thuật"],"answer": "A","explanation": ""},{"stt": "78","question": "Chủ đầu tư dự kiến mua sắm hàng hóa (không phải mua sắm tập trung hoặc mua sắm hàng hóa có số lượng, khối lượng mời thầu lớn) như sau: \n- Hàng hóa A có mã HS là 9035, giá trị dự toán là 4. 000. 000. 000 đồng \n- Hàng hóa B có mã HS là 9035, giá trị dự toán là 6. 000. 000. 000 \nE-HSMT yêu cầu về kinh nghiệm thực hiện hợp đồng cung cấp hàng hóa tương tự trong trường hợp nào sau đây là phù hợp?","options": ["Cung cấp 01 hợp đồng có mã hàng hóa 9035 với giá trị tối thiểu 02 tỷ đồng","Cung cấp 01 hợp đồng có mã hàng hóa 9035 với giá trị tối thiểu 03 tỷ đồng","Cung cấp 01 hợp đồng có mã hàng hóa 9035 với giá trị tối thiểu 05 tỷ đồng","Cung cấp 01 hợp đồng có mã hàng hóa 9035 với giá trị tối thiểu 07 tỷ đồng"],"answer": "B","explanation": ""},{"stt": "79","question": "Gói thầu mua sắm hàng hóa có khối lượng, số lượng công việc căn cứ nhu cầu theo các năm và thời gian thực hiện gói thầu là 02 năm thì E-HSMT quy định về giá trị của hợp đồng tương tự như thế nào?","options": ["Có giá trị bằng 50% giá gói thầu","Có giá trị bằng 70% giá gói thầu","Có giá trị bằng 50% giá trị theo chu kỳ 01 năm của gói thầu","Có giá trị tối thiểu bằng 50% giá gói thầu"],"answer": "C","explanation": ""},{"stt": "80","question": "Nội dung nào không phù hợp với quy định về nhà thầu phụ đối với gói thầu mua sắm hàng hóa?","options": ["Chủ đầu tư phải ghi tỷ lệ % giá trị dành cho nhà thầu phụ trong E-BDL làm cơ sở để nhà thầu lập E-HSDT","Năng lực và kinh nghiệm của nhà thầu phụ sẽ không được xem xét khi đánh giá E-HSDT của nhà thầu","Nhà thầu được ký kết hợp đồng với các nhà thầu phụ trong danh sách các nhà thầu phụ nêu trong E-HSDT","Nhà thầu được ký kết hợp đồng với các nhà thầu phụ được chủ đầu tư chấp thuận để tham gia thực hiện cung cấp dịch vụ liên quan"],"answer": "A","explanation": ""},{"stt": "81","question": "Trong quá trình đánh giá hồ sơ dự thầu gói thầu áp dụng đấu thầu rộng rãi, chủ đầu tư phát hiện người đại diện theo pháp luật của 02 nhà thầu tham dự thầu là anh em ruột thì xem xét, đánh giá như thế nào?","options": ["Thuộc hành vi bị cấm trong đấu thầu","Không đáp ứng yêu cầu về bảo đảm cạnh tranh trong đấu thầu","Hồ sơ dự thầu của một trong hai nhà thầu không được xem xét","Không thuộc hành vi bị cấm, không vi phạm quy định về bảo đảm cạnh tranh trong đấu thầu"],"answer": "D","explanation": ""},{"stt": "82","question": "Việc đánh giá nhà thầu đang trong thời gian bị cấm tham dự thầu thuộc nội dung đánh giá về?","options": ["Kỹ thuật","Tài chính","Tư cách hợp lệ","Năng lực, kinh nghiệm"],"answer": "C","explanation": ""},{"stt": "83","question": "Khi đánh giá về năng lực kinh nghiệm đối với gói thầu mua sắm hàng hóa áp dụng đấu thầu rộng rãi, nhà thầu được đánh giá là đạt khi nào?","options": ["Nhà thầu được đánh giá đạt tất cả tiêu chuẩn đánh giá về năng lực và kinh nghiệm trong hồ sơ mời thầu","Nhà thầu đáp ứng một trong các tiêu chuẩn đánh giá về năng lực và kinh nghiệm trong hồ sơ mời thầu","Nhà thầu đáp ứng hai phần ba các tiêu chuẩn đánh giá về năng lực và kinh nghiệm trong hồ sơ mời thầu","Nhà thầu đáp ứng các tiêu chuẩn đánh giá về năng lực và kinh nghiệm quan trọng trong hồ sơ mời thầu"],"answer": "A","explanation": ""},{"stt": "84","question": "Việc đánh giá về nhân sự chủ chốt và thiết bị chủ yếu đối với gói thầu xây lắp tổ chức đấu thầu rộng rãi được thực hiện như thế nào?","options": ["Đánh giá đối với tất cả các nhà thầu tham dự thầu","Đánh giá đối với nhà thầu xếp thứ nhất","Đánh giá đối với tất cả các nhà thầu được đánh giá đạt về kỹ thuật","Không đánh giá về nhân sự chủ chốt và thiết bị chủ yếu"],"answer": "B","explanation": ""},{"stt": "85","question": "Đối với gói thầu mua sắm hàng hóa áp dụng hình thức chào hàng cạnh tranh, trường hợp hồ sơ mời thầu không yêu cầu về năng lực, kinh nghiệm thì việc đánh giá được thực hiện như thế nào?","options": ["Không phải đánh giá về năng lực, kinh nghiệm nhưng nhà thầu phải cam kết đáp ứng năng lực, kinh nghiệm trong đơn dự thầu","Trường hợp nhà thầu đính kèm tài liệu về năng lực, kinh nghiệm thì chủ đầu tư bắt buộc phải đánh giá về năng lực, kinh nghiệm của nhà thầu","Bắt buộc phải đánh giá năng lực, kinh nghiệm của nhà thầu","Phương án A và B đều đúng"],"answer": "A","explanation": ""},{"stt": "86","question": "Đối với gói thầu xây lắp tổ chức đấu thầu rộng rãi, có bắt buộc quy định việc đánh giá đối với yêu cầu về nguồn lực tài chính trong hồ sơ mời thầu phải bằng cam kết tín dụng không?","options": ["Bắt buộc quy định trong hồ sơ mời thầu do đây là tiêu chí chứng minh nguồn lực tài chính","Không bắt buộc quy định, hồ sơ mời thầu có thể đưa ra yêu cầu về cam kết cung cấp tín dụng hoặc không yêu cầu về cam kết cung cấp tín dụng","Bắt buộc quy định trong hồ sơ mời thầu đối với gói thầu xây lắp áp dụng phương thức một giai đoạn hai túi hồ sơ","Bắt buộc quy định trong hồ sơ mời thầu đối với gói thầu có giá trên 20 tỷ đồng"],"answer": "B","explanation": ""},{"stt": "87","question": "Đối với gói thầu chia thành 2 phần (phần 1: mua sắm máy tính; phần 2: mua sắm bàn ghế cho cán bộ công chức), áp dụng phương pháp giá thấp nhất (máy tính và bàn ghế là hàng hóa thuộc danh mục do Chính phủ, Thủ tướng Chính phủ quy định tiêu chuẩn, định mức), việc xét duyệt trúng thầu trong trường hợp này được thực hiện như thế nào?","options": ["Giá đề nghị trúng thầu của từng hàng hóa đảm bảo không vượt mức giá của từng hàng hóa đó theo tiêu chuẩn, định mức do cấp có thẩm quyền ban hành và tổng giá đề nghị trúng thầu của gói thầu là thấp nhất, không vượt giá gói thầu được duyệt","Tổng giá đề nghị trúng thầu của gói thầu là thấp nhất và không vượt giá gói thầu được duyệt mà không so sánh với ước tính chi phí của từng phần, không cần so sánh với tiêu chuẩn, định mức từng mặt hàng","Giá từng phần thấp nhất, tổng giá đề nghị trúng thầu không vượt giá gói thầu được duyệt, không cần so sánh với tiêu chuẩn, định mức từng mặt hàng","Tất cả phương án trên đều sai"],"answer": "A","explanation": ""},{"stt": "88","question": "Đối với gói thầu xây lắp áp dụng đấu thầu rộng rãi qua mạng, trường hợp E-HSMT quy định nhà thầu phải cung cấp đầy đủ các tài liệu: giấy đăng ký thiết bị, hợp đồng, hóa đơn mua hàng, giấy đăng kiểm, kiểm định theo quy định của pháp luật để chứng minh khả năng huy động thiết bị thi công chủ yếu thì nhà thầu phải cung cấp những tài liệu nào?","options": ["Phải cung cấp đầy đủ theo yêu cầu của E-HSMT gồm: giấy đăng ký thiết bị, hợp đồng, hóa đơn mua hàng, giấy đăng kiểm, kiểm định theo quy định của pháp luật","Chỉ cần cung cấp một trong các tài liệu: giấy đăng ký thiết bị, hợp đồng, hóa đơn mua hàng, giấy đăng kiểm, kiểm định theo quy định của pháp luật","Phải bắt buộc cung cấp giấy đăng ký thiết bị kèm theo giấy đăng kiểm, kiểm định theo quy định của pháp luật","Phải bắt buộc cung cấp hợp đồng, hóa đơn mua hàng"],"answer": "B","explanation": ""},{"stt": "89","question": "Danh sách xếp hạng nhà thầu có phải thẩm định trước khi phê duyệt hay không?","options": ["Phải thẩm định trong trường hợp có hơn 01 nhà thầu trong danh sách xếp hạng","Không phải thẩm định","Do người có thẩm quyền quyết định","Phương án A và C đều đúng"],"answer": "B","explanation": ""},{"stt": "90","question": "Đối với gói thầu xây lắp áp dụng hình thức đấu thầu rộng rãi trong nước (không áp dụng sơ tuyển), trường hợp tại thời điểm đóng thầu chỉ có 01 nhà thầu nộp hồ sơ dự thầu thì xử lý như thế nào?","options": ["Mở thầu ngay để tiến hành đánh giá","Gia hạn thời điểm đóng thầu tối thiểu 10 ngày","Báo cáo người có thẩm quyền xem xét, quyết định","Phương án A và B đều đúng"],"answer": "D","explanation": ""},{"stt": "91","question": "Đối với gói thầu xây lắp, trường hợp công ty mẹ tham dự thầu và huy động công ty con tham gia thực hiện gói thầu thì việc đánh giá kinh nghiệm thực hiện hợp đồng tương tự được thực hiện như thế nào?","options": ["Đánh giá kinh nghiệm thực hiện hợp đồng tương tự của công ty mẹ, không đánh giá kinh nghiệm của công ty con","Đánh giá kinh nghiệm thực hiện hợp đồng tương tự căn cứ vào giá trị, khối lượng công việc do công ty mẹ, công ty con đảm nhiệm trong gói thầu","Đánh giá kinh nghiệm thực hiện hợp đồng tương tự của công ty con, không đánh giá kinh nghiệm của công ty mẹ, không phân biệt khối lượng công việc do công ty mẹ, công ty con đảm nhiệm trong gói thầu","Đánh giá theo tổng kinh nghiệm thực hiện hợp đồng tương tự của công ty mẹ và công ty con, không phân biệt khối lượng công việc do công ty mẹ, công ty con đảm nhiệm trong gói thầu"],"answer": "B","explanation": ""},{"stt": "92","question": "Kinh nghiệm thực hiện hợp đồng xây lắp tương tự gói thầu chỉ bao gồm 01 công trình độc lập được xét trên cơ sở nào sau đây?","options": ["Xét theo công trình nhà thầu đã hoàn thành toàn bộ hoặc hoàn thành phần lớn có cùng loại kết cấu, cấp công trình và đáp ứng quy mô theo yêu cầu của hồ sơ mời thầu","Chỉ xét theo công trình nhà thầu đã hoàn thành toàn bộ, đã được nghiệm thu, cùng loại công trình và đáp ứng quy mô theo yêu cầu của hồ sơ mời thầu","Xét theo các hạng mục công việc có tính chất tương tự nhà thầu đã hoàn thành phần lớn và đáp ứng quy mô theo yêu cầu của hồ sơ mời thầu","Tất cả phương án trên đều đúng"],"answer": "A","explanation": ""},{"stt": "93","question": "Đối với gói thầu mua sắm hàng hóa tổ chức đấu thầu rộng rãi qua mạng, kinh nghiệm thực hiện hợp đồng cung cấp hàng hóa tương tự được xét trên cơ sở nào sau đây?","options": ["Hàng hóa phải cùng chủng loại với gói thầu đang xét","Hàng hóa thuộc cùng lĩnh vực tổng quát với hàng hóa của gói thầu","Hàng hóa có 4 số đầu tiên mã HS cùng với mã HS của hàng hóa thuộc gói thầu","Cả 2 phương án B và C đều đúng"],"answer": "D","explanation": ""},{"stt": "94","question": "Gói thầu dịch vụ phi tư vấn chia thành nhiều phần thì việc đánh giá về doanh thu đối với nhà thầu tham dự nhiều phần được thực hiện như thế nào?","options": ["Việc đánh giá về doanh thu căn cứ trên tổng giá trị doanh thu bình quân yêu cầu đối với các phần mà nhà thầu tham dự","Việc đánh giá về doanh thu căn cứ trên từng phần mà nhà thầu tham dự, nhà thầu không phải đáp ứng tổng doanh thu đối với các phần mà nhà thầu tham dự","Việc đánh giá về doanh thu căn cứ trên phần có giá trị lớn nhất trong tổng số các phần nhà thầu tham dự","Các phương án trên đều sai"],"answer": "A","explanation": ""},{"stt": "95","question": "Gói thầu mua sắm hàng hóa chia thành nhiều phần thì việc đánh giá về quy mô hợp đồng tương tự đối với nhà thầu tham dự nhiều phần được thực hiện như thế nào?","options": ["Việc đánh giá về quy mô hợp đồng tương tự căn cứ trên tổng quy mô hợp đồng tương tự đối với các phần mà nhà thầu tham dự","Việc đánh giá về quy mô hợp đồng tương tự tương ứng với từng phần mà nhà thầu tham dự, nhà thầu không phải đáp ứng tổng quy mô hợp đồng tương tự đối với các phần mà nhà thầu tham dự","Việc đánh giá về quy mô hợp đồng tương tự căn cứ trên phần có giá trị nhỏ nhất trong tổng số các phần mà nhà thầu tham dự","Các phương án trên đều sai"],"answer": "B","explanation": ""},{"stt": "96","question": "Trường hợp E-HSMT của gói thầu mua sắm hàng hóa có yêu cầu về cam kết, hợp đồng nguyên tắc bảo hành, bảo trì, duy tu, bảo dưỡng mà E-HSDT của nhà thầu không đính kèm các tài liệu này thì Chủ đầu tư xử lý như thế nào?","options": ["Hồ sơ dự thầu của nhà thầu bị loại, không được xem xét, đánh giá","Chủ đầu tư yêu cầu nhà thầu làm rõ, bổ sung tài liệu trong một khoảng thời gian phù hợp nhưng không ít hơn 03 ngày làm việc để làm cơ sở đánh giá E-HSDT","Xin ý kiến người có thẩm quyền để xử lý tình huống trong đấu thầu trên cơ sở bảo đảm các mục tiêu của công tác đấu thầu","Tiếp tục đánh giá E-HSDT, trường hơp nhà thầu trúng thầu thì yêu cầu nhà thầu bổ sung, làm rõ tài liệu"],"answer": "B","explanation": ""},{"stt": "97","question": "Đối với gói thầu mua sắm hàng hóa áp dụng đấu thầu rộng rãi, trong hồ sơ dự thầu nhà thầu không đề xuất cụ thể ký mã hiệu, nhãn hiệu, xuất xứ, hãng sản xuất thì xử lý như thế nào?","options": ["Chủ đầu tư yêu cầu nhà thầu làm rõ các thông tin này để làm cơ sở đánh giá trên cơ sở không được thay đổi giá dự thầu","Tổ chuyên gia căn cứ theo cataloge, đề xuất kỹ thuật kèm theo để làm cơ sở đánh giá","Hồ sơ dự thầu của nhà thầu không được xem xét, đánh giá","Tiếp tục đánh giá hồ sơ dự thầu, trường hơp nhà thầu trúng thầu thì yêu cầu nhà thầu bổ sung, làm rõ các thông tin này"],"answer": "C","explanation": ""},{"stt": "98","question": "Hồ sơ mời thầu của gói thầu xây lắp có quy định cho phép sử dụng nhà thầu phụ, trường hợp nhà thầu đề xuất sử dụng thầu phụ thì việc đánh giá năng lực, kinh nghiệm của nhà thầu phụ được thực hiện như thế nào?","options": ["Đánh giá năng lực, kinh nghiệm của nhà thầu phụ căn cứ theo phần công việc nhà thầu phụ đảm nhận, nhà thầu tham dự thầu không phải đáp ứng về năng lực, kinh nghiệm đối với phần công việc mà nhà thầu phụ đảm nhận","Không đánh giá năng lực, kinh nghiệm của nhà thầu phụ, nhà thầu tham dự thầu vẫn phải đáp ứng về năng lực, kinh nghiệm đối với phần công việc mà nhà thầu phụ đảm nhận","Do chủ đầu tư quyết định đánh giá hoặc không đánh giá năng lực, kinh nghiệm nhà thầu phụ","Đánh giá năng lực, kinh nghiệm của nhà thầu phụ căn cứ theo phần công việc nhà thầu phụ đảm nhận, nhà thầu tham dự thầu cũng phải đáp ứng về năng lực, kinh nghiệm đối với phần công việc mà nhà thầu phụ đảm nhận"],"answer": "B","explanation": ""},{"stt": "99","question": "Đối với đấu thầu qua mạng, trường hợp cần sửa đổi E-HSDT đã nộp trước thời điểm đóng thầu, nhà thầu phải thực hiện theo phương án nào sau đây trong trường hợp E HSMT của gói thầu này không phải sửa đổi?","options": ["Phải tiến hành rút toàn bộ E-HSDT đã nộp trước đó để sửa đổi cho phù hợp và tiến hành nộp lại E-HSDT mới","Không phải tiến hành rút toàn bộ E-HSDT đã nộp trước đó, chỉ cần sửa đổi cho phù hợp và tiến hành nộp lại E-HSDT mới","Sửa đổi cho phù hợp E-HSDT đã nộp mà không phải nộp lại E HSDT mới","Nhà thầu không được sửa đổi E-HSDT đã nộp"],"answer": "A","explanation": ""},{"stt": "100","question": "Đối với đấu thầu qua mạng, nhà thầu đã nộp E-HSDT nhưng sau đó E-HSMT của gói thầu này sửa đổi thì nhà thầu cần thực hiện theo phương án nào sau đây?","options": ["Phải tiến hành rút toàn bộ E-HSDT đã nộp trước đó để sửa đổi cho phù hợp và tiến hành nộp lại E-HSDT mới","Không phải tiến hành rút toàn bộ E-HSDT đã nộp trước đó, chỉ cần sửa đổi cho phù hợp và tiến hành nộp lại E-HSDT mới","Sửa đổi cho phù hợp E-HSDT đã nộp mà không phải nộp lại E HSDT mới","Các phương án trên đều sai"],"answer": "B","explanation": ""},{"stt": "101","question": "Đối với đấu thầu qua mạng, trường hợp nhà thầu rút E-HSDT sau thời điểm đóng thầu và trong thời gian có hiệu lực của E-HSDT thì nhà thầu bị xử lý theo phương án nào sau đây?","options": ["Không được hoàn trả bảo đảm dự thầu","Bị đánh giá là không đảm bảo uy tín khi tham dự thầu","Không được tiếp tục đánh giá E-HSDT","Các phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "102","question": "Trường hợp nào sau đây, nhà thầu được đánh giá là không đáp ứng quy định về bảo đảm cạnh tranh khi tham dự thầu gói thầu tổ chức đấu thầu rộng rãi?","options": ["Đơn vị sự nghiệp công lập A thuộc Sở Tài chính tỉnh X tham gia gói thầu do Sở Tài chính tỉnh X là chủ đầu tư mà chức năng, nhiệm vụ của đơn vị sự nghiệp công lập A phù hợp với gói thầu","Đơn vị sự nghiệp công lập A tham gia gói thầu do Chi cục B là chủ đầu tư. Chức năng nhiệm vụ của đơn vị sự nghiệp công lập A phù hợp với tính chất gói thầu. Đơn vị sự nghiệp công lập A và Chi cục B lần lượt là đơn vị sự nghiệp công lập và đơn vị hành chính do Sở Tài Chính tỉnh X trực tiếp quản lý","Đơn vị sự nghiệp công lập A tham gia gói thầu do đơn vị sự nghiệp công lập B là chủ đầu tư và cả hai đơn vị đều là đơn vị sự nghiệp do Sở Tài chính tỉnh X trực tiếp quản lý","Doanh nghiệp C tham gia gói thầu có sử dụng vốn ngân sách nhà nước do đơn vị sự nghiệp công lập A là chủ đầu tư. Đơn vị sự nghiệp công lập A và Doanh nghiệp C đều là đơn vị do Sở X trực tiếp quản lý"],"answer": "B","explanation": ""},{"stt": "103","question": "Nhà thầu có được tham dự thầu với tư cách nhà thầu liên danh trong trường hợp phạm vi công việc của gói thầu mua sắm hàng hóa chỉ gồm 01 hạng mục là hệ thống máy chủ không?","options": ["Được liên danh nếu nhà thầu phân chia công việc trong liên danh theo các công việc thuộc quá trình sản xuất hạng mục trong bảng giá dự thầu","Không được liên danh, nhà thầu chỉ được tham dự với tư cách độc lập do phạm vi công việc chỉ gồm 01 hạng mục","Được liên danh trong trường hợp 01 thành viên thực hiện toàn bộ hạng mục hệ thống máy chủ, thành viên còn lại thực hiện thu xếp tài chính cho gói thầu","Phương án A và C đều đúng"],"answer": "A","explanation": ""},{"stt": "104","question": "Có 4 nhà thầu tham dự thầu gói thầu mua sắm hàng hóa áp dụng phương pháp giá thấp nhất, trong đó: \n- Nhà thầu A, B, D là doanh nghiệp nhỏ và vừa do phụ nữ làm chủ. \n- Nhà thầu A, B, C và D có giá dự thầu sau sửa lỗi, hiệu chỉnh sai lệch, trừ đi giá trị giảm giá lần lượt là: 95 tỷ đồng, 100 tỷ đồng, 100 tỷ đồng và 105 tỷ đồng. \n- Nhà thầu A, B, C và D chứng minh được hàng hóa mình tham dự có tỷ lệ chi phí sản xuất trong nước lần lượt là: 20%, 40%, 45% và 60%. \nTrong trường hợp tất cả nhà thầu đều đáp ứng về kỹ thuật thì nhà thầu nào được xét duyệt trúng thầu?","options": ["Nhà thầu A được xét duyệt trúng thầu","Nhà thầu B được xét duyệt trúng thầu","Nhà thầu C được xét duyệt trúng thầu","Nhà thầu D được xét duyệt trúng thầu"],"answer": "B","explanation": ""},{"stt": "105","question": "Trong lễ mở thầu đối với gói thầu đấu thầu quốc tế không qua mạng, chủ đầu tư xử lý như thế nào khi nhà thầu đề nghị bổ sung thư giảm giá do bị thất lạc trong quá trình nộp hồ sơ dự thầu theo đường bưu điện?","options": ["Chủ đầu tư chấp nhận do đây là lỗi vận chuyển theo bưu điện","Chủ đầu tư không chấp nhận vì thư giảm giá của nhà thầu nộp sau thời điểm đóng thầu","Chủ đầu tư tạm thời ghi nhận nội dung trong thư giảm giá của nhà thầu và trình Người có thẩm quyền quyết định","Chủ đầu tư coi là tình huống trong đấu thầu và xử lý trên cơ sở bảo đảm cạnh tranh, công bằng, minh bạch, hiệu quả kinh tế và trách nhiệm giải trình"],"answer": "B","explanation": ""},{"stt": "106","question": "Nhận định nào sau đây là đúng ?","options": ["Gói thầu xây lắp, hàng hóa và dịch vụ phi tư vấn áp dụng hình thức chào hàng cạnh tranh và sử dụng phương pháp dựa trên kỹ thuật để đánh giá về tài chính và có giá đề nghị trúng thầu vượt giá gói thầu được phép thương thảo về chi phí","Gói thầu mua thuốc áp dụng phương thức một giai đoạn hai túi hồ sơ và sử dụng phương pháp kết hợp giữa kỹ thuật và giá được phép thương thảo về chi phí trong quá trình thương thảo hợp đồng","Gói thầu dịch vụ tư vấn áp dụng hình thức đấu thầu rộng rãi được phép thương thảo về chi phí trong quá trình thương thảo hợp đồng","Không được phép thương thảo về chi phí trong quá trình thương thảo hợp đồng đối với tất cả các gói thầu, trừ trường hợp nhà thầu tự nguyện giảm giá"],"answer": "C","explanation": ""},{"stt": "107","question": "Hợp đồng nào được phép sử dụng để chứng minh hợp đồng tương tự khi tham dự gói thầu cung cấp thuốc có sử dụng ngân sách nhà nước của Bệnh viện?","options": ["Hợp đồng thuốc đã cung cấp thuốc cho cơ sở khám chữa bệnh tư nhân","Hợp đồng thuốc đã cung cấp thuốc cho các cơ sở kinh doanh thuốc","Phương án A và B đều đúng","Phương án A và B đều sai"],"answer": "C","explanation": ""},{"stt": "108","question": "Khi thương thảo hợp đồng đối với gói thầu tư vấn áp dụng đấu thầu rộng rãi qua mạng, trường hợp nào nhà thầu được phép thay đổi nhân sự đã đề xuất trong E-HSDT?","options": ["Không được thay đổi nhân sự đã đề xuất trong E-HSDT trong mọi trường hợp","Được thay đổi nhân sự đã đề xuất trong E-HSDT 01 lần trong trường hợp nhân sự không đáp ứng yêu cầu hoặc không chứng minh được khả năng huy động","Được thay đổi nhân sự đã đề xuất trong E-HSDT trong trường hợp do thời gian đánh giá E-HSDT kéo dài hơn so với dự kiến trong kế hoạch lựa chọn nhà thầu hoặc vì lý do bất khả kháng mà các vị trí nhân sự chủ chốt do nhà thầu đã đề xuất không thể tham gia thực hiện hợp đồng","Phương án B và C đều đúng"],"answer": "C","explanation": ""},{"stt": "109","question": "Đối với gói thầu xây lắp, áp dụng đấu thầu rộng rãi qua mạng, trường hợp hợp đồng tương tự mà nhà thầu cung cấp trong E HSDT không đáp ứng theo yêu cầu của E HSMT, chủ đầu tư xử lý như thế nào?","options": ["Đánh giá nhà thầu không đáp ứng về năng lực, kinh nghiệm. Nhà thầu không được bổ sung, thay thế hợp đồng tương tự khác","Yêu cầu nhà thầu bổ sung, thay thế hợp đồng tương tự khác (được cập nhật từ hồ sơ năng lực của nhà thầu trên Hệ thống). Trường hợp nhà thầu không có hợp đồng đáp ứng yêu cầu của E HSMT thì nhà thầu bị loại","Tiếp tục đánh giá E-HSDT của nhà thầu, trường hợp nhà thầu xếp thứ nhất, cho phép nhà thầu bổ sung, thay thế hợp đồng tương tự khác.","Đồng thời với việc yêu cầu nhà thầu bổ sung hợp đồng thay thế khác thì chủ đầu tư xem xét, điều chỉnh lại yêu cầu về hợp đồng tương tự trong hồ sơ mời thầu"],"answer": "B","explanation": ""},{"stt": "110","question": "Đối với với gói thầu hàng hóa áp dụng đấu thầu rộng rãi không qua mạng, trường hợp nào sau đây thư bảo lãnh hoặc giấy chứng nhận bảo hiểm bảo lãnh dự thầu bị đánh giá là không hợp lệ?","options": ["Thời gian có hiệu lực dài hơn so với yêu cầu của hồ sơ mời thầu","Có giá trị cao hơn so với yêu cầu của hồ sơ mời thầu","Ký trước khi phát hành hồ sơ mời thầu","Tất cả phương án trên đều đúng"],"answer": "C","explanation": ""},{"stt": "111","question": "Gói thầu xây lắp tổ chức đấu thầu qua mạng có thời điểm đóng thầu là ngày 20/3/2025, năm tài chính của nhà thầu là 01/01 – 31/12, nhà thầu là công ty cổ phần được thành lập vào năm 2018 và E-HSMT yêu cầu nhà thầu nộp báo cáo tài chính của 03 năm gần nhất thì nhà thầu phải nộp báo cáo tài chính của các năm nào sau đây?","options": ["2020, 2021, 2022","2021, 2022, 2023","2021, 2022, 2024","2019, 2020, 2021"],"answer": "B","explanation": ""},{"stt": "112","question": "Đối với công trình đang xét là công trình xây dựng có loại kết cấu dạng nhà cấp II với giá trị công trình là 60 tỷ đồng, E-HSMT có yêu cầu về kinh nghiệm thực hiện hợp đồng xây lắp tương tự, trường hợp nào sau đây được đánh giá là một công trình xây lắp tương tự?","options": ["Nhà thầu có 2 công trình xây dựng có loại kết cấu dạng nhà cấp III với giá trị đã hoàn thành toàn bộ lần lượt là 30 tỷ đồng, 50 tỷ đồng","Nhà thầu có 2 công trình xây dựng có loại kết cấu dạng nhà cấp III với giá trị đã hoàn thành toàn bộ lần lượt là 30 tỷ đồng, 20 tỷ đồng","Nhà thầu có 3 công trình xây dựng có loại kết cấu dạng nhà cấp III với giá trị đã hoàn thành toàn bộ lần lượt là 30 tỷ đồng, 20 tỷ đồng, 10 tỷ đồng","Nhà thầu có 1 công trình xây dựng có loại kết cấu dạng nhà cấp III với giá trị đã hoàn thành toàn bộ là 60 tỷ đồng"],"answer": "A","explanation": ""},{"stt": "113","question": "Gói thầu cung cấp dịch vụ vệ sinh tòa nhà do Sở Tài chính tỉnh X làm chủ đầu tư có giá gói thầu 01 tỷ đồng, thời gian thực hiện là 12 tháng, hợp đồng tương tự yêu cầu 30% giá gói thầu. Trường hợp nào sau đây nhà thầu được coi là đáp ứng về giá trị của hợp đồng tương tự?","options": ["Nhà thầu cung cấp hợp đồng A (chưa
