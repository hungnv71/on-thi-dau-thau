 ngày 25/9/2025 - Hiệu lực của bảo đảm dự thầu theo yêu cầu của E-HSMT là: 90 ngày - Do lỗi hệ thống nên Hệ thống tự động gia hạn thời điểm đóng thầu mới là: 11h ngày 26/9/2025 Nhà thầu A đã nộp E-HSDT trước thời điểm Hệ thống xảy ra sự cố với hiệu lực của bảo đảm dự thầu là 90 ngày kể từ ngày 25/9/2025; Nhà thầu B nộp E-HSDT sau khi Hệ thống được khắc phục và trước thời điểm đóng thầu mới với hiệu lực của bảo đảm dự thầu là 90 ngày kể từ ngày 26/9/2025. Trong trường hợp này, bảo đảm dự thầu của nhà thầu A và nhà thầu B được đánh giá như thế nào?","options": ["Bảo đảm dự thầu của nhà thầu A được đánh giá là không hợp lệ; Bảo đảm dự thầu của nhà thầu B được đánh giá là hợp lệ","Bảo đảm dự thầu của nhà thầu A và nhà thầu B đều được đánh giá là hợp lệ","Bảo đảm dự thầu của nhà thầu A được đánh giá là hợp lệ; Bảo đảm dự thầu của nhà thầu B được đánh giá là không hợp lệ","Bảo đảm dự thầu của nhà thầu A và nhà thầu B đều được đánh giá là không hợp lệ"],"answer": "B","explanation": ""},{"stt": "279","question": "So sánh điều kiện xét duyệt trúng thầu giữa phương pháp giá cố định và phương pháp dựa trên kỹ thuật đối với gói thầu dịch vụ tư vấn, điểm chung quyết định để nhà thầu được xếp hạng thứ nhất là gì?","options": ["Có giá dự thầu thấp nhất","Có điểm tổng hợp cao nhất","Có điểm kỹ thuật cao nhất","Có giá đề nghị trúng thầu thấp nhất"],"answer": "C","explanation": ""},{"stt": "280","question": "Phương pháp kết hợp giữa kỹ thuật và giá được áp dụng cho gói thầu tư vấn có đặc điểm nào trong các phương án sau đây?","options": ["Gói thầu tư vấn đơn giản, chi phí thấp","Gói thầu tư vấn có yêu cầu kỹ thuật rất cao, chi phí cố định","Gói thầu tư vấn chú trọng tới cả chất lượng và chi phí thực hiện","Gói thầu tư vấn có quy trình thực hiện đã được tiêu chuẩn hoá"],"answer": "C","explanation": ""},{"stt": "281","question": "Khi sử dụng phương pháp chấm điểm để xây dựng tiêu chuẩn đánh giá về kỹ thuật, mức điểm yêu cầu tối thiểu về kỹ thuật được quy định là bao nhiêu?","options": ["Không thấp hơn 60% tổng số điểm kỹ thuật","Không thấp hơn 70% tổng số điểm kỹ thuật","Không thấp hơn 80% tổng số điểm kỹ thuật","Không thấp hơn 90% tổng số điểm kỹ thuật"],"answer": "B","explanation": ""},{"stt": "282","question": "Đối với gói thầu mua sắm hàng hóa, xây lắp, phi tư vấn, hỗn hợp, phương pháp giá đánh giá được áp dụng cho các hình thức lựa chọn nhà thầu nào?","options": ["Chỉ áp dụng với đấu thầu rộng rãi","Chỉ định thầu và mua sắm trực tiếp","Đấu thầu rộng rãi, đấu thầu hạn chế, chào hàng cạnh tranh","Tất cả hình thức lựa chọn nhà thầu"],"answer": "C","explanation": ""},{"stt": "283","question": "Điều kiện nào sau đây là bắt buộc đối với nhà thầu xây lắp nhưng không được đề cập trong điều kiện xét duyệt trúng thầu đối với nhà thầu tư vấn là tổ chức?","options": ["Có hồ sơ dự thầu hợp lệ","Có giá đề nghị trúng thầu không vượt giá gói thầu","Có đề xuất kỹ thuật đáp ứng yêu cầu","Có giá trị phần sai lệch thiếu không quá 10% giá dự thầu"],"answer": "D","explanation": ""},{"stt": "284","question": "Khi sửa đổi hợp đồng làm thay đổi thời gian thực hiện nhưng không vượt thời gian thực hiện dự án, ai có quyền quyết định sửa đổi hợp đồng?","options": ["Người có thẩm quyền","Chủ đầu tư","Cơ quan quản lý cấp trên của chủ đầu tư","Bên mời thầu"],"answer": "B","explanation": ""},{"stt": "285","question": "Thời gian có hiệu lực của bảo đảm thực hiện hợp đồng được tính từ khi nào đến khi nào?","options": ["Từ ngày ký hợp đồng đến ngày thanh toán cuối cùng","Từ ngày hợp đồng có hiệu lực đến ngày các bên hoàn thành nghĩa vụ hoặc chuyển sang thực hiện nghĩa vụ bảo hành đối với trường hợp có quy định về bảo hành","Từ ngày nộp hồ sơ dự thầu đến ngày hoàn thành nghĩa vụ theo hợp đồng","Từ ngày thông báo trúng thầu đến ngày hết thời hạn bảo hành"],"answer": "B","explanation": ""},{"stt": "286","question": "Hợp đồng theo thời gian có thể áp dụng trong trường hợp nào?","options": ["Trong tình trạng khẩn cấp","Sửa chữa, bảo trì công trình, máy móc, thiết bị","Dịch vụ tư vấn khi khó xác định được phạm vi và thời gian thực hiện dịch vụ","Tất cả phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "287","question": "Giá trị bảo đảm thực hiện hợp đồng được xác định dựa trên cơ sở nào?","options": ["Giá gói thầu","Giá hợp đồng","Giá dự thầu của nhà thầu","Tổng mức đầu tư của dự án"],"answer": "B","explanation": ""},{"stt": "288","question": "Trường hợp nào sau đây chủ đầu tư được tự quyết định sửa đổi hợp đồng mà không cần người có thẩm quyền cho phép?","options": ["Sửa đổi hợp đồng làm vượt giá gói thầu đã duyệt và vượt tổng mức đầu tư của dự án","Sửa đổi hợp đồng làm thay đổi thời gian thực hiện hợp đồng nhưng không làm vượt thời gian thực hiện dự án hoặc vượt giá gói thầu (bao gồm dự phòng) được duyệt nhưng không làm vượt tổng mức đầu tư","Sửa đổi hợp đồng làm thay đổi thời gian thực hiện hợp đồng và vượt thời gian thực hiện dự án","Sửa đổi hợp đồng làm thay đổi thiết kế cơ sở dẫn đến phải điều chỉnh chủ trương đầu tư"],"answer": "B","explanation": ""},{"stt": "289","question": "Các bên không phải ký kết văn bản sửa đổi hợp đồng khi thay đổi giá hợp đồng nếu đáp ứng đủ điều kiện nào sau đây?","options": ["Không vượt giá gói thầu, nhưng có thể vượt thời gian thực hiện gói thầu ghi trong hợp đồng","Không vượt giá gói thầu, không vượt thời gian thực hiện gói thầu ghi trong hợp đồng và phương pháp, công thức, hạng mục và các nội dung cần thiết để điều chỉnh đã quy định trong hợp đồng","Không vượt thời gian thực hiện gói thầu ghi trong hợp đồng nhưng có thể vượt giá gói thầu","Khi thay đổi thời gian thực hiện hợp đồng nhưng không làm vượt thời gian thực hiện dự án hoặc vượt giá gói thầu (bao gồm dự phòng) được duyệt nhưng không làm vượt tổng mức đầu tư"],"answer": "B","explanation": ""},{"stt": "290","question": "Đâu là điểm khác biệt chính giữa hợp đồng theo đơn giá cố định và hợp đồng theo đơn giá điều chỉnh?","options": ["Hợp đồng theo đơn giá cố định áp dụng cho gói thầu có thời gian thực hiện dài, hợp đồng theo đơn giá điều chỉnh áp dụng cho gói thầu có thời gian thực hiện ngắn","Đơn giá trong hợp đồng đơn giá cố định không thay đổi, còn đơn giá trong hợp đồng đơn giá điều chỉnh có thể thay đổi","Hợp đồng theo đơn giá cố định không có chi phí dự phòng, còn hợp đồng theo đơn giá điều chỉnh có chi phí dự phòng","Hợp đồng theo đơn giá cố định chỉ áp dụng cho gói thầu dịch vụ tư vấn, hợp đồng theo đơn giá điều chỉnh áp dụng cho gói thầu xây lắp"],"answer": "B","explanation": ""},{"stt": "291","question": "So sánh hai tình huống sửa đổi hợp đồng: (1) Vượt giá gói thầu 10% nhưng không vượt tổng mức đầu tư; (2) Vượt giá gói thầu 2% và làm tổng mức đầu tư tăng 1%, thẩm quyền phê duyệt có gì khác nhau?","options": ["Cả 2 tình huống đều do chủ đầu tư quyết định","Tình huống (1) do chủ đầu tư quyết định, tình huống (2) phải trình người có thẩm quyền xem xét, quyết định","Cả 2 tình huống đều do người có thẩm quyền quyết định","Tình huống (1) phải trình người có thẩm quyền cho phép, tình huống (2) do Chủ tịch Uỷ ban nhân dân tỉnh quyết định"],"answer": "B","explanation": ""},{"stt": "292","question": "Loại hợp đồng nào được áp dụng khi tại thời điểm lựa chọn nhà thầu chưa đủ cơ sở xác định phạm vi công việc, nhu cầu cần thiết về các yếu tố, chi phí đầu vào để thực hiện các công việc dự kiến của hợp đồng?","options": ["Hợp đồng trọn gói","Hợp đồng theo chi phí cộng phí","Hợp đồng theo đơn giá cố định","Hợp đồng theo kết quả đầu ra"],"answer": "B","explanation": ""},{"stt": "293","question": "Gói thầu xây lắp A được phê duyệt KHLCNT với thời gian thực hiện gói thầu là 120 ngày. Trong quá trình thực hiện Hợp đồng, do có phát sinh dẫn tới thời gian thực hiện gói thầu bị kéo dài thành 180 ngày. Trong trường hợp này, chủ đầu tư xử lý như thế nào?","options": ["Báo cáo người có thẩm quyền trước khi điều chỉnh thời gian thực hiện gói thầu trong kế hoạch lựa chọn nhà thầu đã được phê duyệt","Chủ đầu tư thực hiện điều chỉnh thời gian thực hiện gói thầu trong kế hoạch lựa chọn nhà thầu đã được phê duyệt mà u thầu rộng rãi không qua mạng, nếu sau khi đóng thầu, nhà thầu tự phát hiện hồ sơ dự thầu thiếu tài liệu chứng minh năng lực, kinh nghiệm thì nhà thầu nên làm gì?","options": ["Trường hợp chủ đầu tư có yêu cầu bổ sung, làm rõ nhà thầu mới được bổ sung tài liệu chứng minh năng lực, kinh nghiệm","Được phép gửi tài liệu đến chủ đầu tư để làm rõ về năng lực, kinh nghiệm","Không được bổ sung tài liệu chứng minh năng lực, kinh nghiệm còn thiếu","Rút hồ sơ dự thầu để nộp lại"],"answer": "B","explanation": ""},{"stt": "312","question": "Trường hợp nào nhà thầu được quyền từ chối hoàn thiện hợp đồng mà không bị đánh giá về uy tín khi tham dự thầu, không bị tịch thu bảo đảm dự thầu?","options": ["Nhà thầu được quyền từ chối hoàn thiện hợp đồng trong mọi trường hợp","Khi chủ đầu tư đưa ra các yêu cầu khi hoàn thiện hợp đồng không phù hợp với nội dung hồ sơ mời thầu, hồ sơ dự thầu","Khi nhà thầu đề nghị điều chỉnh đơn giá hạng mục mà nhà thầu đã chào theo yêu cầu của hồ sơ mời thầu nhưng chủ đầu tư không chấp nhận","Phương án B và C đều đúng"],"answer": "B","explanation": ""},{"stt": "313","question": "Đối với đấu thầu không qua mạng, trường hợp hồ sơ dự thầu của nhà thầu có sai lệch thiếu sau khi hiệu chỉnh sai lệch vẫn được xếp hạng thứ nhất và hồ sơ dự thầu của nhà thầu này không có đơn giá của phần sai lệch thiếu, đơn giá nào sẽ được ưu tiên áp dụng đầu tiên để đề nghị trúng thầu?","options": ["Đơn giá trong dự toán gói thầu","Đơn giá tương ứng có giá trị thấp nhất trong các hồ sơ dự thầu khác vượt qua bước đánh giá về kỹ thuật","Đơn giá hình thành giá gói thầu","Đơn giá tương ứng có giá trị cao nhất trong các hồ sơ dự thầu khác vượt qua bước đánh giá về kỹ thuật"],"answer": "B","explanation": ""},{"stt": "314","question": "Đối với gói thầu bảo hiểm, nhà thầu tham dự thầu có được xuất trình giấy chứng nhận bảo hiểm bảo lãnh do chính mình phát hành không?","options": ["Được dùng giấy chứng nhận bảo hiểm bảo lãnh do chính mình phát hành nếu nhà thầu là doanh nghiệp bảo hiểm ư số 20/2022/TT-BKHĐT"],"answer": "B","explanation": ""},{"stt": "329","question": "Việc đấu thầu thuốc theo quy định của Hiệp định thương mại tự do giữa Cộng hòa xã hội chủ nghĩa Việt Nam và Liên minh Châu Âu (EVFTA) được Chính phủ giao cơ quan, tổ chức nào hướng dẫn?","options": ["Bộ Tư pháp","Bộ Y tế","Bộ Tài chính","Bộ Công Thương"],"answer": "B","explanation": ""},{"stt": "330","question": "Việt Nam chính thức trở thành thành viên của Hiệp định mua sắm chính phủ của WTO (GPA) từ năm nào?","options": ["2018","2019","2020","Việt Nam chưa phải là thành viên của GPA"],"answer": "D","explanation": ""},{"stt": "331","question": "Theo quy định tại Nghị định số 95/2020/NĐ CP (được sửa đổi, bổ sung tại Nghị định số 09/2022/NĐ-CP, Nghị định số 17/2025/NĐ CP), khái niệm Nước thành viên không bao gồm:","options": ["Nước thành viên Hiệp định Đối tác Toàn diện và Tiến bộ Xuyên Thái Bình Dương (CPTPP)","Nước thành viên EU","Vương quốc Anh và Bắc Ai-len","Các nước ASEAN chưa gia nhập Hiệp định CPTPP"],"answer": "D","explanation": ""},{"stt": "332","question": "Đối với gói thầu thuộc phạm vi điều chỉnh của Hiệp định Đối tác Toàn diện và Tiến bộ Xuyên Thái Bình Dương (CPTPP), ngôn ngữ sử dụng trong đấu thầu nội khối là:","options": ["Chỉ tiếng Việt","Chỉ tiếng Anh","Tiếng Việt; hoặc tiếng Việt và tiếng Anh","Bất kỳ ngôn ngữ nào của các nước thành viên"],"answer": "C","explanation": ""},{"stt": "333","question": "Theo quy định tại Thông tư số 21/2022/TT BKHĐT, hồ sơ mời thầu gói thầu dịch vụ phi tư vấn không được đưa ra yêu cầu nào sau đây:","options": ["Yêu cầu về năng lực","Yêu cầu về kinh nghiệm","Yêu cầu nhà thầu phải có kinh nghiệm cung cấp dịch vụ trong lãnh thổ của một quốc gia cụ thể","Yêu cầu về chất lượng dịch vụ"],"answer": "C","explanation": ""},{"stt": "334","question": "Trong Hiệp định Đối tác Toàn diện và Tiến bộ Xuyên Thái Bình Dương (CPTPP), việc áp dụng biện pháp ưu đãi trong nước:","options": ["Được phép áp dụng vĩnh viễn","Không bao giờ được phép áp dụng","Được phép áp dụng trong thời gian chuyển tiếp","Tùy quy mô, tính chất từng gói thầu"],"answer": "C","explanation": ""},{"stt": "335","question": "Đối với gói thầu thuộc phạm vi điều chỉnh của Hiệp định Đối tác Toàn diện và Tiến bộ xuyên Thái Bình Dương (CPTPP), Nghị định số 95/2020/NĐ-CP quy định những hình thức lựa chọn nhà thầu nào?","options": ["Đấu thầu hạn chế và chỉ định thầu","Chỉ có chỉ định thầu","Đấu thầu rộng rãi và chỉ định thầu","Chỉ có đấu thầu rộng rãi"],"answer": "C","explanation": ""},{"stt": "336","question": "Hiệp định Đối tác Toàn diện và Tiến bộ Xuyên Thái Bình Dương (CPTPP) có cho phép áp dụng đấu thầu qua mạng không?","options": ["Không cho phép","Bắt buộc phải áp dụng","Khuyến khích áp dụng","Tùy quy mô, tính chất từng gói thầu"],"answer": "C","explanation": ""},{"stt": "337","question": "Gói thầu mua thuốc là gói thầu nào?","options": ["Gói thầu mua sắm hàng hóa","Gói thầu cung cấp dịch vụ phi tư vấn","Gói thầu hỗn hợp","Gói thầu xây lắp"],"answer": "A","explanation": ""},{"stt": "338","question": "Đàm phán giá được áp dụng trong trường hợp nào sau đây?","options": ["Mua vật tư tiêu hao","Mua thuốc, thiết bị y tế, vật tư xét nghiệm chỉ có 01 hoặc 02 hãng sản xuất","Mua hàng hóa chỉ có 01 hãng sản xuất","Mua hàng hóa chỉ có 01 hoặc 02 hãng sản xuất"],"answer": "B","explanation": ""},{"stt": "339","question": "Thời gian có hiệu lực thi hành của Luật số 90/2025/QH15?","options": ["Từ ngày 01 tháng 7 năm 2025","Từ ngày 04 tháng 8 năm 2025","Từ ngày 08 tháng 8 năm 2025","Tất cả các đáp án trên đều sai"],"answer": "A","explanation": ""},{"stt": "340","question": "Thông tư số 80/2025/TT-BTC quy định chi tiết mẫu hồ sơ yêu cầu, báo cáo đánh giá, báo cáo thẩm định, kiểm tra, báo cáo tình hình thực hiện hoạt động đấu thầu có hiệu lực từ thời điểm nào?","options": ["Ngày 08/8/2025","Ngày 04/8/2025","Ngày 01/8/2025","Ngày 01/7/2025"],"answer": "A","explanation": ""},{"stt": "341","question": "Nhận định nào sau đây về việc sử dụng hợp đồng điện tử đối với gói thầu sử dụng vốn ngân sách nhà nước là đúng?","options": ["Bắt buộc sử dụng hợp đồng điện tử đối với tất cả gói thầu tổ chức lựa chọn nhà thầu qua mạng và không qua mạng theo hình thức đấu thầu rộng rãi, đấu thầu hạn chế, chào hàng cạnh tranh, chào giá trực tuyến, mua sắm trực tuyến mà việc thanh toán hợp đồng được thực hiện qua Kho bạc nhà nước","Bắt buộc sử dụng hợp đồng điện tử đối với gói thầu áp dụng hình thức đặt hàng, chỉ định thầu, mua sắm trực tiếp, đàm phán giá, lựa chọn nhà thầu trong trường hợp đặc biệt, gói thầu có sự tham gia của cộng đồng, lựa chọn tư vấn cá nhân theo quy trình rút gọn","Bắt buộc sử dụng hợp đồng điện tử đối với các gói thầu mà việc thanh toán hợp đồng không được thực hiện qua Kho bạc nhà nước","Bắt buộc sử dụng hợp đồng điện tử đối với tất cả gói thầu tổ chức lựa chọn nhà thầu trên Hệ thống mạng đấu thầu Quốc gia theo hình thức đấu thầu rộng rãi, đấu thầu hạn chế, chào hàng cạnh tranh, chào giá trực tuyến, mua sắm trực tuyến mà việc thanh toán hợp đồng được thực hiện qua Kho bạc nhà nước"],"answer": "D","explanation": ""},{"stt": "342","question": "Đối với gói thầu đã áp dụng sơ tuyển, trường hợp năng lực và kinh nghiệm của nhà thầu vượt qua bước sơ tuyển khi nộp E-HSDT có sự thay đổi so với khi tham dự sơ tuyển, thì nhà thầu cần phải?","options": ["Cập nhật lại năng lực và kinh nghiệm của mình khi tham dự thầu","Chỉ phải đính kèm hồ sơ năng lực và kinh nghiệm của mình khi tham dự thầu","Không phải cập nhật năng lực và kinh nghiệm của mình khi tham dự thầu nhưng phải đính kèm hồ sơ năng lực và kinh nghiệm","Phương án A và C đúng"],"answer": "A","explanation": ""},{"stt": "343","question": "Đối với đấu thầu qua mạng, nội dung nào sau đây là đúng khi đánh giá E-HSDT?","options": ["Quy trình 02 áp dụng đối với gói thầu mua sắm hàng hóa, dịch vụ phi tư vấn, máy đặt, máy mượn theo phương thức một giai đoạn một túi hồ sơ, sử dụng phương pháp “giá thấp nhất” và các nhà thầu, E-HSDT đều không có bất kỳ ưu đãi nào","Hệ thống tự động xếp hạng nhà thầu theo giá dự thầu sau khi trừ đi giá trị giảm giá (nếu có) thấp nhất (không phải phê duyệt danh sách xếp hạng nhà thầu) đối với gói thầu áp dụng quy trình 02","Trường hợp có từ 02 nhà thầu trở lên cùng xếp thứ nhất thì không đánh giá theo quy trình 02 mà phải đánh giá theo quy trình 01","Cả 3 đáp án đều đúng"],"answer": "D","explanation": ""},{"stt": "344","question": "Việc đánh giá E-HSDT gói thầu mua sắm hàng hóa theo quy trình 02 được thực hiện theo trình tự nào sau đây?","options": ["Đánh giá E-HSDT của tất cả nhà thầu tham dự thầu về: tính hợp lệ của E-HSDT; năng lực và kinh nghiệm; kỹ thuật. Trường hợp nhà thầu không đáp ứng bước trước thì không tiếp tục đánh giá bước tiếp theo","Đánh giá E-HSDT của nhà thầu xếp hạng thứ nhất về: tính hợp lệ của E-HSDT; năng lực và kinh nghiệm; kỹ thuật. Trường hợp nhà thầu xếp hạng thứ nhất không đáp ứng thì đánh giá đối với nhà thầu xếp hạng tiếp theo","Đánh giá E-HSDT của nhà thầu xếp hạng thứ nhất về: tính hợp lệ của E-HSDT; kỹ thuật; tài chính; năng lực và kinh nghiệm. Trường hợp nhà thầu xếp hạng thứ nhất không đáp ứng thì đánh giá đối với nhà thầu xếp hạng tiếp theo","Đánh giá E-HSDT của tất cả nhà thầu tham dự thầu về: tính hợp lệ của E-HSDT; kỹ thuật; tài chính; năng lực và kinh nghiệm. Trường hợp nhà thầu không đáp ứng bước trước thì không tiếp tục đánh giá bước tiếp theo"],"answer": "B","explanation": ""},{"stt": "345","question": "Gói thầu phi tư vấn có giá gói thầu 2 tỷ đồng thực hiện đấu thầu rộng rãi qua mạng đóng thầu ngày 11/11/2025 (Thứ 3), Chủ đầu tư tiếp nhận nội dung yêu cầu làm rõ của nhà thầu ngày 04/11/2025. Chủ đầu tư phải trả lời yêu cầu làm rõ E-HSMT trên Hệ thống chậm nhất ngày nào dưới đây để đảm bảo không phải gia hạn thời điểm đóng thầu?","options": ["Thứ tư ngày 05/11/2025","Thứ năm ngày 06/11/2025","Thứ sáu ngày 07/11/2025","Thứ 7 ngày 08/11/2025"],"answer": "C","explanation": ""},{"stt": "346","question": "Sau khi có quyết định phê duyệt kết quả lựa chọn nhà thầu, nhận định nào sau đây không đúng?","options": ["Chủ đầu tư đăng tải kết quả lựa chọn nhà thầu trên Hệ thống trong vòng 05 ngày làm việc kể từ ngày phê duyệt kết quả lựa chọn nhà thầu.","Nhà thầu gửi đề nghị trên Hệ thống hoặc gặp trực tiếp Chủ đầu tư yêu cầu giải thích lý do cụ thể nhà thầu không trúng thầu.","Chủ đầu tư có trách nhiệm trả lời yêu cầu giải thích lý do cụ thể nhà thầu không trúng thầu của nhà thầu trong thời hạn 02 ngày làm việc kể từ ngày nhận được yêu cầu của nhà thầu","Chủ đầu tư gửi văn bản thông báo kết quả lựa chọn nhà thầu cho các nhà thầu tham dự thầu trong thời hạn 03 ngày làm việc kể từ ngày phê duyệt kết quả lựa chọn nhà thầu"],"answer": "D","explanation": ""},{"stt": "347","question": "Đối với đấu thầu qua mạng, nhận định nào sau đây về thông báo chấp thuận E-HSDT và trao hợp đồng là đúng?","options": ["Chủ đầu tư gửi thông báo chấp thuận E-HSDT và trao hợp đồng (sau khi đăng tải kết quả lựa chọn nhà thầu) trên Hệ thống cho nhà thầu trúng thầu; thông báo bao gồm cả yêu cầu về biện pháp bảo đảm thực hiện hợp đồng, thời gian hoàn thiện, ký kết hợp đồng.","Thông báo chấp thuận E-HSDT và trao hợp đồng là một phần của hồ sơ hợp đồng","Thời hạn nêu trong thông báo chấp thuận E-HSDT và trao hợp đồng được tính kể từ ngày Chủ đầu tư gửi thông báo chấp thuận cho nhà thầu trúng thầu trên Hệ thống.","Tất cả các phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "348","question": "Trong chào giá trực tuyến rút gọn, nhận định nào sau đây về giá trần là đúng?","options": ["Đối với loại hợp đồng trọn gói, loại hợp đồng theo đơn giá cố định hoặc đơn giá điều chỉnh, giá trần là giá gói thầu trong kế hoạch lựa chọn nhà thầu được duyệt bao gồm phần chi phí dự phòng hoặc dự toán gói thầu bao gồm phần chi phí dự phòng trong trường hợp dự toán duyệt sau khi phê duyệt kế hoạch lựa chọn nhà thầu.","Đối với loại hợp đồng trọn gói, giá trần là giá gói thầu trong kế hoạch lựa chọn nhà thầu được duyệt hoặc dự toán gói thầu trong trường hợp dự toán duyệt sau khi phê duyệt kế hoạch lựa chọn nhà thầu","Đối với loại hợp đồng theo đơn giá cố định hoặc đơn giá điều chỉnh, giá trần là giá gói thầu trong kế hoạch lựa chọn nhà thầu được duyệt chưa bao gồm phần chi phí dự phòng hoặc dự toán gói thầu chưa bao gồm chi phí dự phòng của gói thầu trong trường hợp dự toán duyệt sau khi phê duyệt kế hoạch lựa chọn nhà thầu","Cả phương án B và C đều đúng"],"answer": "D","explanation": ""},{"stt": "349","question": "Trong chào giá trực tuyến rút gọn, bước giá được tính như thế nào?","options": ["Giá trị trong khoảng từ 0,1% đến 0,3% giá trần","Giá trị trong khoảng từ 0,5% đến 0.8% giá trần","Giá trị trong khoảng từ 01% đến 02% giá trần","Giá trị trong khoảng từ 01% đến 03% giá trần"],"answer": "A","explanation": ""},{"stt": "350","question": "Trường hợp gặp sự cố dẫn đến Hệ thống mạng đấu thầu quốc gia không thể vận hành và việc khắc phục sự cố dự kiến diễn ra trong thời gian dài, cơ quan nào có trách nhiệm thông báo về cách thức lựa chọn nhà thầu?","options": ["Bộ Tài chính","Cục Quản lý đấu thầu","Trung tâm Đấu thầu qua mạng quốc gia","Tất cả các phương án trên đều đúng"],"answer": "A","explanation": ""},{"stt": "351","question": "Trường hợp gặp sự cố dẫn đến Hệ thống mạng đấu thầu quốc gia không thể vận hành và việc khắc phục sự cố dự kiến diễn ra trong thời gian dài, Bộ Tài chính thông báo ở đâu?","options": ["Cổng thông tin điện tử của Chính phủ","Cổng thông tin điện tử của Bộ Tài chính","Hệ thống mạng đấu thầu quốc gia","Tất cả phương án trên đều đúng"],"answer": "C","explanation": ""},{"stt": "352","question": "Đối với gói thầu mua sắm hàng hóa, trường hợp cần yêu cầu về hàng mẫu để đánh giá về kỹ thuật thì nhận định nào sau đây là đúng?","options": ["Nhà thầu có thể nộp bổ sung hàng mẫu trong thời hạn 05 ngày làm việc sau thời điểm đóng thầu","Chủ đầu tư phải bảo đảm việc yêu cầu cung cấp hàng mẫu không dẫn đến làm tăng chi phí của gói thầu, hạn chế sự tham gia của nhà thầu hoặc nhằm tạo lợi thế cho một hoặc một số nhà thầu gây ra sự cạnh tranh không bình đẳng","Phương án A và B đều sai","Phương án A và B đều đúng"],"answer": "D","explanation": ""},{"stt": "353","question": "Đối với gói thầu mua sắm hàng hóa, dịch vụ có giá trị dưới 500 triệu đồng áp dụng lựa chọn nhà thầu theo hình thức mua sắm trực tuyến, việc ký kết hợp đồng được thực hiện như thế nào?","options": ["Bắt buộc ký hợp đồng điện tử trên Hệ thống mạng đấu thầu quốc gia","Không bắt buộc ký hợp đồng điện tử, chủ đầu tư quyết định hình thức ký kết","Ký hợp đồng điện tử trên Hệ thống khi việc thanh toán hợp đồng được thực hiện qua Kho bạc nhà nước","Không ký hợp đồng điện tử đối với gói thầu có giá trị nhỏ hơn 500 triệu đồng"],"answer": "C","explanation": ""},{"stt": "354","question": "Nhận định nào sau đây là không phù hợp đối với gói thầu mua sắm hàng hoá áp dụng chào giá trực tuyến theo quy trình rút gọn?","options": ["Chủ đầu tư được nêu yêu cầu cụ thể về xuất xứ, ký mã hiệu, nhãn hiệu, hãng sản xuất, thông số kỹ thuật của hàng hóa và các yêu cầu khác (nếu có) như: lắp đặt, đào tạo, bảo hành...","Chủ đầu tư cần nghiên cứu để đưa ra khoảng thời gian phù hợp giữa ngày giao hàng sớm nhất và ngày giao hàng muộn nhất","Nhà thầu sẽ không đề xuất ngày giao hàng cụ thể mà chỉ cam kết tuân thủ theo yêu cầu của chủ đầu tư tại E-TBMT","Trong quá trình chào giá, mức giá do các nhà thầu chào và tên nhà thầu được công khai trên Hệ thống mạng đấu thầu quốc gia"],"answer": "D","explanation": ""},{"stt": "355","question": "Đối với gói thầu áp dụng theo phương thức một giai đoạn một túi hồ sơ, căn cứ vào E-HSDT của các nhà thầu đã nộp trên Hệ thống và phương pháp đánh giá E-HSDT quy định trong E-HSMT, tổ chuyên gia được chọn quy trình 02 để đánh giá E-HSDT trong trường hợp nào sau đây?","options": ["Gói thầu mua sắm hàng hóa, dịch vụ phi tư vấn, máy đặt, máy mượn theo phương thức một giai đoạn một túi hồ sơ, sử dụng phương pháp “giá thấp nhất” và các nhà thầu, E-HSDT đều không có bất kỳ ưu đãi nào","Gói thầu mua sắm hàng hóa, dịch vụ tư vấn theo phương thức một giai đoạn một túi hồ sơ, sử dụng phương pháp “giá thấp nhất” và các nhà thầu, E-HSDT đều không có bất kỳ ưu đãi nào","Gói thầu xây lắp theo phương thức một giai đoạn một túi hồ sơ, sử dụng phương pháp “giá thấp nhất”","Cả 3 phương án đều sai"],"answer": "A","explanation": ""},{"stt": "356","question": "Khi xây dựng hồ sơ yêu cầu đối với hình thức chỉ định thầu, chủ đầu tư quy định nhà thầu chuẩn bị 01 bản gốc và tối đa bao nhiêu bản chụp hồ sơ đề xuất?","options": ["01 bản chụp","02 bản chụp","03 bản chụp","04 bản chụp"],"answer": "C","explanation": ""},{"stt": "357","question": "Trong chào giá trực tuyến theo quy trình rút gọn gói thầu hàng hóa, phát biểu nào sau đây không đúng?","options": ["Đối với lần chào giá đầu tiên nhà thầu nhập các trọng số là đơn giá của hàng hóa nhà thầu dự kiến xác định sẽ chào","Nhà thầu không được thay đổi trọng số của từng hạng mục hàng hóa trong quá trình chào","giá","Nhà thầu cần nghiên cứu công thức tính thành tiền và đơn giá dự thầu từ các trọng số để đề xuất các trọng số cho phù hợp"],"answer": "B","explanation": ""},{"stt": "358","question": "Trong chào giá trực tuyến theo quy trình rút gọn, khi nhập trọng số trong lần chào giá đầu tiên, nhà thầu cần làm gì?","options": ["Nhập ngẫu nhiên các giá trị trọng số","Nhập trọng số bằng giá trị khối lượng từng hạng mục","Nhập trọng số là đơn giá dự kiến chào cho từng hạng mục","Không cần nhập trọng số, hệ thống sẽ tự động tính"],"answer": "C","explanation": ""},{"stt": "359","question": "Khi đánh giá E-HSDT đối với gói thầu mua sắm hàng hóa, trường hợp có sự sai khác giữa thông tin kê khai về ký mã hiệu, nhãn hiệu, xuất xứ, hãng sản xuất trong bảng đề xuất về hàng hóa của nhà thầu (Mẫu số 10B chương IV) so với tài liệu đính kèm thì Tổ chuyên gia đánh giá như thế nào?","options": ["Đánh giá theo thông tin trong tài liệu đính kèm trong trường hợp sau khi làm rõ E-HSDT thông tin trong tài liệu đính kèm là chính xác","Đánh giá theo thông tin trong Mẫu số 10B nhà thầu kê khai, trừ trường hợp ký mã hiệu (nếu có), nhãn hiệu, hãng sản xuất kê khai tại Mẫu số 10B không tồn tại trên thị trường.","Loại nhà thầu E-HSDT của nhà thầu do có sự sai khác giữa thông tin kê khai và tài liệu đính kèm.","Phương án A và B đều đúng"],"answer": "B","explanation": ""},{"stt": "360","question": "Đối với đấu thầu qua mạng, khi tham dự gói thầu mua sắm hàng hóa, trong bảng đề xuất về hàng hóa (Mẫu số 10B chương IV), nhà thầu A chào “theo catalog đính kèm” thay vì kê khai thông tin theo Mẫu số 10B. Tổ chuyên gia đánh giá nội dung này trong E-HSDT của nhà thầu như thế nào là phù hợp?","options": ["Tổ chuyên gia đánh giá nội dung này theo Catalog nhà thầu A đính kèm. Nội dung này được tiếp tục đánh giá khi Catalog không tham chiếu đến nhiều hơn 01 ký mã hiệu, nhãn hiệu, hãng sản xuất...cho một loại hàng hóa","Báo cáo chủ đầu tư yêu cầu nhà thầu A làm rõ nội dung này nếu Catalog tham chiếu đến nhiều hơn 01 ký mã hiệu, nhãn hiệu, hãng sản xuất...cho một loại hàng hóa để làm cơ sở đánh giá","E-HSDT của nhà thầu A không được xem xét, đánh giá","Phương án A và B đều đúng"],"answer": "C","explanation": ""},{"stt": "361","question": "Đối với đấu thầu qua mạng, khi tham dự gói thầu mua sắm hàng hóa, trong bảng đề xuất về hàng hóa (Mẫu số 10B chương IV), nhà thầu A chào \"không có\" đối với nội dung ký, mã hiệu. Tuy nhiên, trong quá trình đánh giá, Tổ chuyên gia phát hiện hãng sản xuất có ký, mã hiệu của hàng hóa này. Tổ chuyên gia đánh giá như thế nào trong tình huống này?","options": ["Báo cáo chủ đầu tư yêu cầu nhà thầu A làm rõ nội dung này trên Hệ thống","E-HSDT không được xem xét, đánh giá","Tiếp tục xem xét, đánh giá nếu tài liệu đính kèm của nhà thầu đầy đủ thông tin","Cả 3 phương án đều sai"],"answer": "B","explanation": ""},{"stt": "362","question": "Trường hợp gói thầu đủ điều kiện áp dụng hình thức chỉ định thầu theo quy định tại khoản 1 Điều 78 của Nghị định số 214/2025/NĐ-CP nhưng chủ đầu tư quyết định áp dụng hình thức đấu thầu rộng rãi để lựa chọn nhà thầu thì thời gian chuẩn bị hồ sơ dự thầu là?","options": ["Tối thiểu là 18 ngày kể từ ngày đầu tiên hồ sơ mời thầu được phát hành đến ngày có thời điểm đóng thầu","Tối thiểu là 09 ngày làm việc kể từ ngày đầu tiên hồ sơ mời thầu được phát hành đến ngày có thời điểm đóng thầu","Tối thiểu là 09 ngày kể từ ngày đầu tiên hồ sơ mời thầu được phát hành đến ngày có thời điểm đóng thầu","Tối thiểu là 18 ngày làm việc kể từ ngày đầu tiên hồ sơ mời thầu được phát hành đến ngày có thời điểm đóng thầu"],"answer": "C","explanation": ""},{"stt": "363","question": "Đối với đấu thầu không qua mạng, trường hợp nhà thầu có thư giảm giá, việc hiệu chỉnh sai lệch được thực hiện trên cơ sở nào?","options": ["Giá dự thầu của nhà thầu sau khi trừ đi giá trị giảm giá","Giá đề nghị trúng thầu","Giá gói thầu","Giá dự thầu của nhà thầu chưa trừ đi giá trị giảm giá"],"answer": "D","explanation": ""},{"stt": "364","question": "Đối với gói thầu mua sắm hàng hóa tổ chức đấu thầu rộng rãi qua mạng, trường hợp nhà thầu là liên danh thì nhà thầu chứng minh khả năng thực hiện nghĩa vụ bảo hành như thế nào?","options": ["Từng thành viên liên danh phải cam kết có năng lực thực hiện nghĩa vụ bảo hành theo yêu cầu của E-HSMT và có hợp đồng nguyên tắc với đơn vị có đủ khả năng thực hiện nghĩa vụ bảo hành theo yêu cầu của E-HSMT","Từng thành viên liên danh phải cam kết có năng lực tự thực hiện nghĩa vụ bảo hành theo yêu cầu của E-HSMT hoặc có hợp đồng nguyên tắc với đơn vị có đủ khả năng thực hiện nghĩa vụ bảo hành theo yêu cầu của E-HSMT","Nhà thầu liên danh có cam kết có năng lực thực hiện nghĩa vụ bảo hành theo yêu cầu của E-HSMT và có hợp đồng nguyên tắc với đơn vị có đủ khả năng thực hiện nghĩa vụ bảo hành theo yêu cầu của E-HSMT","Nhà thầu liên danh có cam kết có năng lực tự thực hiện nghĩa vụ bảo hành theo yêu cầu của E-HSMT hoặc có hợp đồng nguyên tắc với đơn vị có đủ khả năng thực hiện nghĩa vụ bảo hành theo yêu cầu của E-HSMT"],"answer": "D","explanation": ""},{"stt": "365","question": "Nội dung nào là không phù hợp quy định đối với yêu cầu về nhân sự chủ chốt của gói thầu mua sắm hàng hóa?","options": ["Không được yêu cầu về huy động nhân sự chủ chốt đối với phần công việc cung cấp","hàng hóa","Chỉ được yêu cầu về huy động nhân sự chủ chốt đối với các dịch vụ liên quan có yếu tố đặc thù, phức tạp cần thiết phải có nhân sự có hiểu biết, nhiều kinh nghiệm đảm nhận","Không được nêu yêu cầu huy động về nhân sự chủ chốt đối với hàng hóa thông dụng, sẵn có trên thị trường, không đòi hỏi nhân sự thực hiện các dịch vụ liên quan phải có trình độ cao"],"answer": "C","explanation": ""},{"stt": "366","question": "Quy định nào dưới đây không đúng về kế hoạch lựa chọn nhà thầu?","options": ["Kế hoạch lựa chọn nhà thầu được lập cho toàn bộ dự án, dự toán mua sắm. Trường hợp chưa đủ điều kiện lập kế hoạch lựa chọn nhà thầu cho toàn bộ dự án, dự toán mua sắm thì lập kế hoạch lựa chọn nhà thầu cho một hoặc một số gói thầu để thực hiện trước","Kế hoạch lựa chọn nhà thầu có thể được lập đồng thời với quá trình lập dự án, dự toán mua sắm hoặc trước khi có quyết định phê duyệt dự án đối với gói thầu cần thực hiện trước khi có quyết định phê duyệt dự án","Trường hợp gói thầu có thời gian thực hiện dài hơn 01 năm, giá gói thầu trong kế hoạch lựa chọn nhà thầu được ghi rõ theo chu kỳ 01 năm hoặc trên cơ sở toàn bộ thời gian thực hiện gói thầu","Kế hoạch lựa chọn nhà thầu phải ghi rõ số lượng gói thầu và nội dung của từng gói thầu"],"answer": "C","explanation": ""},{"stt": "367","question": "Trường hợp Hệ thống chưa trích xuất tự động thông tin về nghĩa vụ nộp thuế của nhà thầu thì nhà thầu nộp tài liệu nào để chứng minh nghĩa vụ nộp thuế?","options": ["Phải bao gồm Tờ khai thuế (thông báo nộp tiền của cơ quan thuế đối với hộ kinh doanh) và giấy nộp tiền có xác nhận của cơ quan thuế được in từ Hệ thống thuế điện tử","Phải bao gồm Tờ khai thuế (thông báo nộp tiền của cơ quan thuế đối với hộ kinh doanh) và xác nhận của cơ quan thuế về việc thực hiện nghĩa vụ thuế","Phải bao gồm Tờ khai thuế (thông báo nộp tiền của cơ quan thuế đối với hộ kinh doanh), giấy nộp tiền có xác nhận của cơ quan thuế được in từ Hệ thống thuế điện tử và xác nhận của cơ quan thuế về việc thực hiện nghĩa vụ thuế.","Phương án A hoặc B đúng"],"answer": "D","explanation": ""},{"stt": "368","question": "Việc phê duyệt dự toán đối với phần công việc tùy chọn mua thêm được áp dụng tại thời điểm nào?","options": ["Trước khi phê duyệt kế hoạch lựa chọn nhà thầu, chủ đầu tư phê duyệt dự toán đối với khối lượng mua thêm","Trước khi phê duyệt kế hoạch lựa chọn nhà thầu, chủ đầu tư trình cấp có thẩm quyền phê duyệt dự toán đối với khối lượng mua thêm","Trong quá trình thực hiện hợp đồng, trường hợp sử dụng khối lượng tùy chọn mua thêm, trước khi thực hiện chủ đầu tư phê duyệt dự toán cho khối lượng mua thêm","Không phải phê duyệt dự toán tùy chọn mua thêm"],"answer": "C","explanation": ""},{"stt": "369","question": "Ban Quản lý dự án đầu tư xây dựng tỉnh tổ chức đấu thầu rộng rãi qua mạng đối với gói thầu xây lắp . Nhà thầu A được xếp hạng nhất tại gói thầu này, tuy nhiên, do trong E-HSDT, nhà thầu A đề xuất 01 nhân sự chủ chốt đã huy động cho hợp đồng khác có thời gian làm việc trùng với thời gian thực hiện gói thầu này. Trong trường hợp này, tổ chuyên gia đánh giá về nhân sự chủ chốt của nhà thầu A như thế nào?","options": ["Nhà thầu A bị loại và không được xem xét trúng thầu","Chủ đầu tư cho phép nhà thầu bổ sung, thay thế tối đa hai lần. Trường hợp nhà thầu không có nhân sự thay thế đáp ứng yêu cầu của E-HSMT thì nhà thầu A bị loại và bị đánh giá về uy tín khi tham dự thầu","Tiếp tục đánh giá theo cam kết của nhà thầu trong đơn dự thầu và xét duyệt trúng thầu đối với nhà thầu A","Nhà thầu A bị loại và bị đánh giá là gian lận trong kê khai về nhân sự chủ chốt"],"answer": "B","explanation": ""},{"stt": "370","question": "Tại Mục 2.1 Chương III E-HSMT gói thầu xây lắp quy định nội dung sau: Trong thời gian từ 01/01/2022 đến thời điểm đóng thầu (năm 2025), nhà thầu đã hoàn thành toàn bộ hoặc hoàn thành phần lớn 01 công trình cấp II, có giá trị là 10 tỷ đồng với tư cách là nhà thầu chính (độc lập hoặc thành viên liên danh), nhà thầu quản lý hoặc nhà thầu phụ. Trường hợp nào sau đây nhà thầu được đánh giá là không đáp ứng yêu cầu về kinh nghiệm thực hiện hợp đồng tương tự?","options": ["Nhà thầu đã hoàn thành toàn bộ 02 công trình cấp III có giá trị lần lượt là 9 tỷ đồng và 11 tỷ đồng; các hợp đồng được ký kết năm 2022, hoàn thành năm 2025 (trước thời điểm đóng thầu)","Nhà thầu đã hoàn thành toàn bộ 01 công trình cấp II có giá trị là 10 tỷ đồng, hợp đồng được ký kết năm 2018, hoàn thành năm 2022","Nhà thầu đã hoàn thành toàn bộ 01 công trình cấp II có giá trị là 10 tỷ đồng, hợp đồng được ký kết năm 2022, hoàn thành năm 2025 (trước thời điểm đóng thầu)","Tất cả phương án trên đều đáp ứng yêu cầu về kinh nghiệm thực hiện hợp đồng tương tự"],"answer": "A","explanation": ""},{"stt": "371","question": "Nhà thầu đã thực hiện công tác lập hồ sơ thiết kế kỹ thuật cho dự án đầu tư xây dựng công trình được phép thực hiện công việc nào?","options": ["Lập hồ sơ mời thầu cho các gói thầu xây lắp, mua sắm hàng hóa thuộc dự án","Lập kế hoạch lựa chọn nhà thầu","Cung cấp dịch vụ tư vấn giám sát thi công công trình của dự án","Tất cả các phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "372","question": "Nội dung nào sau đây không thuộc trách nhiệm của chủ đầu tư?","options": ["Lập báo cáo đánh giá hồ sơ dự thầu","Thương thảo hợp đồng","Phê duyệt hồ sơ mời thầu","Yêu cầu nhà thầu làm rõ hồ sơ dự thầu"],"answer": "A","explanation": ""},{"stt": "373","question": "Nhà thầu tư vấn lập hồ sơ mời thầu gói thầu xây lắp được phép tham dự thầu gói thầu nào?","options": ["Tư vấn đánh giá hồ sơ dự thầu gói thầu xây lắp mà mình đã lập hồ sơ mời thầu","Tư vấn thẩm định kết quả lựa chọn nhà thầu gói thầu xây lắp mà mình đã lập hồ sơ mời thầu","Tư vấn giám sát thi công gói thầu xây lắp mà mình đã lập hồ sơ mời thầu","Tất cả các phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "374","question": "Khi tham dự thầu gói thầu mua sắm hàng hóa, trong hồ sơ dự thầu của nhà thầu tuyên bố giá dự thầu không bao gồm thuế, phí, lệ phí thì được đánh giá như thế nào?","options": ["Hồ sơ dự thầu của nhà thầu không được tiếp tục xem xét, đánh giá","Hồ sơ dự thầu của nhà thầu được tiếp tục xem xét, đánh giá và giá dự thầu của nhà thầu được hiểu là đã bao gồm toàn bộ thuế, phí, lệ phí","Tiến hành hiệu chỉnh sai lệch về thuế, phí, lệ phí của nhà thầu theo quy định","Hồ sơ dự thầu của nhà thầu được tiếp tục xem xét, đánh giá và giá dự thầu của nhà thầu được hiểu là không bao gồm thuế, phí, lệ phí"],"answer": "A","explanation": ""},{"stt": "375","question": "Yêu cầu về nguồn lực tài chính được áp dụng đối với gói thầu nào?","options": ["Tất cả các gói thầu","Chỉ áp dụng đối với gói thầu phi tư vấn, mua sắm hàng hóa","Chỉ áp dụng đối với gói thầu phi tư vấn, mua sắm hàng hóa, xây lắp","Tất cả các phương án trên đều sai"],"answer": "D","explanation": ""},{"stt": "376","question": "Nhà thầu không thực hiện gia hạn hiệu lực hồ sơ dự thầu theo đề nghị của chủ đầu tư thì xử lý như thế nào?","options": ["Không được hoàn trả giá trị bảo đảm dự thầu","Bị đánh giá về uy tín trong tham dự thầu và đăng tải trên hệ thống mạng đấu thầu quốc gia","Được hoàn trả bảo đảm dự thầu cho nhà thầu","Phương án A và B đều đúng"],"answer": "C","explanation": ""},{"stt": "377","question": "Chủ đầu tư dự kiến lựa chọn gói thầu xây lắp theo hình thức chỉ định thầu theo quy trình thông thường. Nhà thầu dự kiến được mời nhận hồ sơ yêu cầu phải?","options": ["Được đánh giá về năng lực và kinh nghiệm","Hạch toán tài chính độc lập","Độc lập về pháp lý và độc lập về tài chính với chủ đầu tư","Các phương án trên đều đúng"],"answer": "B","explanation": ""},{"stt": "378","question": "Doanh nghiệp nhà nước A thực hiện dự án đầu tư có tổng mức đầu tư 1000 tỷ đồng, trong đó vốn từ ngân sách nhà nước là 100 tỷ đồng, vốn tự có của doanh nghiệp là 900 tỷ đồng. Việc lựa chọn nhà thầu của dự án này có phải tuân thủ theo quy định của Luật Đấu thầu?","options": ["Không phải thực hiện theo quy định của Luật Đấu thầu vì vốn ngân sách nhà nước thấp hơn 30% tổng mức đầu tư","Doanh nghiệp nhà nước A được tự quyết định việc lựa chọn nhà thầu trên cơ sở bảo đảm công bằng, minh bạch, hiệu quả và trách nhiệm giải trình","Bắt buộc phải thực hiện theo Luật Đấu thầu","Phương án A và B đều đúng"],"answer": "C","explanation": ""},{"stt": "379","question": "Công ty B do Doanh nghiệp nhà nước A nắm giữ 100% vốn điều lệ, Công ty B thực hiện dự án có tổng mức đầu tư 500 tỷ đồng, trong đó vốn từ ngân sách nhà nước là 100 tỷ đồng, 400 tỷ đồng là vốn tự có của Công ty B. Hỏi việc lựa chọn nhà thầu của dự án này có phải thực hiện theo quy định của Luật Đấu thầu hay không?","options": ["Không phải thực hiện theo quy định của Luật Đấu thầu vì vốn ngân sách nhà nước thấp hơn 30% tổng mức đầu tư","Không phải thực hiện theo quy định của Luật Đấu thầu nhưng phải thực hiện theo quy chế mua sắm của Doanh nghiệp nhà nước A","Công ty B được tự quyết định việc lựa chọn nhà thầu trên cơ sở bảo đảm công bằng, minh bạch, hiệu quả và trách nhiệm giải trình","Bắt buộc phải thực hiện theo Luật Đấu thầu"],"answer": "D","explanation": ""},{"stt": "380","question": "Chủ đầu tư A đang lập E-HSMT cho gói thầu dịch vụ tư vấn, tiêu chuẩn đánh giá về kỹ thuật sử dụng phương pháp kết hợp giữa kỹ thuật và giá (thang điểm 100), điểm yêu cầu tối thiểu về kỹ thuật là 70 điểm, trong đó quy định điểm tối đa đối với từng nội dung như sau: - Kinh nghiệm và năng lực của nhà thầu: 5 điểm - Uy tín của nhà thầu: 5 điểm - Giải pháp và phương pháp luận: 30 điểm - Nhân sự chủ chốt: 60 Quy định nào sau đây về mức điểm yêu cầu tối thiểu về kỹ thuật đối với từng nội dung là phù hợp?","options": ["Kinh nghiệm và năng lực của nhà thầu: 3 điểm; uy tín của nhà thầu: 3 điểm; giải pháp và phương pháp luận: 18 điểm; nhân sự chủ chốt: 36 điểm","Kinh nghiệm và năng lực của nhà thầu: 3.5 điểm; uy tín của nhà thầu: 3,5 điểm; giải pháp và phương pháp luận: 21 điểm; nhân sự chủ chốt: 42 điểm","Kinh nghiệm và năng lực của nhà thầu: 3 điểm; uy tín của nhà thầu: 0 điểm; giải pháp và phương pháp luận: 18 điểm; nhân sự chủ chốt: 36 điểm","Kinh nghiệm và năng lực của nhà thầu: 3.5 điểm; uy tín của nhà thầu: 0 điểm; giải pháp và phương pháp luận: 21 điểm; nhân sự chủ chốt: 42 điểm"],"answer": "C","explanation": ""},{"stt": "381","question": "Giá gói thầu được cập nhật trong thời hạn bao nhiêu ngày trước ngày mở thầu nếu cần thiết?","options": ["28 ngày","18 ngày","7 ngày","7 ngày làm việc"],"answer": "A","explanation": ""},{"stt": "382","question": "Hồ sơ mời sơ tuyển được phát hành như thế nào, thời gian chuẩn bị hồ sơ dự sơ tuyển tối thiểu là bao nhiêu ngày?","options": ["Phát hành miễn phí trên Hệ thống mạng đấu thầu quốc gia, thời gian chuẩn bị tối thiểu là 7 ngày làm việc","Phát hành trên Hệ thống mạng đấu thầu quốc gia với giá 110.000 đồng/hồ sơ, thời gian chuẩn bị tối thiểu là 9 ngày làm việc","Phát hành miễn phí trên Hệ thống mạng đấu thầu quốc gia, thời gian chuẩn bị tối thiểu là 9 ngày làm việc","Phát hành miễn phí trên Hệ thống mạng đấu thầu quốc gia, thời gian chuẩn bị tối thiểu là"],"answer": "D","explanation": ""},{"stt": "383","question": "Chào giá trực tuyến theo quy trình rút gọn được áp dụng trong trường hợp nào?","options": ["Gói thầu mua sắm hàng hóa phải mua của hãng sản xuất cụ thể để bảo đảm tính tương thích về công nghệ, bản quyền với các trang thiết bị, máy móc, phần mềm, dịch vụ sẵn có có giá gói thầu là 20 tỷ đồng","Gói thầu cung cấp dịch vụ phi tư vấn phải mua của hãng sản xuất cụ thể để bảo đảm tính tương thích về công nghệ, bản quyền với các trang thiết bị, máy móc, phần mềm, dịch vụ sẵn có có giá gói thầu là 10 tỷ đồng","Gói thầu mua sắm hàng hóa có giá gói thầu không quá 05 tỷ đồng đối với dự án","Tất cả các phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "384","question": "Đối với gói thầu dịch vụ xây dựng thuộc phạm vi điều chỉnh của H     let currentIndex = 0;
    let userAnswers = {};
    let activeQuestions = questions;
    let examMode = false;
    let autoNextEnabled = true;
    let autoNextTimer = null;

    function toggleAutoNext() {
        autoNextEnabled = document.getElementById('autoNextToggle').checked;
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Lấy mẫu ngẫu nhiên "total" câu, rải đều theo từng dải 50 câu (1-50, 51-100, ...)
    // để đảm bảo đủ chủng loại/chủ đề câu hỏi trong toàn bộ ngân hàng đề.
    function stratifiedSample(total) {
        const blockSize = 50;
        const n = questions.length;
        const blocks = [];
        for (let start = 0; start < n; start += blockSize) {
            blocks.push({ start, end: Math.min(start + blockSize, n) });
        }

        const raw = blocks.map(b => ((b.end - b.start) / n) * total);
        const counts = raw.map(Math.floor);
        let allocated = counts.reduce((a, b) => a + b, 0);
        let remainder = total - allocated;

        const order = raw
            .map((r, i) => ({ i, frac: r - Math.floor(r) }))
            .sort((a, b) => b.frac - a.frac);
        for (let k = 0; k < remainder; k++) {
            counts[order[k % order.length].i]++;
        }

        // Không vượt quá số câu có trong từng dải
        for (let i = 0; i < counts.length; i++) {
            counts[i] = Math.min(counts[i], blocks[i].end - blocks[i].start);
        }

        let pickedIdx = [];
        blocks.forEach((b, i) => {
            const idxInBlock = shuffleArray(
                Array.from({ length: b.end - b.start }, (_, k) => b.start + k)
            ).slice(0, counts[i]);
            pickedIdx = pickedIdx.concat(idxInBlock);
        });

        // Nếu do làm tròn mà vẫn thiếu so với "total", bổ sung ngẫu nhiên từ các câu chưa chọn
        if (pickedIdx.length < total) {
            const pickedSet = new Set(pickedIdx);
            const remaining = shuffleArray(
                Array.from({ length: n }, (_, k) => k).filter(k => !pickedSet.has(k))
            );
            pickedIdx = pickedIdx.concat(remaining.slice(0, total - pickedIdx.length));
        }

        pickedIdx = shuffleArray(pickedIdx);
        return pickedIdx.map(i => questions[i]);
    }

    function buildGrid() {
        const grid = document.getElementById('questionGrid');
        grid.innerHTML = '';
        activeQuestions.forEach((q, index) => {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            btn.id = 'btn-q-' + index;
            btn.innerText = q.stt;
            btn.onclick = () => showQuestion(index);
            grid.appendChild(btn);
        });
        document.getElementById('gridCountLabel').innerText = activeQuestions.length;
    }

    function updateStatsBar() {
        let correct = 0, wrong = 0;
        Object.values(userAnswers).forEach(a => {
            if (a.isCorrect) correct++; else wrong++;
        });
        const remain = activeQuestions.length - correct - wrong;
        document.getElementById('statCorrect').innerText = correct;
        document.getElementById('statWrong').innerText = wrong;
        document.getElementById('statRemain').innerText = remain;
    }

    function resetSession(newQuestions) {
        activeQuestions = newQuestions;
        currentIndex = 0;
        userAnswers = {};
        buildGrid();
        updateStatsBar();
        showQuestion(0);
    }

    function setModeFull() {
        examMode = false;
        document.getElementById('modeFullBtn').classList.add('active');
        document.getElementById('modeExamBtn').classList.remove('active');
        document.getElementById('examOptions').classList.remove('open');
        const badge = document.getElementById('examBadge');
        badge.classList.remove('show');
        badge.innerText = '';
        resetSession(questions);
    }

    function toggleExamOptions() {
        document.getElementById('examOptions').classList.toggle('open');
    }

    function startExam(count) {
        examMode = true;
        document.getElementById('modeFullBtn').classList.remove('active');
        document.getElementById('modeExamBtn').classList.add('active');
        document.getElementById('examOptions').classList.remove('open');
        const badge = document.getElementById('examBadge');
        badge.classList.add('show');
        badge.innerText = '🎲 Đang thi thử: ' + count + ' câu ngẫu nhiên (rải đều toàn bộ 390 câu)';
        resetSession(stratifiedSample(count));
    }

    function init() {
        buildGrid();
        updateStatsBar();
        showQuestion(0);
    }

    function toggleGrid() {
        const content = document.getElementById('gridContent');
        const icon = document.getElementById('gridToggleIcon');
        if (content.style.display === 'block') {
            content.style.display = 'none';
            icon.classList.remove('open');
        } else {
            content.style.display = 'block';
            icon.classList.add('open');
        }
    }

    
function showQuestion(index) {
        clearTimeout(autoNextTimer);
        currentIndex = index;
        const q = activeQuestions[index];
        
        document.getElementById('qNumberBadge').innerText = 'Câu ' + q.stt;
        document.getElementById('qProgress').innerText = (index + 1) + ' / ' + activeQuestions.length;
        document.getElementById('questionText').innerText = q.question;
        
        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';
        
        const letters = ['A', 'B', 'C', 'D'];
        const isAnswered = userAnswers[index] !== undefined;
        
        q.options.forEach((optText, i) => {
            const key = letters[i];
            
            const optDiv = document.createElement('div');
            optDiv.className = 'option';
            optDiv.id = 'opt-' + key;
            
            const letterDiv = document.createElement('div');
            letterDiv.className = 'option-letter';
            letterDiv.innerText = key;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'option-text';
            textDiv.innerText = optText;
            
            optDiv.appendChild(letterDiv);
            optDiv.appendChild(textDiv);
            
            if (isAnswered) {
                optDiv.classList.add('disabled');
                let userAns = userAnswers[index];
                
                // Show correct/wrong colors
                if (key === q.answer) {
                    optDiv.classList.add('correct');
                } else if (key === userAns.selected) {
                    optDiv.classList.add('wrong');
                }
            } else {
                optDiv.onclick = () => selectAnswer(key);
            }
            
            optionsContainer.appendChild(optDiv);
        });

        const feedback = document.getElementById('feedbackBanner');
        feedback.className = 'feedback-banner';
        
        const explBox = document.getElementById('explanationBox');
        if (isAnswered) {
            let userAns = userAnswers[index];
            if (userAns.isCorrect) {
                feedback.innerText = "🎉 Oh Yeah! Bạn thật xuất sắc.";
                feedback.classList.add('correct');
            } else {
                feedback.innerText = "😢 Rất tiếc! Đáp án đúng là: " + q.answer;
                feedback.classList.add('wrong');
            }
            if (q.explanation) {
                explBox.style.display = 'block';
                explBox.innerHTML = '<b>💡 Giải thích:</b> ' + q.explanation;
            } else {
                explBox.style.display = 'none';
            }
        } else {
            explBox.style.display = 'none';
        }

        const hint = document.getElementById('autoNextHint');
        if (isAnswered && autoNextEnabled && index < activeQuestions.length - 1) {
            hint.style.display = 'block';
        } else {
            hint.style.display = 'none';
        }

        // Update grid active state
        document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-q-' + index).classList.add('active');
        
        // Cuộn grid tới câu hiện tại
        const gridBtn = document.getElementById('btn-q-' + index);
        if(gridBtn && document.getElementById('gridContent').style.display === 'block') {
             gridBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function selectAnswer(selectedKey) {
        const q = activeQuestions[currentIndex];
        const isCorrect = (selectedKey === q.answer);

        userAnswers[currentIndex] = {
            selected: selectedKey,
            isCorrect: isCorrect
        };

        // Update grid colors
        const btn = document.getElementById('btn-q-' + currentIndex);
        btn.classList.remove('done-correct', 'done-wrong');
        btn.classList.add(isCorrect ? 'done-correct' : 'done-wrong');

        updateStatsBar();

        // Render again to show colors and feedback
        showQuestion(currentIndex);

        if (autoNextEnabled && currentIndex < activeQuestions.length - 1) {
            autoNextTimer = setTimeout(() => {
                nextQuestion();
            }, 1500);
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) showQuestion(currentIndex - 1);
    }

    function nextQuestion() {
        if (currentIndex < activeQuestions.length - 1) showQuestion(currentIndex + 1);
    }
    
    // Bắt sự kiện phím mũi tên để chuyển câu
    document.addEventListener('keydown', function(e) {
        if(e.key === 'ArrowLeft') prevQuestion();
        if(e.key === 'ArrowRight') nextQuestion();
    });

    init();
</script>
