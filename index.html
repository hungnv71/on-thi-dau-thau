hoàn thành, chưa được thanh lý) có giá trị công việc dịch vụ vệ sinh tòa nhà (đã được nghiệm thu) là 100 triệu đồng; hợp đồng B (chưa hoàn thành, chưa được thanh lý) có giá trị công việc dịch vụ vệ sinh tòa nhà (đã được nghiệm thu) là 250 triệu đồng","Nhà thầu cung cấp hợp đồng A (đã nghiệm thu, đã được thanh lý) có giá trị công việc dịch vụ vệ sinh tòa nhà là 300 triệu đồng","Nhà thầu cung cấp hợp đồng A (chưa hoàn thành, chưa được thanh lý) có giá trị công việc dịch vụ vệ sinh tòa nhà (chưa được nghiệm thu) là 100 triệu đồng; hợp đồng B (chưa hoàn thành, chưa được thanh lý) có giá trị công việc dịch vụ vệ sinh tòa nhà (đã được nghiệm thu) là 400 triệu đồng","Tất cả đáp án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "114","question": "Gói thầu mua sắm trang thiết bị do Sở Tư pháp tỉnh X làm chủ đầu tư có giá gói thầu 03 tỷ đồng, thời gian thực hiện là 12 tháng, trong đó có 02 hạng mục: máy điều hòa (mã HS 8415) giá dự toán 01 tỷ đồng, máy tính xách tay (mã HS 8507) giá dự toán 02 tỷ đồng, hợp đồng tương tự yêu cầu 50% giá gói thầu. Trường hợp nào sau đây nhà thầu được coi là không đáp ứng về giá trị của hợp đồng tương tự?","options": ["Nhà thầu cung cấp 02 hợp đồng, trong đó: 01 hợp đồng đã thực hiện việc cung cấp mã hàng hóa 8415 với giá trị 400 triệu đồng, 01 hợp đồng đã thực hiện việc cung cấp mã hàng hóa 8415 với giá trị 100 triệu đồng và mã hàng hóa 8507 với giá trị 01 tỷ đồng","Nhà thầu cung cấp 01 hợp đồng có đầy đủ các mã hàng hóa 8415 và 8507 và tổng giá trị của mã hàng hóa 8415, 8507 trong hợp đồng đã hoàn thành với giá trị 1, 6 tỷ đồng","Nhà thầu cung cấp 02 hợp đồng, trong đó: 01 hợp đồng đã thực hiện việc cung cấp mã hàng hóa 8415 với giá trị 600 triệu đồng và 01 hợp đồng đã thực hiện việc cung cấp mã hàng hóa 8507 với giá trị 01 tỷ đồng","Phương án A và B đều không đáp ứng về giá trị hợp đồng tương tự"],"answer": "A","explanation": ""},{"stt": "115","question": "Gói thầu cung cấp dịch vụ giặt là thực hiện đấu thầu qua mạng, E-HSMT có quy định cho phép sử dụng nhà thầu phụ tối đa 20% trên giá dự thầu của nhà thầu. Nhà thầu liên danh A-B, trong đó nhà thầu Công ty A đảm nhận 30% giá trị công việc, Công ty B đảm nhận 70% giá trị công việc. Việc sử dụng nhà thầu phụ đối với từng thành viên liên danh được thực hiện như thế nào?","options": ["Công ty A được sử dụng nhà thầu phụ tối đa 20% trên 30% giá trị công việc mà công ty A đảm nhận, Công ty B được sử dụng nhà thầu phụ tối đa 20% trên 70% giá trị công việc mà công ty B đảm nhận","Công ty A được sử dụng nhà thầu phụ tối đa 20% trên tổng giá trị (100%) công việc và Công ty B được sử dụng nhà thầu phụ tối đa 20% trên tổng giá trị (100%) công việc mà Công ty A và Công ty B đảm nhận","Thực hiện theo thỏa thuận giữa Công ty A và Công ty B, Công ty A hoặc Công ty B được sử dụng nhà thầu phụ tối đa 20% trên tổng giá trị (100%) công việc nhưng phải bảo đảm tổng khối lượng công việc của nhà thầu phụ của liên danh A-B tối đa 20% trên tổng giá trị (100%) công việc mà Công ty A và Công ty B đảm nhận","Tất cả đáp án trên đều đúng"],"answer": "A","explanation": ""},{"stt": "116","question": "Nhà thầu liên danh A-B tham dự thầu và nộp bảo đảm dự thầu riêng rẽ, trong quá trình đánh giá hồ sơ dự thầu tổ chuyên gia có bằng chứng cho thấy nhà thầu A có hành vi gian lận, thuộc hành vi bị cấm trong đấu thầu, trong trường hợp này bảo đảm dự thầu của nhà thầu liên danh xử lý như thế nào?","options": ["Không hoàn trả bảo đảm dự thầu của cả nhà thầu liên danh A-B","Không hoàn trả bảo đảm dự thầu của nhà thầu A","Không hoàn trả bảo đảm dự thầu của nhà thầu B","Nhà thầu A và nhà thầu B vẫn được hoàn trả bảo đảm dự thầu"],"answer": "A","explanation": ""},{"stt": "117","question": "Gói thầu đang xét là gói thầu giặt cho bệnh viện công lập (có tính chất công việc lặp lại theo chu kỳ qua các năm), có thời gian thực hiện gói thầu trong 3 năm với giá gói thầu là 12 tỷ đồng. Nhà thầu nào được xác định đáp ứng yêu cầu về giá trị hợp đồng tương tự khi tham dự gói thầu này?","options": ["Nhà thầu A có 01 hợp đồng giặt là X cho bệnh viện công lập có thời gian thực hiện gói thầu là 48 tháng (đang trong quá trình thực hiện, chưa hoàn thành, chưa được thanh lý), nhưng tính đến thời điểm tham dự thầu, nhà thầu A đã thực hiện được 24 tháng, trong đó giá trị công việc đã được nghiệm thu 12 tháng đầu là 1,2 tỷ đồng;","Nhà thầu B cung cấp 02 hợp đồng, trong đó có hợp đồng giặt X cho khách sạn tư nhân, thời gian thực hiện hợp đồng trong 06 tháng với giá trị là 300 triệu đồng; Hợp đồng giặt là Y cho bệnh viện công lập, thời gian thực hiện hợp đồng trong 24 tháng với giá trị là 3 tỷ đồng, trong đó giá trị công việc đã được nghiệm thu 12 tháng đầu là 1 tỷ đồng.","Nhà thầu A và B đều đáp ứng","Nhà thầu A và B đều không đáp ứng"],"answer": "C","explanation": ""},{"stt": "118","question": "Trường hợp E-HSMT gói thầu xây lắp yêu cầu về cam kết cung cấp tín dụng, nhà thầu được chứng minh bằng cách nào?","options": ["Bằng số dư tài khoản hoặc tiền gửi tiết kiệm từ ngân hàng","Bằng cam kết cung cấp tín dụng của ngân hàng","Bằng xác nhận số dư hạn mức tín dụng khả dụng từ ngân hàng","Tất cả các phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "119","question": "Hợp đồng theo tỷ lệ phần trăm có thể được áp dụng đối với gói thầu nào sau đây?","options": ["Mua sắm thiết bị y tế","Xây dựng công trình","Bảo hiểm công trình mà giá trị hợp đồng được xác định chính xác trên cơ sở giá trị công trình thực tế được nghiệm thu","Tư vấn giám sát"],"answer": "C","explanation": ""},{"stt": "120","question": "Cơ sở để thanh toán hợp đồng cho nhà thầu là gì?","options": ["Giá hợp đồng và các điều khoản cụ thể về thanh toán được ghi trong hợp đồng","Dự toán gói thầu và các điều khoản cụ thể về thanh toán được ghi trong hợp đồng","Dự toán gói thầu","Phương án A và C đều sai"],"answer": "A","explanation": ""},{"stt": "121","question": "Nhà thầu không được hoàn trả bảo đảm thực hiện hợp đồng trong trường hợp nào?","options": ["Từ chối thực hiện hợp đồng khi hợp đồng đã có hiệu lực","Thực hiện hợp đồng chậm tiến độ nhưng vẫn hoàn thành hợp đồng","Nhà thầu đề nghị điều chỉnh tiến độ do bất khả kháng","Nhà thầu đề xuất thay đổi nhà thầu phụ"],"answer": "A","explanation": ""},{"stt": "122","question": "Trường hợp nào sau đây phải áp dụng bảo đảm thực hiện hợp đồng?","options": ["Nhà thầu cung dịch vụ phi tư vấn","Nhà thầu thực hiện gói thầu có giá gói thầu thuộc hạn mức chỉ định thầu","Nhà thầu cung cấp dịch vụ tư vấn","Nhà thầu được lựa chọn theo hình thức tự thực hiện"],"answer": "A","explanation": ""},{"stt": "123","question": "Hồ sơ hợp đồng bao gồm các tài liệu nào sau đây?","options": ["Văn bản hợp đồng","Phụ lục hợp đồng gồm danh mục chi tiết về phạm vi công việc, biểu giá, tiến độ thực hiện (nếu có)","Quyết định phê duyệt kết quả lựa chọn nhà thầu","Tất cả các phương án trên."],"answer": "D","explanation": ""},{"stt": "124","question": "Đối với đấu thầu không qua mạng, quy định về việc công khai biên bản mở thầu trên Hệ thống mạng đấu thầu quốc gia nào sau đây là đúng?","options": ["Được đăng tải trên Hệ thống mạng đấu thầu quốc gia trong thời hạn 24 giờ kể từ thời điểm mở thầu","Được đăng tải trên Hệ thống mạng đấu thầu quốc gia trong thời hạn 02 giờ kể từ thời điểm mở thầu","Được đăng tải trên Hệ thống mạng đấu thầu quốc gia trong thời hạn 04 giờ kể từ thời điểm mở thầu","Được đăng tải trên Hệ thống mạng đấu thầu quốc gia trong thời hạn 03 ngày làm việc kể từ thời điểm mở thầu"],"answer": "A","explanation": ""},{"stt": "125","question": "Chủ đầu tư A và nhà thầu B đã ký kết hợp đồng cung cấp 11.000 đơn vị hàng hóa, loại hợp đồng theo đơn giá cố định. Trong quá trình thực hiện hợp đồng, nhu cầu sử dụng thực tế mà nhà thầu phải cung cấp cho chủ đầu tư chỉ là 10.500 đơn vị hàng hóa. Hãy lựa chọn phương án đúng về sửa đổi hợp đồng trong trường hợp này?","options": ["Chủ đầu tư A và nhà thầu B bắt buộc phải thực hiện thủ tục sửa đổi hợp đồng, phải ký kết văn bản sửa đổi hợp đồng","Chủ đầu tư A và nhà thầu B không cần thực hiện thủ tục sửa đổi hợp đồng, không phải ký kết văn bản sửa đổi hợp đồng","Chủ đầu tư A và nhà thầu B bắt buộc phải thực hiện thủ tục ký phụ lục hợp đồng để điều chỉnh khối lượng","Phương án A và C đều đúng"],"answer": "B","explanation": ""},{"stt": "126","question": "Trường hợp nào sau đây các bên không phải thỏa thuận trong hợp đồng về quy trình, thủ tục sửa đổi hợp đồng?","options": ["Khi có sự thay đổi về chính sách, pháp luật làm ảnh hưởng trực tiếp đến việc thực hiện hợp đồng","Khi có sự kiện bất khả kháng","Khi thay đổi phương thức vận chuyển, địa điểm giao hàng, dịch vụ liên quan đối với gói thầu mua sắm hàng hóa","Tăng, giảm thời gian đối với hợp đồng theo thời gian; tăng, giảm chi phí trực tiếp thực hiện đối với hợp đồng chi phí cộng phí; tăng, giảm giá trị cơ sở để tính phần trăm chi phí đối với hợp đồng theo tỷ lệ phần trăm; tăng, giảm mức giảm trừ thanh toán, mức tăng giá trị thanh toán đối với hợp đồng theo kết quả đầu ra"],"answer": "D","explanation": ""},{"stt": "127","question": "Phát hành hồ sơ mời quan tâm, hồ sơ mời sơ tuyển, hồ sơ mời thầu được thực hiện như thế nào?","options": ["Hồ sơ mời quan tâm, hồ sơ mời sơ tuyển, hồ sơ mời thầu được phát hành sau 01 ngày kể từ khi thông báo mời quan tâm, thông báo mời sơ tuyển, thông báo mời thầu được đăng tải thành công trên Hệ thống mạng đấu thầu quốc gia","Hồ sơ mời quan tâm, hồ sơ mời sơ tuyển, hồ sơ mời thầu được phát hành trước khi đăng tải thông báo mời quan tâm, thông báo mời sơ tuyển, thông báo mời thầu","Hồ sơ mời quan tâm, hồ sơ mời sơ tuyển, hồ sơ mời thầu được phát hành sau 03 ngày kể từ khi thông báo mời quan tâm, thông báo mời sơ tuyển, thông báo mời thầu được đăng tải thành công trên Hệ thống mạng đấu thầu quốc gia","Hồ sơ mời quan tâm, hồ sơ mời sơ tuyển, hồ sơ mời thầu được phát hành ngay sau khi đăng tải thành công thông báo mời quan tâm, thông báo mời sơ tuyển, thông báo mời thầu"],"answer": "D","explanation": ""},{"stt": "128","question": "Hãy chọn phương án đúng về đấu thầu trước?","options": ["Đấu thầu trước là việc thực hiện trước một số thủ tục trước khi dự án được phê duyệt đầu tư nhằm mục đích đẩy nhanh tiến độ thực hiện dự án, trừ gói thầu cần thực hiện trước khi phê duyệt dự án","Đấu thầu trước là việc thực hiện các gói thầu thuộc giai đoạn chuẩn bị đầu tư","Đấu thầu trước là việc lựa chọn nhà thầu không cần phê duyệt kế hoạch lựa chọn nhà thầu để đẩy nhanh tiến độ thực hiện","Đấu thầu trước là việc thực hiện trước một số thủ tục trước khi dự án, dự toán mua sắm được phê duyệt nhằm mục đích đẩy nhanh tiến độ thực hiện dự án, dự toán mua sắm, trừ gói thầu cần thực hiện trước khi phê duyệt dự án"],"answer": "A","explanation": ""},{"stt": "129","question": "Quy trình, thủ tục lựa chọn nhà thầu đối với mua sắm trực tiếp không bao gồm bước nào sau đây?","options": ["Thẩm định hồ sơ yêu cầu","Đánh giá hồ sơ đề xuất và thương thảo về các đề xuất của nhà thầu","Phát hành hồ sơ yêu cầu","Phê duyệt và công khai kết quả mua sắm trực tiếp"],"answer": "A","explanation": ""},{"stt": "130","question": "Quy trình, thủ tục lựa chọn nhà thầu đối với chào hàng cạnh tranh không bao gồm bước nào sau đây?","options": ["Phê duyệt kết quả lựa chọn nhà thầu","Công khai kết quả lựa chọn nhà thầu","Thẩm định kết quả lựa chọn nhà thầu","Hoàn thiện, ký kết và quản lý thực hiện hợp đồng"],"answer": "C","explanation": ""},{"stt": "131","question": "Thời gian phê duyệt hồ sơ mời thầu được quy định như thế nào?","options": ["Do chủ đầu tư quyết định trên cơ sở bảo đảm tiến độ của dự án, gói thầu","Tối đa là 05 ngày làm việc kể từ ngày tổ chuyên gia trình dự thảo hồ sơ mời thầu trong trường hợp không thẩm định hồ sơ mời thầu","Tối đa là 05 ngày làm việc kể từ ngày tổ thẩm định gửi báo cáo thẩm định hồ sơ mời thầu","Phương án B và C đều đúng"],"answer": "A","explanation": ""},{"stt": "132","question": "Thời gian phê duyệt kết quả lựa chọn nhà thầu được quy định như thế nào?","options": ["Do chủ đầu tư quyết định trên cơ sở bảo đảm tiến độ của dự án, gói thầu","Tối đa là 05 ngày làm việc kể từ ngày tổ chuyên gia trình báo cáo đánh giá hồ sơ dự thầu trong trường hợp không thẩm định kết quả lựa chọn nhà thầu","Tối đa là 05 ngày làm việc kể từ ngày tổ thẩm định trình báo cáo thẩm định kết quả lựa chọn nhà thầu","Phương án B và C đều đúng"],"answer": "A","explanation": ""},{"stt": "133","question": "Thời gian đánh giá hồ sơ dự thầu được quy định như thế nào?","options": ["Tối đa không quá 45 ngày đối với đấu thầu trong nước và không quá 60 ngày đối với đấu thầu quốc tế","Tối đa không quá 30 ngày đối với đấu thầu trong nước và không quá 60 ngày đối với đấu thầu quốc tế","Do người có thẩm quyền, chủ đầu tư có trách nhiệm quyết định","Do chủ đầu tư quyết định trên cơ sở bảo đảm tiến độ của dự án, gói thầu"],"answer": "D","explanation": ""},{"stt": "134","question": "Quy trình, thủ tục lựa chọn nhà thầu đối với chỉ định thầu theo quy trình rút gọn bao gồm các bước nào sau đây?","options": ["Chuẩn bị và gửi dự thảo hợp đồng cho nhà thầu; thương thảo, hoàn thiện hợp đồng; trình, thẩm định, phê duyệt và công khai kết quả lựa chọn nhà thầu; ký kết hợp đồng","Chuẩn bị và gửi dự thảo hợp đồng cho nhà thầu; thương thảo hợp đồng; trình, thẩm định, phê duyệt kết quả lựa chọn nhà thầu; ký kết và quản lý thực hiện hợp đồng","Chuẩn bị và gửi dự thảo hợp đồng cho nhà thầu; hoàn thiện hợp đồng, phê duyệt và công khai kết quả lựa chọn nhà thầu; ký kết và quản lý thực hiện hợp đồng","Lập, phê duyệt hồ sơ yêu cầu; xác định nhà thầu dự kiến được mời nhận hồ sơ yêu cầu; đánh giá hồ sơ đề xuất và thương thảo về các đề xuất của nhà thầu; phê duyệt và công khai kết quả lựa chọn nhà thầu; hoàn thiện, ký kết và quản lý thực hiện hợp đồng"],"answer": "C","explanation": ""},{"stt": "135","question": "Đối với gói thầu áp dụng một giai đoạn một túi hồ sơ, trường hợp nào được thực hiện bước thương thảo hợp đồng?","options": ["Gói thầu hỗn hợp","Gói thầu mua sắm hàng hóa áp dụng đấu thầu quốc tế","Gói thầu áp dụng đấu thầu hạn chế do có yêu cầu đặc thù về kỹ thuật mà chỉ có một hoặc một số nhà thầu đáp ứng yêu cầu của gói thầu","Tất cả phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "136","question": "Danh mục hàng hóa, dịch vụ áp dụng mua sắm tập trung do Bộ trưởng Bộ Y tế ban hành:","options": ["Danh mục mua sắm tập trung cấp quốc gia đối với ô tô trong trường hợp cần thiết","Danh mục mua sắm tập trung cấp quốc gia đối với thuốc; danh mục mua sắm tập trung cấp quốc gia đối với thiết bị công nghệ thông tin trong trường hợp cần thiết","Danh mục mua sắm tập trung cấp quốc gia đối với thuốc; danh mục mua sắm tập trung cấp quốc gia đối với dịch vụ đơn giản trong trường hợp cần thiết","Danh mục mua sắm tập trung cấp quốc gia đối với thuốc; danh mục mua sắm tập trung cấp quốc gia đối với thiết bị y tế, vật tư xét nghiệm trong trường hợp cần thiết"],"answer": "D","explanation": ""},{"stt": "137","question": "Hình thức lựa chọn nhà thầu khi áp dụng mua sắm tập trung bảo hiểm tài sản cho các cơ quan thuộc tỉnh Y","options": ["Đấu thầu rộng rãi.","Đấu thầu hạn chế.","Đàm phán giá.","Đấu thầu rộng rãi và đàm phán giá."],"answer": "A","explanation": ""},{"stt": "138","question": "Đơn vị mua sắm tập trung:","options": ["Thực hiện việc lựa chọn nhà thầu trên cơ sở nhiệm vụ được giao","Thực hiện việc lựa chọn nhà thầu trên cơ sở hợp đồng ký với các đơn vị có nhu cầu","Không được thực hiện việc lựa chọn nhà thầu","Phương án A và B đều đúng"],"answer": "D","explanation": ""},{"stt": "139","question": "Thời hạn của thỏa thuận khung:","options": ["Thời hạn áp dụng thỏa thuận khung được quy định là 40 tháng","Thời hạn áp dụng thỏa thuận khung được quy định trong kế hoạch lựa chọn nhà thầu nhưng không quá 36 tháng","Thời hạn áp dụng thỏa thuận khung do người có thẩm quyền quyết định trong kế hoạch lựa chọn nhà thầu","Phương án B và C đều đúng"],"answer": "B","explanation": ""},{"stt": "140","question": "Tại bước hoàn thiện, ký kết và thực hiện hợp đồng với nhà thầu đối với gói thầu mua sắm tập trung:","options": ["Nhà thầu đã ký kết thỏa thuận khung phải thực hiện biện pháp bảo đảm thực hiện hợp đồng trước hoặc cùng thời điểm hợp đồng có hiệu lực cho đơn vị mua sắm tập trung","Nhà thầu đã ký kết thỏa thuận khung phải thực hiện biện pháp bảo đảm thực hiện hợp đồng trước hoặc cùng thời điểm hợp đồng có hiệu lực cho đơn vị có nhu cầu mua sắm","Nhà thầu đã ký kết thỏa thuận khung không phải thực hiện biện pháp bảo đảm thực hiện hợp đồng trước thời điểm hợp đồng có hiệu lực cho đơn vị có nhu cầu mua sắm","Nhà thầu đã ký kết thỏa thuận khung phải thực hiện biện pháp bảo đảm thực hiện hợp đồng sau thời điểm hợp đồng có hiệu lực cho đơn vị mua sắm tập trung"],"answer": "B","explanation": ""},{"stt": "141","question": "Đối với các gói thầu mua sắm tập trung, trách nhiệm cung cấp thông tin về kết quả thực hiện hợp đồng của nhà thầu do ai thực hiện?","options": ["Đơn vị có nhu cầu mua sắm","Bên mời thầu","Đơn vị tư vấn được thuê làm bên mời thầu","Không phải đăng tải thông tin"],"answer": "A","explanation": ""},{"stt": "142","question": "Áp dụng hình thức lựa chọn nhà thầu nào khi mua sắm tập trung đối với gói thầu điều hòa không khí thông dụng, sẵn có trên thị trường, có giá gói thầu là 03 tỷ đồng cho các cơ quan thuộc tỉnh X?","options": ["Đấu thầu rộng rãi hoặc mua sắm trực tiếp","Đấu thầu rộng rãi hoặc chỉ định thầu theo hạn mức","Đấu thầu rộng rãi hoặc chào hàng cạnh tranh","Đấu thầu rộng rãi hoặc chỉ định thầu hoặc đám phán giá"],"answer": "C","explanation": ""},{"stt": "143","question": "Trách nhiệm trong mua sắm tập trung?","options": ["Đơn vị mua sắm tập trung thực hiện trách nhiệm của người có thẩm quyền theo quy định của Luật Đấu thầu","Đơn vị mua sắm tập trung thực hiện trách nhiệm của chủ đầu tư theo quy định của Luật Đấu thầu","Đơn vị mua sắm tập trung thực hiện trách nhiệm của bên mời thầu theo quy định của Luật Đấu thầu","Đơn vị mua sắm tập trung thực hiện trách nhiệm của tổ chuyên gia theo quy định của Luật Đấu thầu"],"answer": "B","explanation": ""},{"stt": "144","question": "Nhà thầu đã ký thỏa thuận khung và được đơn vị có nhu cầu mua sắm yêu cầu ký hợp đồng nhưng không ký hợp đồng, không thực hiện biện pháp bảo đảm thực hiện hợp đồng sẽ bị xử lý như thế nào?","options": ["Nhà thầu sẽ bị khóa tài khoản trên Hệ thống mạng đấu thầu quốc gia trong thời hạn 06 tháng kể từ ngày đơn vị có nhu cầu mua sắm công khai tên nhà thầu trên Hệ thống mạng đấu thầu quốc gia","Nhà thầu sẽ bị khóa tài khoản trên Hệ thống mạng đấu thầu quốc gia trong thời hạn 06 tháng kể từ ngày đơn vị mua sắm tập trung công khai tên nhà thầu trên Hệ thống mạng đấu thầu quốc gia, trừ trường hợp bất khả kháng","Nhà thầu sẽ bị khóa tài khoản trên Hệ thống mạng đấu thầu quốc gia trong thời hạn trong thời hạn 03 tháng kể từ ngày Bộ Tài chính nhận được văn bản đề nghị của đơn vị có nhu cầu mua sắm, trừ trường hợp bất khả kháng","Nhà thầu sẽ bị khóa tài khoản trên Hệ thống mạng đấu thầu quốc gia trong thời hạn trong thời hạn 06 tháng kể từ ngày Bộ Tài chính nhận được văn bản đề nghị của đơn vị có nhu cầu mua sắm, trừ trường hợp bất khả kháng"],"answer": "B","explanation": ""},{"stt": "145","question": "Đối với gói thầu mua sắm tập trung áp dụng lựa chọn nhà thầu căn cứ theo khả năng cung cấp và áp dụng phương pháp giá thấp nhất, việc lựa chọn danh sách nhà thầu trúng thầu được thực hiện như thế nào?","options": ["Phải đảm bảo tổng số lượng hàng hóa mà các nhà thầu trúng thầu chào thầu tối thiểu bằng số lượng hàng hóa nêu trong hồ sơ mời thầu, đồng thời bảo đảm điểm tổng hợp của gói thầu cao nhất","Phải đảm bảo tổng số lượng hàng hóa mà các nhà thầu trúng thầu chào thầu bằng số lượng hàng hóa nêu trong hồ sơ mời thầu, đồng thời bảo đảm tổng giá đề nghị trúng thầu của gói thầu cao nhất","Phải đảm bảo tổng số lượng hàng hóa mà các nhà thầu trúng thầu chào thầu bằng số lượng hàng hóa nêu trong hồ sơ mời thầu, đồng thời bảo đảm tổng giá đề nghị trúng thầu của gói thầu thấp nhất","Phải đảm bảo tổng số lượng hàng hóa mà các nhà thầu trúng thầu chào thầu bằng số lượng hàng hóa nêu trong hồ sơ mời thầu, đồng thời bảo đảm tổng giá đánh giá của gói thầu là thấp nhất"],"answer": "C","explanation": ""},{"stt": "146","question": "Đối với gói thầu mua sắm tập trung áp dụng lựa chọn nhà thầu căn cứ khối lượng mời thầu, danh sách phê duyệt nhà thầu trúng thầu bao gồm:","options": ["Danh sách chính (nhà thầu xếp thứ nhất) và danh sách dự bị (nhà thầu xếp thứ 2 trở đi)","Danh sách chính (nhà thầu xếp thứ nhất) và danh sách nhà thầu không đáp ứng yêu cầu của hồ sơ mời thầu","Danh sách các nhà thầu đáp ứng yêu cầu về năng lực và kinh nghiệm theo yêu cầu của hồ sơ mời thầu","Danh sách chính (nhà thầu xếp thứ nhất và nhà thầu xếp thứ 2) và danh sách dự bị (nhà thầu xếp thứ 3 trở đi)"],"answer": "A","explanation": ""},{"stt": "147","question": "Đối với hàng hóa, dịch vụ không thuộc danh mục mua sắm tập trung do Chủ tịch UBND tỉnh X ban hành nhưng nhiều cơ quan, tổ chức, đơn vị trong tỉnh X có nhu cầu mua sắm hàng hóa, dịch vụ cùng loại thì thực hiện như thế nào?","options": ["Từng cơ quan, tổ chức, đơn vị trong tỉnh X căn cứ vào thỏa thuận khung do UBND tỉnh X đã ký kết trước đó để mua sắm tập trung đối với các hàng hóa, dịch vụ này","Có thể gộp thành một gói thầu để một trong các cơ quan, tổ chức, đơn vị mua sắm hoặc để đơn vị có chức năng mua sắm tập trung thực hiện việc mua sắm đối với các hàng hóa, dịch vụ này","Sở Tài chính thuộc tỉnh X có trách nhiệm thực hiện mua sắm tập trung đối với các hàng hóa, dịch vụ này","Các cơ quan, tổ chức, đơn vị báo cáo lên người có thẩm quyền để phê duyệt kế hoạch chọn nhà thầu theo hình thức mua sắm tập trung đối với các hàng hóa, dịch vụ này"],"answer": "B","explanation": ""},{"stt": "148","question": "Phương án nào sau đây được xác định là một bước trong quá trình lựa chọn nhà thầu theo quy trình chỉ định thầu thông thường được pháp luật về đấu thầu quy định?","options": ["Xác định tối thiểu 03 nhà thầu có đủ năng lực, kinh nghiệm để mời nhận hồ sơ yêu cầu","Chuẩn bị và gửi dự thảo hợp đồng cho tối thiểu 03 nhà thầu có đủ năng lực, kinh nghiệm để đàm phán hợp đồng","Đánh giá hồ sơ đề xuất và thương thảo về các đề xuất của nhà thầu","Phương án A và C đều đúng"],"answer": "C","explanation": ""},{"stt": "149","question": "Trường hợp đơn vị được giao nhiệm vụ mua sắm tập trung không đủ năng lực, kinh nghiệm tổ chức lựa chọn nhà thầu thì thực hiện như thế nào?","options": ["Vẫn thực hiện nhiệm vụ được giao, tổ chuyên gia không cần phải đáp ứng yêu cầu về năng lực, kinh nghiệm","Phải thực hiện theo nhiệm vụ được giao, không được đi thuê đơn vị tư vấn để thực hiện việc lựa chọn nhà thầu","Được phép thuê đơn vị tư vấn đấu thầu có kinh nghiệm để thực hiện việc lựa chọn nhà thầu","Phương án A và C đều đúng"],"answer": "C","explanation": ""},{"stt": "150","question": "Phương án nào xác định quy mô của hợp đồng tương tự đối với gói thầu áp dụng mua sắm tập trung là phù hợp?","options": ["Trong mọi trường hợp có thể điều chỉnh giảm yêu cầu về quy mô của hợp đồng tương tự xuống còn Y/1,5 (Y thông thường khoảng 50% giá trị của gói thầu đang xét)","Trường hợp mua sắm tập trung hoặc mua sắm hàng hóa có số lượng, khối lượng mời thầu lớn thì có thể điều chỉnh giảm yêu cầu về quy mô của hợp đồng tương tự xuống còn Y/1,25 (Y thông thường khoảng 50% giá trị của gói thầu đang xét) và/hoặc chia gói thầu thành các phần (lô) để tăng tính cạnh tranh cho gói thầu","Trường hợp mua sắm tập trung hoặc mua sắm hàng hóa có số lượng, khối lượng mời thầu lớn thì có thể điều chỉnh giảm yêu cầu về quy mô của hợp đồng tương tự xuống còn Y/1,5 (Y thông thường khoảng 50% giá trị của gói thầu đang xét) và/hoặc chia gói thầu thành các phần (lô) để tăng tính cạnh tranh cho gói thầu","Trường hợp mua sắm tập trung hoặc mua sắm hàng hóa có số lượng, khối lượng mời thầu lớn, chủ đầu tư báo cáo người có thẩm quyền để điều chỉnh giảm yêu cầu về quy mô của hợp đồng tương tự xuống còn Y/1,5 (Y thông thường khoảng 50% giá trị của gói thầu đang xét) và/hoặc chia gói thầu thành các phần (lô) để tăng tính cạnh tranh cho gói thầu"],"answer": "B","explanation": ""},{"stt": "151","question": "Thẩm quyền phê duyệt kế hoạch tổng thể lựa chọn nhà thầu thuộc chủ thể nào?","options": ["Người có thẩm quyền","Chủ đầu tư (trường hợp xác định được chủ đầu tư)","Người đứng đầu cơ quan được giao chuẩn bị dự án","Bên mời thầu"],"answer": "A","explanation": ""},{"stt": "152","question": "Trường hợp thuê đơn vị tư vấn lập hồ sơ mời quan tâm, hồ sơ mời sơ tuyển, hồ sơ mời thầu, hồ sơ yêu cầu; đánh giá hồ sơ quan tâm, hồ sơ dự sơ tuyển, hồ sơ dự thầu, hồ sơ đề xuất, tổ chuyên gia được thành lập bởi?","options": ["Người có thẩm quyền","Chủ đầu tư","Bên mời thầu","Đơn vị tư vấn được chủ đầu tư lựa chọn"],"answer": "D","explanation": ""},{"stt": "153","question": "Nhiệm vụ nào sau đây không thuộc trách nhiệm của người có thẩm quyền?","options": ["Phê duyệt kế hoạch lựa chọn nhà thầu","Giải quyết kiến nghị và xử lý các vi phạm pháp luật về đấu thầu","Quyết định việc hủy thầu khi thay đổi mục tiêu đầu tư trong quyết định đầu tư","Quyết định việc hủy thầu, đình chỉ cuộc đấu thầu, không công nhận kết quả lựa chọn nhà thầu khi phát hiện có hành vi vi phạm pháp luật về đấu thầu"],"answer": "A","explanation": ""},{"stt": "154","question": "Trường hợp nào sau đây việc phê duyệt kế hoạch lựa chọn nhà thầu thuộc trách nhiệm của chủ đầu tư?","options": ["Chủ đầu tư không có trách nhiệm phê duyệt kế hoạch lựa chọn nhà thầu","Chủ đầu tư có trách nhiệm phê duyệt kế hoạch lựa chọn nhà thầu, trừ trường hợp chưa xác định được chủ đầu tư theo quy định của pháp luật","Trường hợp gói thầu được thực hiện trước khi có quyết định phê duyệt dự án và chưa xác định được chủ đầu tư","Chủ đầu tư chỉ được phê duyệt kế hoạch lựa chọn nhà thầu trong trường hợp được người có thẩm quyền ủy quyền"],"answer": "B","explanation": ""},{"stt": "155","question": "Việc chấp thuận hoặc không chấp thuận việc điều chuyển khối lượng, phạm vi công việc của nhà thầu phụ cho tổ chức, đơn vị khác khi cần đáp ứng yêu cầu về tiến độ, chất lượng gói thầu do nhà thầu đề xuất thuộc trách nhiệm của ai?","options": ["Tổ chuyên gia","Chủ đầu tư","Người có thẩm quyền","Tổ thẩm định"],"answer": "B","explanation": ""},{"stt": "156","question": "Nội dung nào không thuộc nội dung quản lý nhà nước đối với hoạt động đấu thầu?","options": ["Quản lý hệ thống thông tin và cơ sở dữ liệu về đấu thầu trên phạm vi cả nước.","Lập hồ sơ mời quan tâm, hồ sơ mời sơ tuyển, hồ sơ mời thầu, hồ sơ yêu cầu.","Đào tạo, bồi dưỡng kiến thức, nghiệp vụ chuyên môn về đấu thầu.","Hợp tác quốc tế về đấu thầu"],"answer": "B","explanation": ""},{"stt": "157","question": "Theo quy định pháp luật về đấu thầu, kiểm tra hoạt động đấu thầu được tiến hành theo hình thức nào?","options": ["Kiểm tra trực tiếp","Báo cáo bằng văn bản","Kết hợp giữa kiểm tra trực tiếp và báo cáo bằng văn bản","Kiểm tra định kỳ hoặc đột xuất"],"answer": "D","explanation": ""},{"stt": "158","question": "Thời hiệu áp dụng biện pháp cấm tham gia hoạt động đấu thầu là bao lâu?","options": ["10 năm tính từ ngày xảy ra hành vi vi phạm","10 năm tính từ ngày phát hiện ra hành vi vi phạm","05 năm tính từ ngày phát hiện ra hành vi vi phạm","05 năm tính từ ngày xảy ra hành vi vi phạm"],"answer": "A","explanation": ""},{"stt": "159","question": "Chủ thể nào không có quyền cấm tham gia hoạt động đấu thầu?","options": ["Người có thẩm quyền","Chủ đầu tư","Bộ trưởng, Thủ trưởng cơ quan ngang Bộ, cơ quan thuộc Chính phủ, cơ quan khác ở Trung ương","Chủ tịch Ủy ban nhân dân cấp tỉnh"],"answer": "B","explanation": ""},{"stt": "160","question": "Người có thẩm quyền ban hành quyết định cấm tham gia hoạt động đấu thầu với thời gian cấm bao lâu đối với trường hợp tổ chức, cá nhân có từ 02 hành vi vi phạm trở lên thuộc cùng phạm vi quản lý của người có thẩm quyền và các hành vi này chưa bị cấm tham gia hoạt động đấu thầu?","options": ["Bằng tổng thời gian cấm của các hành vi vi phạm nhưng tối thiểu trên 05 năm","Bằng tổng thời gian cấm của các hành vi vi phạm nhưng tối đa không quá 03 năm","Bằng tổng thời gian cấm của các hành vi vi phạm nhưng tối đa không quá 05 năm","Bằng thời gian cấm của hành vi vi phạm có thời gian bị cấm cao nhất"],"answer": "C","explanation": ""},{"stt": "161","question": "Hành vi gian lận trong hoạt động đấu thầu sẽ bị cấm tham gia hoạt động đấu thầu trong thời gian bao lâu?","options": ["Từ 06 tháng đến 01 năm","02 năm","Từ 01 năm đến 02 năm","Từ 03 năm đến 05 năm"],"answer": "D","explanation": ""},{"stt": "162","question": "Hành vi cản trở trong hoạt động đấu thầu sẽ bị cấm tham gia hoạt động đấu thầu trong thời gian bao lâu?","options": ["06 tháng","Từ 06 tháng đến dưới 1 năm","Từ 01 năm đến 03 năm","05 năm"],"answer": "C","explanation": ""},{"stt": "163","question": "Thành viên A trong nhà thầu liên danh A-B thực hiện hành vi \"làm giả hoặc làm sai lệch thông tin, hồ sơ, tài liệu trong đấu thầu\" thì việc cấm tham gia hoạt động đấu thầu được xử lý như thế nào?","options": ["Cấm tham gia hoạt động đấu thầu từ 03 năm đến 05 năm đối với thành viên A","Cấm tham gia hoạt động đấu thầu từ 01 năm đến dưới 03 năm đối với thành viên A","Cấm tham gia hoạt động đấu thầu từ 03 năm đến 05 năm đối với tất cả thành viên trong nhà thầu liên danh A-B","Cấm tham gia hoạt động đấu thầu từ 01 năm đến 03 năm đối với tất cả thành viên trong nhà thầu liên danh A-B"],"answer": "A","explanation": ""},{"stt": "164","question": "Đình chỉ cuộc thầu được thực hiện trong thời gian nào?","options": ["Từ ngày phát hành hồ sơ mời sơ tuyển, hồ sơ mời quan tâm, hồ sơ mời thầu, hồ sơ yêu cầu đến trước khi ký kết hợp đồng, thỏa thuận khung đối với mua sắm tập trung","Trong quá trình tổ chức lựa chọn nhà thầu cho đến trước khi phê duyệt kết quả lựa chọn nhà thầu","Sau khi phê duyệt kết quả lựa chọn nhà thầu đến khi ký kết hợp đồng, thỏa thuận khung đối với mua sắm tập trung","Trong quá trình thực hiện hợp đồng"],"answer": "B","explanation": ""},{"stt": "165","question": "Biện pháp nào sau đây được thực hiện trong quá trình thực hiện hợp đồng?","options": ["Hủy thầu","Đình chỉ cuộc thầu","Không công nhận kết quả lựa chọn nhà thầu","Phương án A và B đều đúng"],"answer": "C","explanation": ""},{"stt": "166","question": "Nhà thầu tư vấn giám sát đồng thời thực hiện tư vấn kiểm định đối với gói thầu do nhà thầu đó giám sát thì nhà thầu đó sẽ bị xử lý như thế nào?","options": ["Bị cấm tham gia hoạt động đấu thầu từ 01 năm đến 03 năm và khi tham dự thầu phải thực hiện biện pháp bảo đảm dự thầu với giá trị gấp 03 lần giá trị yêu cầu trong thời hạn 02 năm","Khi tham dự thầu phải thực hiện biện pháp bảo đảm dự thầu với giá trị gấp 03 lần giá trị yêu cầu trong thời hạn 02 năm","Bị cấm tham gia hoạt động đấu thầu từ 01 năm đến 03 năm","Không bị xử lý vi phạm"],"answer": "C","explanation": ""},{"stt": "167","question": "Tham gia lập, đồng thời tham gia thẩm định hồ sơ mời thầu đối với cùng một gói thầu sẽ bị cấm tham gia hoạt động đấu thầu trong thời gian bao lâu?","options": ["02 năm","Từ trên 02 năm đến 03 năm","Từ trên 01 năm đến 02 năm","Từ 06 tháng đến 01 năm"],"answer": "D","explanation": ""},{"stt": "168","question": "Nhà thầu liên danh A-B gồm 2 thành viên là nhà thầu A và nhà thầu B. Nhà thầu A làm giả thông tin, hồ sơ, tài liệu về hợp đồng tương tự của mình để tham dự thầu sẽ bị xử lý như thế nào?","options": ["Thành viên liên danh A bị cấm tham gia hoạt động đấu thầu từ 03 năm đến 05 năm","Tất cả thành viên trong liên danh A-B bị cấm tham gia hoạt động đấu thầu từ 03 năm đến 05 năm","Thành viên liên danh A bị cấm tham gia hoạt động đấu thầu từ 01 năm đến 03 năm","Tất cả thành viên trong liên danh A-B bị cấm tham gia hoạt động đấu thầu từ 01 năm đến 03 năm"],"answer": "A","explanation": ""},{"stt": "169","question": "Nhà thầu liên danh A-B gồm 2 thành viên là nhà thầu A và nhà thầu B. Nhà thầu A dàn xếp, thỏa thuận với các bên rút hồ sơ dự thầu để liên danh A-B trúng thầu sẽ bị xử lý như thế nào?","options": ["Thành viên liên danh A bị cấm tham gia hoạt động đấu thầu từ 03 năm đến 05 năm","Tất cả thành viên trong liên danh A-B bị cấm tham gia hoạt động đấu thầu từ 03 năm đến 05 năm","Thành viên liên danh A bị cấm tham gia hoạt động đấu thầu từ 01 năm đến 03 năm","Tất cả thành viên trong liên danh A-B bị cấm tham gia hoạt động đấu thầu từ 01 năm đến 03 năm"],"answer": "B","explanation": ""},{"stt": "170","question": "Trường hợp nhà thầu bị đánh giá về uy tín khi thực hiện hành vi: được lựa chọn trúng thầu nhưng không tiến hành hoặc từ chối tiến hành hoàn thiện hợp đồng hoặc không ký kết hợp đồng thì khi tham gia gói thầu khác, nhà thầu sẽ bị bất lợi như thế nào?","options": ["Đối với gói thầu hàng hóa, xây lắp, phi tư vấn, hỗn hợp, nhà thầu bị đánh giá về uy tín phải nộp gấp 3 lần bảo đảm dự thầu trong vòng 03 năm kể từ lần cuối cùng thực hiện hành vi","Đối với gói thầu tư vấn, thông tin uy tín này sẽ được sử dụng để đánh giá về kỹ thuật","Bị đưa vào xem xét, đánh giá về kỹ thuật trong quá trình lựa chọn nhà thầu đối với gói thầu xây lắp, phi tư vấn, hàng hóa, hỗn hợp","Đáp án B và C đều đúng"],"answer": "B","explanation": ""},{"stt": "171","question": "Trong gói thầu dịch vụ tư vấn, thông tin về uy tín của nhà thầu được sử dụng để?","options": ["Đánh giá về năng lực, kinh nghiệm","Đánh giá tư cách hợp lệ của nhà thầu","Đánh giá về kỹ thuật","Loại nhà thầu đã bị đánh giá về uy tín"],"answer": "C","explanation": ""},{"stt": "172","question": "Đối với việc giải quyết kiến nghị về các vấn đề trước khi có thông báo kết quả lựa chọn nhà thầu, cá nhân, đơn vị nào sau đây có trách nhiệm giải quyết kiến nghị?","options": ["Chủ đầu tư, người có thẩm quyền","Chủ đầu tư, Hội đồng giải quyết kiến nghị","Người có thẩm quyền, Hội đồng giải quyết kiến nghị","Chủ đầu tư, tổ chuyên gia"],"answer": "A","explanation": ""},{"stt": "173","question": "Đối với việc giải quyết kiến nghị về kết quả lựa chọn nhà thầu, cá nhân, đơn vị nào sau đây có trách nhiệm giải quyết kiến nghị?","options": ["Chủ đầu tư, người có thẩm quyền","Chủ đầu tư, Hội đồng giải quyết kiến nghị","Người có thẩm quyền, Hội đồng giải quyết kiến nghị","Chủ đầu tư, Hội đồng tư vấn giải quyết kiến nghị"],"answer": "B","explanation": ""},{"stt": "174","question": "Trường hợp đang trong quá trình giải quyết kiến nghị mà nhà thầu gửi đơn khiếu nại thì việc giải quyết kiến nghị được xử lý thế nào?","options": ["Tiếp tục giải quyết kiến nghị","Chấm dứt ngay việc giải quyết kiến nghị","Tạm dừng việc giải quyết kiến nghị đến khi có kết quả giải quyết khiếu nại","Tất cả phương án trên đều sai"],"answer": "B","explanation": ""},{"stt": "175","question": "Chi phí giải quyết kiến nghị được nhà thầu nộp cho chủ thể nào sau đây?","options": ["Chủ tịch Hội đồng tư vấn giải quyết kiến nghị","Bộ phận thường trực giúp việc cho Chủ tịch Hội đồng giải quyết kiến nghị","Chủ đầu tư","Người có thẩm quyền"],"answer": "B","explanation": ""},{"stt": "176","question": "Trường hợp nào sau đây nhà thầu không được hoàn trả chi phí giải quyết kiến nghị?","options": ["Kiến nghị của nhà thầu được kết luận là đúng","Một hoặc các nội dung kiến nghị của nhà thầu được kết luận là không đúng","Nhà thầu rút đơn kiến nghị trong quá trình giải quyết kiến nghị","Phương án B và C đều đúng"],"answer": "D","explanation": ""},{"stt": "177","question": "Đối với kiến nghị về kết quả lựa chọn nhà thầu, Hội đồng giải quyết kiến nghị phải có văn bản giải quyết kiến nghị trong thời hạn bao nhiêu ngày kể từ ngày Hội đồng được thành lập?","options": ["25 ngày","30 ngày","35 ngày","20 ngày"],"answer": "B","explanation": ""},{"stt": "178","question": "Phương án nào sau đây là đúng trong việc giải quyết kiến nghị đối với gói thầu sử dụng vốn sản xuất kinh doanh của doanh nghiệp nhà nước?","options": ["Hội đồng giải quyết kiến nghị do Sở Tài chính thành lập có trách nhiệm giải quyết kiến nghị cho gói thầu","Hội đồng giải quyết kiến nghị do Bộ trưởng Bộ Tài chính thành lập có trách nhiệm giải quyết kiến nghị cho gói thầu","Người đứng đầu doanh nghiệp nhà nước tự ban hành điều kiện, quy trình về giải quyết kiến nghị trong đơn vị mình","Tất cả phương án A, B, C đều sai"],"answer": "C","explanation": ""},{"stt": "179","question": "Đối với kiến nghị về các vấn đề trước khi có thông báo kết quả lựa chọn nhà thầu, trường hợp nhà thầu gửi đơn kiến nghị đồng thời đến người có thẩm quyền và chủ đầu tư thì chủ thể nào có trách nhiệm giải quyết kiến nghị?","options": ["Người có thẩm quyền","Chủ đầu tư","Bộ phận thường trực","Hội đồng giải quyết kiến nghị"],"answer": "B","explanation": ""},{"stt": "180","question": "Đối với kiến nghị về kết quả lựa chọn nhà thầu, trường hợp nhà thầu gửi đơn kiến nghị đồng thời đến bộ phận thường trực giúp việc Hội đồng giải quyết kiến nghị và chủ đầu tư thì chủ thể nào có trách nhiệm giải quyết kiến nghị?","options": ["Người có thẩm quyền","Chủ đầu tư","Bộ phận thường trực","Hội đồng giải quyết kiến nghị"],"answer": "D","explanation": ""},{"stt": "181","question": "Đơn vị sự nghiệp công lập (tự chủ chi thường xuyên và chi đầu tư) thuộc tỉnh B tổ chức đấu thầu cho dự án sử dụng vốn ngân sách nhà nước thì Giám đốc Sở Tài chính Tỉnh B có trách nhiệm thành lập Hội đồng giải quyết kiến nghị cho gói thầu có kiến nghị tại Dự án này hay không?","options": ["Có trách nhiệm thành lập","Không có trách nhiệm thành lập","Thành lập khi chủ tịch UBND tỉnh yêu cầu","Thành lập khi Giám đốc doanh nghiệp A đề nghị"],"answer": "A","explanation": ""},{"stt": "182","question": "Hội đồng giải quyết kiến nghị có quyền thực hiện việc nào sau đây?","options": ["Hủy thầu","Yêu cầu chủ đầu tư tạm dừng ký kết hợp đồng","Yêu cầu nhà thầu, chủ đầu tư và các cơ quan liên quan cung cấp thông tin của gói thầu, dự án và các thông tin liên quan khác để thực hiện nhiệm vụ","Không công nhận kết quả lựa chọn nhà thầu"],"answer": "C","explanation": ""},{"stt": "183","question": "Đối với kiến nghị về quá trình tổ chức lựa chọn nhà thầu (không phải kiến nghị về nội dung hồ sơ mời thầu), đơn kiến nghị phải là của chủ thể nào?","options": ["Cá nhân quan tâm đến gói thầu","Nhà thầu tham dự thầu","Cơ quan, tổ chức quan tâm đến gói thầu","Phương án B và C đều đúng"],"answer": "B","explanation": ""},{"stt": "184","question": "Các tài liệu, thông tin nào sau đây trong việc giải quyết kiến nghị được công khai trên Hệ thống mạng đấu thầu quốc gia?","options": ["Nội dung kiến nghị kết quả lựa chọn nhà thầu","Văn bản giải quyết kiến nghị của chủ đầu tư","Văn bản giải quyết kiến nghị của người có thẩm quyền","Tất cả phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "185","question": "Nhà thầu có trách nhiệm nộp chi phí giải quyết kiến nghị trong thời hạn bao lâu kể từ ngày nhận được thông báo của bộ phận thường trực giúp việc cho Chủ tịch Hội đồng giải quyết kiến nghị?","options": ["03 ngày làm việc","02 ngày làm việc","04 ngày làm việc","05 ngày làm việc"],"answer": "B","explanation": ""},{"stt": "186","question": "Trung tâm X là đơn vị sự nghiệp công lập tự chủ chi thường xuyên thuộc tỉnh A tổ chức lựa chọn nhà thầu đối với gói thầu mua sắm hàng hóa sử dụng nguồn thu hợp pháp (không sử dụng ngân sách nhà nước), trường hợp nhà thầu có kiến nghị về hồ sơ mời thầu gửi cả người có thẩm quyền và chủ đầu tư của gói thầu thì việc giải quyết kiến nghị được thực hiện theo quy trình nào?","options": ["Chủ đầu tư thực hiện giải quyết kiến nghị theo quy trình giải quyết kiến nghị về các vấn đề trước khi có thông báo kết quả lựa chọn nhà thầu theo quy định của pháp luật về đấu thầu","Người có thẩm quyền giải quyết kiến nghị theo quy trình giải quyết kiến nghị về các vấn đề trước khi có thông báo kết quả lựa chọn nhà thầu theo quy định của pháp luật về đấu thầu","Thực hiện theo quy trình về giải quyết kiến nghị do người đứng đầu Trung tâm X ban hành trong đơn vị mình","Phương án A và B đều đúng"],"answer": "C","explanation": ""},{"stt": "187","question": "Ông A là người đại diện hợp pháp của nhà thầu B ký đơn kiến nghị về kết quả lựa chọn nhà thầu. Trong trường hợp này, anh C là con đẻ của ông A có được tham gia là thành viên Hội đồng giải quyết kiến nghị hay không?","options": ["Không được tham gia","Được tham gia nếu đủ năng lực, kinh nghiệm","Được tham gia khi Chủ tịch Hội đồng giải quyết kiến nghị chấp thuận","Được tham gia khi người có thẩm quyền chấp thuận"],"answer": "A","explanation": ""},{"stt": "188","question": "Đơn vị nào có trách nhiệm tiếp nhận và quản lý chi phí do nhà thầu có kiến nghị nộp?","options": ["Người có thẩm quyền","Chủ đầu tư","Bộ phận thường trực giúp việc cho Chủ tịch Hội đồng giải quyết kiến nghị","Tổ chuyên gia"],"answer": "C","explanation": ""},{"stt": "189","question": "Gói thầu mua thuốc áp dụng phương thức một giai đoạn hai túi hồ sơ có giá gói thầu 100 tỷ đồng. Trong quá trình tham dự thầu, nhà thầu X không đạt về kỹ thuật có kiến nghị về kết quả lựa chọn nhà thầu của gói thầu gửi Hội đồng giải quyết kiến nghị (trong đơn kiến nghị nhà thầu nêu giá dự thầu của mình là 90 tỷ đồng). Chi phí giải quyết kiến nghị nhà thầu X phải nộp là?","options": ["Nhà thầu X phải nộp 25 triệu đồng","Nhà thầu X phải nộp 22, 5 triệu đồng","Nhà thầu X phải nộp 20 triệu đồng","Nhà thầu X phải nộp 15 triệu đồng"],"answer": "B","explanation": ""},{"stt": "190","question": "Trường hợp hồ sơ mời thầu cho phép nhà thầu đề xuất biện pháp thi công khác với biện pháp thi công nêu trong hồ sơ mời thầu thì phần sai khác giữa khối lượng công việc theo biện pháp thi công nêu trong hồ sơ mời thầu và khối lượng công việc theo biện pháp thi công do nhà thầu đề xuất được xem xét thế nào?","options": ["Bị hiệu chỉnh sai lệch, phần sai khác được tính là sai lệch thừa","Không bị hiệu chỉnh sai lệch, phần sai khác không được tính là sai lệch thừa","Bị hiệu chỉnh sai lệch, phần sai khác được tính là sai lệch thiếu","Không bị hiệu chỉnh sai lệch, phần sai khác không bị tính là sai lệch thiếu"],"answer": "D","explanation": ""},{"stt": "191","question": "Trường hợp hồ sơ dự thầu có giá dự thầu sau sửa lỗi, hiệu chỉnh sai lệch, trừ đi giá trị giảm giá (nếu có) thấp khác thường thì chủ đầu tư có thể quy định giá trị bảo đảm thực hiện hợp đồng tối đa là bao nhiêu để đề phòng rủi ro?","options": ["30% giá hợp đồng","35% giá hợp đồng","40% giá hợp đồng","45% giá hợp đồng"],"answer": "A","explanation": ""},{"stt": "192","question": "Đối với gói thầu chia phần, chủ đầu tư có thể phê duyệt kết quả lựa chọn nhà thầu cho từng phần hay không?","options": ["Không thể","Có thể nhưng phải bảo đảm điều kiện giá đề nghị trúng thầu không vượt giá gói thầu","Có thể nhưng phải bảo đảm tỷ lệ tiết kiệm tối thiểu 5%","Có thể nhưng phải bảo đảm điều kiện giá đề nghị trúng thầu không vượt giá của phần đó trong giá gói thầu"],"answer": "D","explanation": ""},{"stt": "193","question": "Đối với gói thầu chia phần, trường hợp một phần của gói thầu không có nhà thầu tham dự thầu thì chủ đầu tư xử lý thế nào?","options": ["Tách phần đó ra thành gói thầu riêng biệt để tổ chức lựa chọn nhà thầu theo quy định","Hủy thầu","Đàm phán với nhà thầu trúng thầu của phần khác để thực hiện","Phương án B và C đều đúng"],"answer": "A","explanation": ""},{"stt": "194","question": "Thẩm quyền xử lý tình huống phức tạp trong đấu thầu?","options": ["Chủ đầu tư quyết định xử lý tình huống sau khi có ý kiến của người có thẩm quyền","Người có thẩm quyền quyết định xử lý tình huống sau khi có ý kiến của Tổ chuyên gia","Người có thẩm quyền quyết định xử lý tình huống sau khi có ý kiến của chủ đầu tư","Người có thẩm quyền quyết định xử lý tình huống sau khi có ý kiến của chủ đầu tư và Tổ chuyên gia"],"answer": "A","explanation": ""},{"stt": "195","question": "Trường hợp một hoặc một số thành viên liên danh vi phạm hợp đồng, không còn năng lực để tiếp tục thực hiện hợp đồng, làm ảnh hưởng nghiêm trọng đến tiến độ, chất lượng, hiệu quả của gói thầu thì việc đánh giá uy tín của nhà thầu trong việc thực hiện hợp đồng được xử lý như nào?","options": ["Nhà thầu liên danh vi phạm hợp đồng bị coi là không hoàn thành hợp đồng và bị chủ đầu tư đăng tải thông tin nhà thầu liên danh vi phạm hợp đồng trên Hệ thống mạng đấu thầu quốc gia","Chỉ một hoặc một số thành viên liên danh vi phạm hợp đồng bị coi là không hoàn thành hợp đồng và bị chủ đầu tư đăng tải thông tin thành viên liên danh vi phạm hợp đồng trên Hệ thống mạng đấu thầu quốc gia","Chỉ một hoặc một số thành viên liên danh vi phạm hợp đồng bị coi là không hoàn thành hợp đồng và bị bên mời thầu đăng tải thông tin thành viên liên danh vi phạm hợp đồng trên Hệ thống mạng đấu thầu quốc gia","Nhà thầu liên danh vi phạm hợp đồng bị coi là không hoàn thành hợp đồng và bị bên mời thầu đăng tải thông tin nhà thầu liên danh vi phạm hợp đồng trên Hệ thống mạng đấu thầu quốc gia"],"answer": "B","explanation": ""},{"stt": "196","question": "Trường hợp phải chấm dứt hợp đồng với nhà thầu vi phạm hợp đồng để thay thế nhà thầu mới thì phần công việc chưa thực hiện được áp dụng hình thức chỉ định thầu cho nhà thầu khác với giá trị được tính như nào?","options": ["Bằng giá trị ghi trong hợp đồng trừ đi giá trị của phần công việc đã thực hiện, được nghiệm thu trước đó","Bằng giá trị ghi trong hợp đồng được cập nhật giá tại thời điểm áp dụng hình thức chỉ định thầu trừ đi giá trị của phần công việc đã thực hiện, được nghiệm thu trước đó","Bằng giá trị của phần công việc còn lại được cập nhật giá tại thời điểm áp dụng hình thức chỉ định thầu","Bằng giá trị ghi trong hợp đồng trừ đi giá trị của phần công việc đã thực hiện trước đó theo dự toán được duyệt"],"answer": "A","explanation": ""},{"stt": "197","question": "Đối với nhà thầu liên danh, trường hợp trong quá trình thực hiện hợp đồng cần đẩy nhanh tiến độ thực hiện so với hợp đồng đã ký (cần sửa đổi hợp đồng) thì cần thực hiện như thế nào?","options": ["Các thành viên liên danh thỏa thuận, điều chỉnh về phạm vi công việc, tiến độ được rút ngắn và không phải thông báo cho chủ đầu tư","Các thành viên liên danh thỏa thuận, điều chỉnh về phạm vi công việc, tiến độ được rút ngắn và thông báo cho chủ đầu tư","Phải được người có thẩm quyền cho phép chủ đầu tư và nhà thầu thỏa thuận, điều chỉnh phạm vi công việc giữa các thành viên liên danh phù hợp với tiến độ hoặc tiến độ được rút ngắn","Chủ đầu tư và nhà thầu được thỏa thuận điều chỉnh phạm vi công việc giữa các thành viên liên danh phù hợp với tiến độ hoặc tiến độ được rút ngắn"],"answer": "D","explanation": ""},{"stt": "198","question": "Trường hợp nhà thầu có nhân sự (ký kết hợp đồng lao động với nhà thầu tại thời điểm nhân sự thực hiện hành vi vi phạm) bị cơ quan điều tra kết luận có hành vi vi phạm quy định về đấu thầu gây hậu quả nghiêm trọng theo quy định pháp luật về hình sự nhằm mục đích cho nhà thầu trúng thầu nhưng nhân sự của nhà thầu chưa bị Tòa án kết án hoặc nhà thầu chưa bị người có thẩm quyền ra quyết định cấm tham gia hoạt động đấu thầu thì tại thời điểm này nhà thầu có được tham dự thầu hay không?","options": ["Nhà thầu không được tham dự thầu","Hồ sơ dự thầu, hồ sơ đề xuất của nhà thầu sẽ được mở nhưng không được xem xét, đánh giá","Hồ sơ dự thầu, hồ sơ đề xuất của nhà thầu không được mở thầu và trả lại theo nguyên trạng","Nhà thầu vẫn được tiếp tục tham dự thầu"],"answer": "D","explanation": ""},{"stt": "199","question": "Trường hợp nào là một trong những điều kiện để chủ đầu tư chấp thuận đề xuất của nhà thầu trong quá trình thực hiện hợp đồng về việc thay đổi các hàng hóa có phiên bản sản xuất, năm sản xuất mới hơn so với hàng hóa ghi trong hợp đồng?","options": ["Hàng hóa thay thế có tính năng kỹ thuật, cấu hình, thông số và các yêu cầu kỹ thuật khác tương đương hoặc tốt hơn hàng hóa ghi trong hợp đồng nhưng bắt buộc phải cùng hãng sản xuất và xuất xứ","Hàng hóa thay thế có tính năng kỹ thuật, cấu hình, thông số và các yêu cầu kỹ thuật khác tương đương hoặc tốt hơn hàng hóa ghi trong hợp đồng, phải cùng hãng sản xuất nhưng không bắt buộc cùng xuất xứ","Hàng hóa thay thế có tính năng kỹ thuật, cấu hình, thông số và các yêu cầu kỹ thuật khác tương đương hoặc tốt hơn hàng hóa ghi trong hợp đồng, phải cùng xuất xứ nhưng không bắt buộc cùng hãng sản xuất","Hàng hóa thay thế có tính năng kỹ thuật, cấu hình, thông số và các yêu cầu kỹ thuật khác tương đương hoặc tốt hơn hàng hóa ghi trong hợp đồng nhưng không bắt buộc cùng hãng sản xuất và cùng xuất xứ"],"answer": "A","explanation": ""},{"stt": "200","question": "Trường hợp gói thầu có tính chất đặc thù và áp dụng hình thức chỉ định thầu hoặc lựa chọn nhà thầu trong trường hợp đặc biệt, nhà thầu nước ngoài có yêu cầu ràng buộc chỉ ký hợp đồng khi không phải đăng ký trên Hệ thống mạng đấu thầu quốc gia thì chủ đầu tư xử lý như thế nào?","options": ["Không cần yêu cầu nhà thầu nước ngoài đăng ký khi đăng tải kết quả lựa chọn nhà thầu","Yêu cầu nhà thầu nước ngoài đăng ký khi đăng tải kết quả lựa chọn nhà thầu","Nhà thầu không được chấp nhận và bị loại","Hủy thầu"],"answer": "A","explanation": ""},{"stt": "201","question": "Đối với trường hợp hủy thầu thì phải thực hiện giải pháp nào sau đây?","options": ["Phải điều chỉnh thời gian bắt đầu tổ chức lựa chọn nhà thầu trong kế hoạch lựa chọn nhà thầu","Phải điều chỉnh thời gian thực hiện gói thầu trong kế hoạch lựa chọn nhà thầu","Không phải điều chỉnh thời gian bắt đầu tổ chức lựa chọn nhà thầu trong kế hoạch lựa chọn nhà thầu","Tất cả các đáp án trên đều không đúng"],"answer": "C","explanation": ""},{"stt": "202","question": "Hủy thầu được thực hiện trong thời gian nào?","options": ["Từ ngày có thời điểm đóng thầu đến khi có kết quả lựa chọn nhà thầu","Từ ngày phát hành hồ sơ mời sơ tuyển, hồ sơ mời quan tâm, hồ sơ mời thầu, hồ sơ yêu cầu đến trước khi ký kết hợp đồng, thỏa thuận khung đối với mua sắm tập trung","Từ ngày có thời điểm đóng thầu đến khi ký kết hợp đồng, thỏa thuận khung đối với mua sắm tập trung","Từ ngày phát hành hồ sơ mời sơ tuyển, hồ sơ mời quan tâm, hồ sơ mời thầu, hồ sơ yêu cầu kể cả sau khi đã ký hợp đồng"],"answer": "B","explanation": ""},{"stt": "203","question": "Đối với gói thầu tổ chức lựa chọn nhà thầu qua mạng, trường hợp trong quá trình đánh giá E-HSDT mà chưa có kết quả lựa chọn nhà thầu, nhà thầu có tên trong biên bản mở thầu bị khóa tài khoản theo quy định của pháp luật về đấu thầu thì chủ đầu tư xử lý như thế nào?","options": ["Yêu cầu nhà thầu thực hiện các thủ tục để mở khóa tài khoản làm cơ sở xem xét, đánh giá E-HSDT của nhà thầu","Tiếp tục xem xét, đánh giá E-HSDT của nhà thầu","Không tiếp tục xem xét, đánh giá E-HSDT của nhà thầu","Tiếp tục xem xét, đánh giá E-HSDT của nhà thầu và yêu cầu nhà thầu thực hiện các thủ tục để mở khóa tài khoản trước khi phê duyệt kết quả lựa chọn nhà thầu"],"answer": "C","explanation": ""},{"stt": "204","question": "Đối với gói thầu xây lắp, dịch vụ phi tư vấn, dịch vụ tư vấn áp dụng đấu thầu trước quy định tại Điều 42 của Luật Đấu thầu, trường hợp dự án được phê duyệt có các nội dung dẫn đến tăng giá gói thầu (hoặc tăng dự toán nếu dự toán được phê duyệt sau khi phê duyệt kế hoạch lựa chọn nhà thầu) từ 30% trở lên hoặc thay đổi tiêu chuẩn đánh giá quan trọng về kỹ thuật hoặc thay đổi cấp công trình quy định trong hồ sơ mời thầu đã phát hành thì chủ đầu tư xử lý như thế nào?","options": ["Tiếp tục đánh giá hồ sơ dự thầu trong trường hợp đã mở thầu","Được sửa đổi và phát hành bổ sung hồ sơ mời thầu trong trường hợp chưa mở thầu","Được sửa đổi, bổ sung khối lượng công việc, hoàn thiện để ký kết hợp đồng với nhà thầu","Hủy thầu"],"answer": "D","explanation": ""},{"stt": "205","question": "Trường hợp nhà thầu trúng thầu không tiến hành hoàn thiện, ký kết hợp đồng hoặc tại thời điểm ký kết hợp đồng, nhà thầu trúng thầu không đáp ứng yêu cầu về năng lực kỹ thuật, tài chính quy định tại khoản 2 Điều 66 của Luật Đấu thầu thì chủ đầu tư xử lý như thế nào trong trường hợp này?","options": ["Hủy quyết định phê duyệt kết quả lựa chọn nhà thầu trúng thầu","Hủy thầu","Không công nhận kết quả lựa chọn nhà thầu","Đình chỉ cuộc thầu"],"answer": "A","explanation": ""},{"stt": "206","question": "Trường hợp nào sau đây, chủ đầu tư và nhà thầu liên danh được thỏa thuận điều chỉnh phạm vi công việc giữa các thành viên liên danh?","options": ["Khi một thành viên liên danh không muốn tiếp tục thực hiện phần việc đã cam kết","Khi chủ đầu tư thấy một thành viên trong liên danh thực hiện tốt nên muốn điều chuyển toàn bộ phần việc cho thành viên liên danh đó","Khi cần đẩy nhanh tiến độ thực hiện hợp đồng hoặc do điều kiện khách quan không phải lỗi của nhà thầu làm ảnh hưởng tiến độ","Khi một thành viên liên danh đề nghị chuyển nhượng phần việc để tiết kiệm chi phí"],"answer": "C","explanation": ""},{"stt": "207","question": "Gói thầu EC có giá dự thầu sau sửa lỗi, hiệu chỉnh sai lệch, trừ đi giá trị giảm giá bằng 85% giá gói thầu thì chủ đầu tư có thể quy định giá trị bảo đảm thực hiện hợp đồng ở mức 15% hay không?","options": ["Không được quy định","Có thể quy định nhưng phải được sự đồng ý của nhà thầu","Chủ đầu tư quyết định để ngừa rủi ro cho quá trình thực hiện","Có thể quy định nhưng phải được người có thẩm quyền chấp thuận"],"answer": "A","explanation": ""},{"stt": "208","question": "Đối với gói thầu hỗn hợp có yêu cầu đặc thù về kỹ thuật chỉ có một số nhà thầu đáp ứng yêu cầu của gói thầu áp dụng bước thương thảo hợp đồng, trường hợp nhà thầu xếp hạng thứ nhất (danh sách xếp hạng có 03 nhà thầu) không tiến hành thương thảo, không ký biên bản thương thảo, thương thảo không thành công thì chủ đầu tư thực hiện bước tiếp theo như thế nào?","options": ["Mời nhà thầu xếp hạng tiếp theo vào thương thảo hợp đồng","Hủy thầu","Cho phép các nhà thầu còn lại chào lại giá dự thầu","Mời nhà thầu xếp hạng tiếp theo vào hoàn thiện hợp đồng"],"answer": "A","explanation": ""},{"stt": "209","question": "Đối với gói thầu xây lắp áp dụng đấu thầu quốc tế, trường hợp nhà thầu xếp thứ nhất có hồ sơ dự thầu không cân bằng (có đơn giá chào cao hơn đáng kể so với đơn giá tương ứng trong dự toán gói thầu ở các hạng mục công việc có các yêu cầu kỹ thuật đơn giản, dễ thực hiện, hạng mục công việc có khả năng phát sinh khối lượng ngoài khối lượng trong bảng giá dự thầu và có đơn giá chào thấp hơn đáng kể so với đơn giá tương ứng trong dự toán gói thầu ở các hạng mục công việc phức tạp, khó thực hiện) thì chủ đầu tư có thể xử lý thế nào?","options": ["Yêu cầu nhà thầu làm rõ bằng văn bản về các chi phí cấu thành giá dự thầu","Có thể quy định giá trị bảo đảm thực hiện hợp đồng lớn hơn 10% nhưng không quá 30% giá hợp đồng để đề phòng rủi ro","Mời nhà thầu chào lại giá","Phương án A và B đều đúng"],"answer": "D","explanation": ""},{"stt": "210","question": "Trường hợp xí nghiệp X được tách ra khỏi pháp nhân theo quy định của pháp luật về dân sự thì nhà thầu tiếp nhận xí nghiệp X có được kế thừa năng lực, kinh nghiệm của xí nghiệp hay không?","options": ["Không được kế thừa năng lực, kinh nghiệm của xí nghiệp X","Được kế thừa năng lực, kinh nghiệm của xí nghiệp X","Chỉ được kế thừa về kinh nghiệm của xí nghiệp X","Chỉ được kế thừa về năng lực của xí nghiệp X"],"answer": "B","explanation": ""},{"stt": "211","question": "Trong quá trình thực hiện hợp đồng của nhà thầu liên danh A-B, nhà thầu B không còn năng lực để tiếp tục thực hiện hợp đồng, làm ảnh hưởng nghiêm trọng đến tiến độ, chất lượng, hiệu quả của gói thầu. Trong trường hợp này, bảo đảm thực hiện hợp đồng của nhà thầu xử lý như thế nào?","options": ["Không tịch thu giá trị bảo đảm thực hiện hợp đồng của nhà thầu A-B","Tịch thu giá trị bảo đảm thực hiện hợp đồng của tất cả thành viên liên danh trong trường hợp phần công việc còn lại của các thành viên liên danh vi phạm hợp đồng được tách thành gói thầu riêng để lựa chọn nhà thầu","Chỉ tịch thu giá trị bảo đảm thực hiện hợp đồng của nhà thầu B nếu nhà thầu A có đủ năng lực, kinh nghiệm đảm nhận phần công việc còn lại của nhà thầu B","Phương án B và C đều đúng"],"answer": "D","explanation": ""},{"stt": "212","question": "Đối với gói thầu mua sắm thiết bị y tế, tổ chức đấu thầu rộng rãi qua mạng gói thầu mua sắm thiết bị y tế, trường hợp nhà thầu dự thầu không đề xuất cụ thể ký mã hiệu, nhãn hiệu, xuất xứ, hãng sản xuất thì xử lý như thế nào?","options": ["Chủ đầu tư yêu cầu nhà thầu bổ sung, làm rõ E-HSDT","Chủ đầu tư tiếp tục đánh giá E-HSDT, trường hợp nhà thầu xếp thứ nhất thì yêu cầu nhà thầu bổ sung thông tin để hoàn thiện hợp đồng","E-HSDT của nhà thầu bị đánh giá không đáp ứng và bị loại","Xin ý kiến người có thẩm quyền để xử lý tình huống trong đấu thầu"],"answer": "C","explanation": ""},{"stt": "213","question": "Nhận định nào sau đây đúng về văn bản điện tử trên Hệ thống mạng đấu thầu quốc gia?","options": ["Văn bản điện tử trên Hệ thống có giá trị theo quy định của pháp luật về giao dịch điện tử, làm cơ sở đối chiếu, so sánh, xác thực thông tin phục vụ công tác đánh giá, thẩm định, thanh tra, kiểm tra, kiểm toán và giải ngân","Thời điểm gửi, nhận văn bản điện tử được xác định căn cứ theo thời gian thực ghi lại trên Hệ thống","Khi gửi hồ sơ thanh quyết toán đến Kho bạc Nhà nước, nhà thầu không phải cung cấp thông tin, tài liệu cho Kho bạc Nhà nước đối với các thông tin, tài liệu là văn bản điện tử trên Hệ thống","Cả 3 phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "214","question": "Tài khoản nghiệp vụ trên Hệ thống mạng đấu thầu quốc gia là gì?","options": ["Tài khoản do người sử dụng đăng ký và được phê duyệt trên Hệ thống mạng đấu thầu quốc gia","Tài khoản do Trung tâm Đấu thầu qua mạng quốc gia cấp phép theo quy định","Tài khoản do Tài khoản tham gia hệ thống tạo ra","Phương án A và B đều đúng"],"answer": "C","explanation": ""},{"stt": "215","question": "Nhà thầu có trách nhiệm kê khai thông tin nào trên Hệ thống mạng đấu thầu quốc gia?","options": ["Thông tin về uy tín của nhà thầu trong việc tham dự thầu","Thông tin về vi phạm của nhà thầu","Thông tin về năng lực, kinh nghiệm của nhà thầu","Cả 3 phương án trên đều đúng"],"answer": "C","explanation": ""},{"stt": "216","question": "Ai chịu trách nhiệm đăng tải thông tin chủ yếu của hợp đồng trên Hệ thống mạng đấu thầu quốc gia?","options": ["Bên mời thầu","Tổ chuyên gia","Tư vấn đấu thầu","Chủ đầu tư"],"answer": "D","explanation": ""},{"stt": "217","question": "Trong đấu thầu qua mạng, nhà thầu tư vấn đấu thầu bị khoá tài khoản trong vòng 06 tháng khi thực hiện hành vi nào sau đây?","options": ["Tham gia vào quá trình lập và đánh giá E-HSMT","Tham gia vào quá trình thẩm định hồ sơ mời thầu và kết quả lựa chọn nhà thầu","Thay chủ đầu tư đăng tải các nội dung thuộc trách nhiệm đăng tải của chủ đầu tư","Đăng tải thông tin về năng lực, kinh nghiệm của mình trên Hệ thống mạng đấu thầu quốc gia"],"answer": "C","explanation": ""},{"stt": "218","question": "Chủ đầu tư có trách nhiệm đăng tải thông tin chủ yếu của hợp đồng trên Hệ thống đấu thầu qua mạng quốc gia chậm nhất là?","options": ["05 ngày làm việc kể từ ngày ký kết hợp đồng","05 ngày làm việc kể từ ngày hợp đồng có hiệu lực","05 ngày kể từ ngày hợp đồng có hiệu lực","05 ngày làm việc kể từ ngày nhà thầu nộp bảo đảm thực hiện hợp đồng"],"answer": "B","explanation": ""},{"stt": "219","question": "Danh sách nhà thầu có hành vi vi phạm và bị đánh giá về uy tín được đăng tải trên Hệ thống mạng đấu thầu quốc gia như thế nào?","options": ["Tổ chuyên gia đăng tải trong thời hạn 03 ngày làm việc kể từ ngày nhà thầu có hành vi vi phạm","Bên mời thầu đăng tải trong thời hạn 05 ngày làm việc kể từ ngày nhà thầu có hành vi vi phạm","Chủ đầu tư đăng tải trong thời hạn 07 ngày làm việc kể từ ngày nhà thầu có hành vi vi phạm","Người có thẩm quyền đăng tải trong thời hạn 05 ngày làm việc kể từ ngày nhà thầu có hành vi vi phạm"],"answer": "C","explanation": ""},{"stt": "220","question": "Chủ thể nào sau đây được gia hạn thời điểm đóng thầu trên Hệ thống mạng đấu thầu quốc gia?","options": ["Người có thẩm quyền","Chủ đầu tư","Tổ chuyên gia","Tư vấn đấu thầu"],"answer": "B","explanation": ""},{"stt": "221","question": "Chọn phương án đúng về thời gian áp dụng mua sắm trực tuyến đối với các hạng mục trong danh mục hàng hóa, dịch vụ mua sắm tập trung?","options": ["Thời gian áp dụng là thời gian thực hiện hợp đồng trong trường hợp không ký thỏa thuận khung nhưng không quá 24 tháng kể từ ngày hợp đồng có hiệu lực hoặc thời gian có hiệu lực của thỏa thuận khung","Thời gian áp dụng là 24 tháng kể từ ngày kết quả lựa chọn nhà thầu được đăng tải trên Hệ thống mạng đấu thầu quốc gia trong trường hợp hợp đồng, thỏa thuận khung chưa được công khai","Thời gian áp dụng là 24 tháng kể từ ngày kết quả lựa chọn nhà thầu được đăng tải trên Hệ thống mạng đấu thầu quốc gia","Phương án A và B đều đúng"],"answer": "D","explanation": ""},{"stt": "222","question": "Công việc nào sau đây phải thực hiện trên Hệ thống mạng đấu thầu quốc gia?","options": ["Lập E-HSMT","Trình phê duyệt E-HSMT, phê duyệt E-HSMT","Phê duyệt kết quả lựa chọn nhà thầu","Tất cả các phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "223","question": "Đối với đấu thầu qua mạng, việc trả lời yêu cầu làm rõ E-HSMT được thực hiện theo phương án nào?","options": ["Do tổ chuyên gia thực hiện bằng văn bản","Do tổ chuyên gia thực hiện trên Hệ thống mạng đấu thầu quốc gia","Do tư vấn đấu thầu thực hiện bằng tài khoản của đơn vị tư vấn trên Hệ thống mạng đấu thầu quốc gia","Do Chủ đầu tư thực hiện trên Hệ thống mạng đấu thầu quốc gia"],"answer": "D","explanation": ""},{"stt": "224","question": "Đối với gói thầu đấu thầu qua mạng, trường hợp sửa đổi E-HSMT sau khi phát hành, chủ đầu tư phải đăng tải tài liệu nào sau đây trên Hệ thống?","options": ["Quyết định sửa đổi kèm theo những nội dung sửa đổi E-HSMT","E-HSMT đã được sửa đổi","Báo cáo thẩm định E-HSMT sửa đổi","Phương án A và B đều đúng"],"answer": "D","explanation": ""},{"stt": "225","question": "Nhà thầu không phải đính kèm thư bảo lãnh (hoặc giấy chứng nhận bảo hiểm bảo lãnh) mà chỉ phải cam kết trong đơn dự thầu đối với gói thầu xây lắp khi nào?","options": ["E-HSMT yêu cầu giá trị bảo đảm dự thầu là 40 triệu đồng","E-HSMT yêu cầu giá trị bảo đảm dự thầu là 50 triệu đồng","E-HSMT yêu cầu giá trị bảo đảm dự thầu là 60 triệu đồng","E-HSMT yêu cầu giá trị bảo đảm dự thầu là 100 triệu đồng"],"answer": "A","explanation": ""},{"stt": "226","question": "Bản gốc thư bảo lãnh dự thầu, giấy chứng nhận bảo hiểm bảo lãnh trong đấu thầu qua mạng được nộp như thế nào?","options": ["Gửi qua email đến Tổ trưởng Tổ chu ,"answer": "C","explanation": ""},{"stt": "230","question": "Đối với đấu thầu qua mạng, trường hợp Hệ thống gặp sự cố thì trường hợp nào được Hệ thống tự động gia hạn thời điểm đóng thầu?","options": ["Các gói thầu có thời điểm đóng thầu, thời điểm kết thúc chào giá trực tuyến trong thời gian từ khi Hệ thống gặp sự cố cho đến thời điểm sau hoàn thành khắc phục sự cố 02 giờ","Các gói thầu có thời điểm đóng thầu, thời điểm kết thúc chào giá trực tuyến, thời điểm đăng tải kết quả lựa chọn nhà thầu trong thời gian từ khi Hệ thống gặp sự cố cho đến thời điểm sau hoàn thành khắc phục sự cố 02 giờ","Các gói thầu có thời điểm đóng thầu trong thời gian từ khi Hệ thống gặp sự cố cho đến thời điểm sau hoàn thành khắc phục sự cố 04 giờ","Các đáp án trên đều sai"],"answer": "A","explanation": ""},{"stt": "231","question": "Đối với đấu thầu qua mạng, khi tham dự thầu, nhà thầu…. ?","options": ["Chịu trách nhiệm về tính chính xác của các thông tin kê khai trên webform và file tài liệu đính kèm","Chỉ nộp một bộ E-HSDT đối với một E-TBMT","Chỉ được rút, sửa đổi, nộp lại E-HSDT trước thời điểm đóng thầu","Cả 3 đáp án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "232","question": "Khi nào nhà thầu phải nộp lại E-HSDT đã nộp?","options": ["Khi Tổ chuyên gia phát hiện E-HSDT bị lỗi kỹ thuật không mở được","Khi Hệ thống mạng đấu thầu quốc gia gặp sự cố phải tự động gia hạn","Khi E-HSMT được sửa đổi","Các phương án trên đều đúng"],"answer": "C","explanation": ""},{"stt": "233","question": "Đối với gói thầu tổ chức đấu thầu rộng rãi qua mạng, trường hợp tại thời điểm đóng thầu mà không có nhà thầu nộp E-HSDT thì chủ đầu tư quyết định theo phương án nào sau đây?","options": ["Huỷ E-TBMT để mời thầu lại","Chuyển sang hình thức đấu thầu rộng rãi không qua mạng","Cho phép gia hạn thời điểm đóng thầu tối thiểu 05 ngày làm việc đối với gói thầu xây lắp, hỗn hợp có giá gói thầu không quá 20 tỷ đồng, gói thầu mua sắm hàng hoá, dịch vụ phi tư vấn có giá không quá 10 tỷ đồng","Phương án  kết quả hoạt động tài chính, doanh thu bình quân hằng năm"],"answer": "D","explanation": ""},{"stt": "240","question": "Quy trình 02 trong đánh giá E-HSDT được áp dụng đối với gói thầu nào sau đây?","options": ["Gói thầu mua sắm hàng hóa áp dụng phương thức một giai đoạn một túi hồ sơ, sử dụng phương pháp “giá thấp nhất” và các nhà thầu, E-HSDT đều không có bất kỳ ưu đãi nào","Gói thầu dịch vụ phi tư vấn áp dụng phương thức một giai đoạn một túi hồ sơ, sử dụng phương pháp “giá đánh giá” và các nhà thầu, E-HSDT chào ưu đãi như nhau","Gói thầu xây lắp áp dụng phương thức một giai đoạn một túi hồ sơ, sử dụng phương pháp “giá thấp nhất” và các nhà thầu, E-HSDT đều không có bất kỳ ưu đãi nào","Gói thầu máy đặt, máy mượn áp dụng phương thức một giai đoạn một túi hồ sơ, sử dụng phương pháp “giá thấp nhất” và các nhà thầu, E-HSDT chào ưu đãi như nhau"],"answer": "A","explanation": ""},{"stt": "241","question": "Chủ đầu tư yêu cầu gia hạn hiệu lực hồ sơ dự thầu, bảo đảm dự thầu trong trường hợp nào sau đây?","options": ["Trước khi hết hạn hiệu lực hồ sơ dự thầu trong trường hợp cần gia hạn để tiếp tục đánh giá hồ sơ dự thầu","Trường hợp nhà thầu xếp hạng tiếp theo được mời vào thương thảo hợp đồng nhưng hồ sơ dự thầu của nhà thầu đó hết hiệu lực thì Chủ đầu tư phải yêu cầu nhà thầu gia hạn hiệu lực của hồ sơ dự thầu, bảo đảm dự thầu trước khi thương thảo hợp đồng","Trước khi phê duyệt kết quả lựa chọn nhà thầu","Phương án A và B đều đúng"],"answer": "D","explanation": ""},{"stt": "242","question": "Trong quá trình đánh giá, Tổ chuyên gia phát hiện nhà thầu tham dự thầu trên Hệ thống mạng đấu thầu quốc gia đính kèm tệp tin có thiết lập mật khẩu thì xử lý thế nào?","options": ["Yêu cầu nhà thầu nộp lại tệp tin không có thiết lập mật khẩu trên Hệ thống mạng đấu thầu quốc gia để xem xét, đánh giá","Yêu cầu nhà thầu cung cấp mật khẩu để xem xét, đánh giá","Tệp tin này không được xem xét, đánh giá","Phương án A và B đều đúng"],"answer": "C","explanation": ""},{"stt": "243","question": "Theo quy định tại Thông tư số 79/2025/TT BTC, quy định về thời điểm bắt đầu và kết thúc chào giá trực tuyến theo quy trình rút gọn?","options": ["Thời điểm bắt đầu và kết thúc phải trong giờ hành chính.","Thời điểm bắt đầu không bắt buộc trong giờ hành chính nhưng kết thúc phải trong giờ hành chính.","Thời điểm bắt đầu và kết thúc không bắt buộc trong giờ hành chính.","Tất cả phương án trên đều sai"],"answer": "A","explanation": ""},{"stt": "244","question": "Đối với gói thầu chào giá trực tuyến rút gọn, nhà thầu xác nhận về việc chấp thuận được trao hợp đồng trong thời gian tối đa bao lâu kể từ ngày chủ đầu tư mời nhà thầu xác nhận trên Hệ thống mạng đấu thầu quốc gia?","options": ["03 ngày","03 ngày làm việc","05 ngày","05 ngày làm việc"],"answer": "B","explanation": ""},{"stt": "245","question": "Gói thầu chào giá trực tuyến rút gọn, trường hợp nhà thầu từ chối hoặc không xác nhận về việc chấp thuận được trao hợp đồng trên Hệ thống mạng đấu thầu quốc gia thì nội dung nào sau đây không đúng?","options": ["Công khai tên nhà thầu trên Hệ thống mạng đấu thầu quốc gia","Khoá tài khoản trong thời hạn 03 tháng kể từ ngày Bộ Tài chính nhận được văn bản đề nghị của chủ đầu tư","Khóa chức năng chào giá trực tuyến trong thời hạn 06 tháng kể từ ngày chủ đầu tư công khai tên nhà thầu trên Hệ thống mạng đấu thầu quốc gia","Bị đánh giá về uy tín trong việc tham dự thầu"],"answer": "B","explanation": ""},{"stt": "246","question": "Chào giá trực tuyến theo quy trình thông thường áp dụng đối với gói thầu nào sau đây?","options": ["Dịch vụ phi tư vấn thông dụng, đơn giản","Xây lắp","Dịch vụ tư vấn","Hỗn hợp"],"answer": "A","explanation": ""},{"stt": "247","question": "Nhà thầu phải thực hiện xác nhận về việc chấp thuận được trao hợp đồng trên Hệ thống mạng đấu thầu quốc gia đối với các hình thức lựa chọn nhà thầu qua mạng nào?","options": ["Đấu thầu rộng rãi, chào hàng cạnh tranh, đấu thầu hạn chế.","Chào giá trực tuyến theo quy trình thông thường","Chào giá trực tuyến theo quy trình rút gọn","Các phương án trên đều đúng"],"answer": "C","explanation": ""},{"stt": "248","question": "Đối với chào giá trực tuyến rút gọn, kể từ lượt chào giá thứ hai, giá chào của nhà thầu không được thấp hơn giá thấp nhất hiển thị trên Hệ thống mạng đấu thầu quốc gia là bao nhiêu %?","options": ["80%","85%","90%","95%"],"answer": "C","explanation": ""},{"stt": "249","question": "Đối với chào giá trực tuyến rút gọn, giá trị bảo đảm dự thầu tối đa là giá trị nào sau đây?","options": ["5% giá gói thầu","10% giá gói thầu","1-3% giá gói thầu","Không yêu cầu về bảo đảm dự thầu"],"answer": "D","explanation": ""},{"stt": "250","question": "Đối với gói thầu áp dụng chào giá trực tuyến theo quy trình thông thường, trường hợp nhà thầu được mời tham gia chào giá trực tuyến nhưng nhà thầu từ chối tham gia thì xử lý thế nào?","options": ["Đề xuất về tài chính của nhà thầu sẽ bị đánh giá là không đạt","Nhà thầu sẽ bị loại và bị khóa tài khoản trên Hệ thống mạng đấu thầu quốc gia trong vòng 06 tháng","Hồ sơ dự thầu của nhà thầu sẽ tiếp tục được đánh giá về tài chính căn cứ theo hồ sơ dự thầu đã nộp trước thời điểm đóng thầu","Phương án A và B đều đúng"],"answer": "C","explanation": ""},{"stt": "251","question": "Mua sắm trực tuyến được áp dụng đối với hàng hoá, dịch vụ của gói thầu thuộc dự toán mua sắm với giá gói thầu có hạn mức tối đa là bao nhiêu?","options": ["100 triệu đồng","300 triệu đồng","500 triệu đồng","01 tỷ đồng"],"answer": "C","explanation": ""},{"stt": "252","question": "Trong mua sắm tập trung áp dụng đấu thầu rộng rãi, hợp đồng điện tử có thể được ký kết giữa các đối tượng nào?","options": ["Đơn vị mua sắm tập trung và các nhà thầu trúng thầu (trong trường hợp không ký thỏa thuận khung)","Đơn vị có nhu cầu mua sắm với các nhà thầu trúng thầu (trong trường hợp đơn vị mua sắm tập trung ký thỏa thuận khung với nhà thầu trúng thầu)","Phương án A và B đều đúng","Phương án A và B đều sai"],"answer": "C","explanation": ""},{"stt": "253","question": "Mua sắm trực tuyến được áp dụng đối với gói thầu nào sau đây?","options": ["Gói thầu mua sắm hàng hóa, dịch vụ thuộc dự toán mua sắm có giá gói thầu không quá 500 triệu đồng; gói thầu mua sắm hàng hóa, dịch vụ thuộc dự án có giá gói thầu không quá 01 tỷ đồng","Gói thầu xây lắp thuộc dự toán mua sắm có giá gói thầu không quá 01 tỷ đồng; gói thầu xây lắp thuộc dự án có giá gói thầu không quá 02 tỷ đồng","Gói thầu mua sắm hàng hóa, cung cấp dịch vụ phi tư vấn thuộc dự án có giá gói thầu không quá 05 tỷ đồng","Phương án B và C đều đúng"],"answer": "A","explanation": ""},{"stt": "254","question": "Đối với gói thầu áp dụng hình thức chào giá trực tuyến rút gọn, việc thẩm định kết quả lựa chọn nhà thầu được thực hiện như thế nào?","options": ["Chỉ thẩm định nội dung về giá chào của nhà thầu","Bắt buộc thẩm định khi người có thẩm quyền yêu cầu","Không phải thẩm định kết quả lựa chọn nhà thầu","Phương án A và B đều đúng"],"answer": "C","explanation": ""},{"stt": "255","question": "Khi đánh giá E-HSDT gói thầu xây lắp áp dụng đấu thầu rộng rãi qua mạng, trường hợp có sự không thống nhất giữa thông tin về hợp đồng tương tự kê khai trên webform và file tài liệu chứng minh các thông tin về hợp đồng đó thì phương án nào sau đây là đúng?","options": ["Đánh giá nhà thầu không đạt yêu cầu về hợp đồng tương tự","Yêu cầu nhà thầu làm rõ E-HSDT trên Hệ thống mạng đấu thầu quốc gia","Yêu cầu nhà thầu gửi bổ sung hợp đồng tương tự bằng bản giấy để đánh giá","Phương án B và C đều đúng"],"answer": "B","explanation": ""},{"stt": "256","question": "Nhận định nào sau đây về văn bản điện tử trên Hệ thống mạng đấu thầu quốc gia là đúng?","options": ["Văn bản điện tử trên Hệ thống có giá trị theo quy định của pháp luật về giao dịch điện tử, làm cơ sở đối chiếu, so sánh, xác thực thông tin phục vụ công tác đánh giá, thẩm định, thanh tra, kiểm tra, kiểm toán và giải ngân","Thời điểm gửi, nhận văn bản điện tử được xác định căn cứ theo thời gian thực ghi lại trên Hệ thống","Khi gửi hồ sơ thanh quyết toán đến Kho bạc Nhà nước, nhà thầu không phải cung cấp thông tin, tài liệu cho Kho bạc Nhà nước đối với các thông tin, tài liệu là văn bản điện tử trên Hệ thống","Các phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "257","question": "Đối với đấu thầu qua mạng, chức năng trả lời làm rõ E-HSDT trên Hệ thống mạng đấu thầu quốc gia được thực hiện bao nhiêu lần đối với mỗi yêu cầu làm rõ?","options": ["01 lần","02 lần","03 lần","Không giới hạn số lần"],"answer": "D","explanation": ""},{"stt": "258","question": "Đối với đấu thầu qua mạng, nhà thầu liên danh nộp bảo đảm dự thầu theo thể thức nào sau đây?","options": ["Từng thành viên liên danh có thể sử dụng thể thức bảo lãnh dự thầu khác nhau","Các thành viên liên danh bắt buộc phải sử dụng cùng thể thức bảo lãnh dự thầu điện tử","Các thành viên liên danh phải sử dụng cùng thể thức: bảo lãnh dự thầu điện tử hoặc bảo lãnh dự thầu bằng giấy","Các thành viên liên danh bắt buộc phải sử dụng cùng thể thức bảo lãnh dự thầu bằng giấy"],"answer": "C","explanation": ""},{"stt": "259","question": "Nhận định nào sau đây là đúng?","options": ["Trong vòng 05 ngày làm việc, kể từ ngày nhận được yêu cầu của chủ đầu tư, nếu nhà thầu từ chối hoặc không nộp bản gốc thư bảo lãnh dự thầu, giấy chứng nhận bảo hiểm bảo lãnh (đối với trường hợp sử dụng bảo lãnh dự thầu bằng văn bản giấy) theo yêu cầu của chủ đầu tư thì nhà thầu sẽ bị xử lý theo đúng cam kết của nhà thầu trong đơn dự thầu","Trong vòng 05 ngày làm việc, kể từ ngày nhận được yêu cầu của bên mời thầu, nếu nhà thầu từ chối hoặc không nộp bản gốc thư bảo lãnh dự thầu, giấy chứng nhận bảo hiểm bảo lãnh (đối với trường hợp sử dụng bảo lãnh dự thầu bằng văn bản giấy) theo yêu cầu của bên mời thầu thì nhà thầu sẽ bị xử lý theo đúng cam kết của nhà thầu trong đơn dự thầu","Trong vòng 05 ngày làm việc, kể từ ngày nhận được yêu cầu của tổ chuyên gia, nếu nhà thầu từ chối hoặc không nộp bản gốc thư bảo lãnh dự thầu, giấy chứng nhận bảo hiểm bảo lãnh (đối với trường hợp sử dụng bảo lãnh dự thầu bằng văn bản giấy) theo yêu cầu của tổ chuyên gia thì nhà thầu sẽ bị xử lý theo đúng cam kết của nhà thầu trong đơn dự thầu","Trong vòng 05 ngày làm việc, kể từ ngày nhận được yêu cầu của tư vấn đấu thầu, nếu nhà thầu từ chối hoặc không nộp bản gốc thư bảo lãnh dự thầu, giấy chứng nhận bảo hiểm bảo lãnh (đối với"],"answer": "A","explanation": ""},{"stt": "260","question": "Gói thầu nào sau đây không phải áp dụng đấu thầu qua mạng trên Hệ thống mạng đấu thầu quốc gia?","options": ["Gói thầu hỗn hợp theo phương thức 02 giai đoạn","Gói thầu đấu thầu rộng rãi quốc tế","Gói thầu áp dụng hình thức chỉ định thầu, đặt hàng, giao nhiệm vụ, mua sắm trực tiếp, tự thực hiện, đàm phán giá, lựa chọn nhà thầu trong trường hợp đặc biệt, gói thầu có sự tham gia của cộng đồng","Các phương án trên đều đúng"],"answer": "D","explanation": ""},{"stt": "261","question": "Việc hủy E-TBMT có thể được thực hiện tại thời điểm nào?","options": ["Được thực hiện tại thời điểm đóng thầu trong trường hợp không có nhà thầu tham dự thầu","Được thực hiện sau thời điểm mở thầu","Được thực hiện trước thời điểm đóng thầu trong trường hợp đã phát hành hồ sơ mời thầu trước ngày 01/7/2025 nhưng đến ngày 4/8/2025 chưa đóng thầu","Phương án A và C đều đúng"],"answer": "D","explanation": ""},{"stt": "262","question": "Khi chủ đầu tư sửa đổi E-HSMT, thay đổi thời điểm đóng thầu (nếu có) trên Hệ thống mạng đấu thầu quốc gia, nhận định nào sau đây đúng?","options": ["Nhà thầu chịu trách nhiệm theo dõi thông tin trên Hệ thống mạng đấu thầu quốc gia để cập nhật thông tin về việc sửa đổi E HSMT, thay đổi thời điểm đóng thầu (nếu có) để làm cơ sở chuẩn bị E-HSDT","Nhà thầu phải tự chịu trách nhiệm và chịu bất lợi trong quá trình tham dự thầu nếu không theo dõi, cập nhật thông tin sửa đổi E-HSMT, thời điểm đóng thầu trên Hệ thống mạng đấu thầu quốc gia trong quá trình tham dự thầu","Hệ thống mạng đấu thầu quốc gia tự động gửi email thông báo về việc sửa đổi E-HSMT, thay đổi thời điểm đóng thầu (nếu có) c 00 ngày Thứ 2 (15/9/2025), thời điểm nào sau đây là thời điểm kết thúc chào giá trực tuyến sớm nhất?","options": ["11h00 ngày Thứ 6 (19/9/2025)","08h00 ngày Thứ 3 (23/9/2025)","11h00 ngày Thứ 3 (23/9/2025)","08h00 ngày Thứ 4 (24/9/2025)"],"answer": "D","explanation": ""},{"stt": "267","question": "Đối với đấu thầu qua mạng, nhà thầu đính kèm bản scan thư giảm giá khi tham dự thầu trên Hệ thống mạng đấu thầu quốc gia thì việc đánh giá tệp tin đính kèm này được thực hiện theo phương án nào sau đây?","options": ["Không được xem xét, đánh giá","Được xem xét, đánh giá căn cứ tệp tin đính kèm","Được làm rõ trong trường hợp có sự sai khác thông tin về giảm giá giữa tệp tin đính kèm này và thông tin kê khai trong đơn dự thầu","Được bổ sung trong trường hợp có sự sai khác thông tin về giảm giá giữa tệp tin đính kèm này và thông tin kê khai trong đơn dự thầu"],"answer": "A","explanation": ""},{"stt": "268","question": "Đối với gói thầu mua sắm hàng hóa có giá gói thầu 15 tỷ đồng thực hiện đấu thầu rộng rãi qua mạng, trường hợp tại thời điểm đóng thầu không có nhà thầu tham dự thầu, chủ đầu tư quyết định xử lý tình huống theo cách gia hạn thời điểm đóng thầu thì thời gian gia hạn tối thiểu là bao nhiêu ngày?","options": ["10 ngày","05 ngày làm việc","05 ngày","03 ngày làm việc"],"answer": "A","explanation": ""},{"stt": "269","question": "Phương thức lựa chọn nhà thầu nào sau đây áp dụng cho đấu thầu qua mạng?","options": ["01 giai đoạn, 01 túi hồ sơ","02 giai đoạn, 01 túi hồ sơ","02 giai đoạn, 02 túi hồ sơ","Các phương án trên đều đúng"],"answer": "A","explanation": ""},{"stt": "270","question": "Đối với dự toán mua sắm, hạn mức áp dụng chào giá trực tuyến theo quy trình thông thường đối với gói thầu mua sắm hàng hóa là?","options": ["Có giá gói thầu không quá 500 triệu đồng","Có giá gói thầu không quá 02 tỷ đồng","Có giá gói thầu không quá 05 tỷ đồng","Không có quy định về hạn mức áp dụng"],"answer": "D","explanation": ""},{"stt": "271","question": "Gói thầu hàng hóa có giá g
